<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ─── PERSISTENCE ─── */
const STORAGE_KEY = "acty_tracker_v1";

function loadState(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return fallback;
    const data = JSON.parse(raw);
    return data[key] !== undefined ? data[key] : fallback;
  } catch { return fallback; }
}

function saveAll(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

/* ─── DEFAULT DATA ─── */

const defaultWorkQueue = [
  { id: 1, section: "inspections", title: "Check battery voltage with multimeter", status: "todo", priority: "high", timing: "upcoming", notes: "Previous owner confirmed battery is brand new (early 2026). Still worth verifying with a multimeter since radio resets on stalls. Check resting voltage (key off, 10 min wait) — should be 12.6V+. Check charging voltage (engine running) — should be 13.5–14.5V. If charging voltage is off, the issue is likely the alternator, not the battery.", mileage: null, parts: ["Multimeter (grab from work)"], solutions: [] },
  { id: 11, section: "inspections", title: "Timing belt — check history & contact previous owner", status: "todo", priority: "high", timing: "upcoming", notes: "E07A is interference — if the belt snaps, pistons hit valves and the engine is toast. Service interval is ~100,000 km / 60,000 mi, but age matters just as much. Belt rubber degrades even sitting still — this truck is 30+ years old. Contact previous owner, check for service sticker, look for Japanese inspection booklet (整備記録簿). If no record exists, schedule replacement ASAP.", mileage: null, parts: [], solutions: ["Contact previous owner — ask for timing belt service history", "Check engine bay for timing belt service sticker", "Look for Japanese maintenance booklet (整備記録簿) in glovebox", "If no history found → schedule timing belt + tensioner + water pump replacement"] },
  { id: 20, section: "inspections", title: "Inspect front brake pads & rotors", status: "todo", priority: "high", timing: "upcoming", notes: "Pull a front wheel and check pad thickness — minimum ~2mm before replacement needed. Check rotor for scoring, grooves, or lip on the edge. Look for uneven wear which could indicate a stuck caliper slide pin.", mileage: null, parts: [], solutions: [] },
  { id: 21, section: "inspections", title: "Inspect rear drum brakes & shoes", status: "todo", priority: "high", timing: "upcoming", notes: "Pull a rear drum and check shoe thickness. Look for glazing, oil contamination, or uneven wear. Check the wheel cylinder for leaks — any moisture around the boots means it's seeping.", mileage: null, parts: [], solutions: [] },
  { id: 22, section: "inspections", title: "Inspect brake lines — rubber sections", status: "todo", priority: "high", timing: "upcoming", notes: "Check all rubber brake hoses for cracking, swelling, or softness. 30-year-old rubber lines can balloon under pressure or burst. Trace the hard lines too — look for rust, corrosion, or weeping at fittings.", mileage: null, parts: [], solutions: [] },
  { id: 26, section: "inspections", title: "Inspect belts — alternator & accessories", status: "todo", priority: "medium", timing: "upcoming", notes: "Check for cracking, glazing, fraying, or missing chunks. Belt should deflect ~10mm when pressed with thumb. If cracked or glazed, replace.", mileage: null, parts: [], solutions: [] },
  { id: 27, section: "inspections", title: "Inspect radiator & heater hoses", status: "todo", priority: "medium", timing: "upcoming", notes: "Squeeze all rubber coolant hoses. Should feel firm but pliable. If rock hard, mushy, swollen, or cracked — replace. Check clamps for rust and tightness.", mileage: null, parts: [], solutions: [] },
  { id: 28, section: "inspections", title: "Inspect fuel lines & filter", status: "todo", priority: "medium", timing: "upcoming", notes: "Check rubber fuel lines for cracking or brittleness, especially near the carb and fuel filter. Old rubber fuel line gets brittle in heat. Replace fuel filter if no record of it being done.", mileage: null, parts: [], solutions: [] },
  { id: 30, section: "inspections", title: "Check tire age — sidewall date codes", status: "todo", priority: "medium", timing: "upcoming", notes: "Find the 4-digit DOT date code on the sidewall. If tires are older than 6 years, replace regardless of tread depth. Hawaii heat accelerates rubber degradation.", mileage: null, parts: [], solutions: [] },
  { id: 31, section: "inspections", title: "Check ball joints, tie rods & bushings", status: "todo", priority: "medium", timing: "upcoming", notes: "Jack up each corner and grab the tire at 12/6 then 3/9 — wiggle and feel for play or clunking. Check all visible rubber bushings for cracking. Bounce test each corner — should settle in one bounce.", mileage: null, parts: [], solutions: [] },
  { id: 5, section: "inspections", title: "Inspect / lube shifter cable & linkage", status: "todo", priority: "medium", timing: "longterm", notes: "HA4 uses cable-operated shifter. Dry or sticky cables cause imprecise shifts. Part of the clicky 1st gear investigation.", mileage: null, parts: ["White lithium grease or marine grease", "Cable lube tool (optional)"], solutions: [] },
  { id: 4, section: "maintenance", title: "Flush straight water → Honda Type-2 Blue Coolant", status: "todo", priority: "high", timing: "upcoming", notes: "E07A is an interference engine — coolant health is critical. Must bleed/burp long cooling lines after flush to prevent air pockets and head gasket risk.", mileage: null, parts: ["Honda Type-2 Blue Coolant — 1 gallon premixed OR 50/50 with distilled water", "Distilled water — 1 gallon (do NOT use tap water)", "Drain pan — at least 2 gallon capacity", "Funnel", "Flush kit or garden hose with low pressure", "Rags and gloves — coolant is slippery and toxic", "Flashlight — reservoir is passenger side", "Jack stands if needed to access drain plug"], solutions: [] },
  { id: 23, section: "maintenance", title: "Flush brake fluid", status: "todo", priority: "high", timing: "upcoming", notes: "Old brake fluid absorbs moisture over time, lowering boiling point and causing internal corrosion. Flush and replace with fresh DOT 3 or DOT 4. Bleed all four corners starting from the wheel furthest from the master cylinder.", mileage: null, parts: ["DOT 3 or DOT 4 brake fluid — 1 quart", "Clear tubing for bleeding", "Box wrench for bleeder valves", "Helper or one-man bleeder valve kit"], solutions: [] },
  { id: 24, section: "maintenance", title: "Change transmission fluid (MTF)", status: "todo", priority: "high", timing: "upcoming", notes: "Probably never been changed. Old MTF contributes to notchy shifting — directly related to the 1st gear issue. Simple drain and fill. Use Honda MTF or API SE 10W-30. Capacity ~1.2 quarts. Loosen fill bolt FIRST before drain bolt. Use 3/8 ratchet for the square drain bolt.", mileage: null, parts: ["Honda MTF or API SE 10W-30 — 1.5 quarts", "3/8 ratchet wrench (fits square drain bolt)", "Drain pan"], solutions: [] },
  { id: 25, section: "maintenance", title: "Change front differential fluid", status: "todo", priority: "medium", timing: "upcoming", notes: "Capacity is ~0.48 quarts. Use API GL-4 75W-85 gear oil (or Lucas GL-4/GL-5 75W-90 full synthetic). Fill until it overflows from the fill hole.", mileage: null, parts: ["GL-4 75W-85 or 75W-90 gear oil — 1 quart", "3/8 ratchet wrench", "Drain pan"], solutions: [] },
  { id: 29, section: "maintenance", title: "Ignition tune-up — plugs, wires, cap, rotor", status: "todo", priority: "medium", timing: "upcoming", notes: "Full ignition refresh. Pull spark plugs and read them — color tells you about mixture and combustion health. Check plug wires for cracking or arcing. Inspect distributor cap for carbon tracking.", mileage: null, parts: ["Spark plugs — NGK or Denso (check gap spec)", "Spark plug wires", "Distributor cap", "Distributor rotor"], solutions: [] },
  { id: 12, section: "maintenance", title: "Windshield washer — weak spray, check nozzles & line", status: "todo", priority: "medium", timing: "upcoming", notes: "Motor sounds healthy and pumps fluid, but output is a dribble. Most likely a clogged nozzle — 30 years of mineral buildup.", mileage: null, parts: ["Pin or sewing needle", "Compressed air or can of air duster", "White vinegar", "Replacement washer nozzle (universal, if needed)"], solutions: [] },
  { id: 3, section: "monitoring", title: "Clicky / notchy 1st gear entry", status: "investigating", priority: "high", timing: "upcoming", notes: "Likely clutch cable adjustment, shifter cable lube, or old MTF. Attack in that order. Check clutch pedal free play first — should be 10–15mm before resistance.", mileage: null, parts: ["Honda MTF fluid", "Cable lube spray (WD-40 Specialist or similar)"], solutions: [] },
  { id: 13, section: "monitoring", title: "Rear driver-side CV boot — split, flinging grease", status: "investigating", priority: "high", timing: "upcoming", notes: "Boot has a small split or crack along one edge — not a total blowout but flinging grease from centrifugal force. Joint likely still good if caught early. Monitor for clicking on turns. Clean area and check how much grease remains.", mileage: "88,734 km", parts: [], solutions: ["Quick fix: split boot kit + CV grease repack (no axle removal)", "Proper fix: pull axle, replace boot, repack grease", "If joint damaged: replace entire CV axle assembly"] },
  { id: 60, section: "monitoring", title: "Pulls to the right — investigate", status: "investigating", priority: "high", timing: "upcoming", notes: "Noticed on drive to work. Hard pull to the right. Most likely causes: stuck caliper or collapsed brake hose on right side, alignment, tire pressure imbalance, or worn suspension component. Check tire pressures first (30 seconds). Then prioritize right front brake inspection. Feel wheels after short drive — if right is hotter, it's a dragging brake.", mileage: null, parts: [], solutions: [] },
  { id: 52, section: "installations", title: "Seat covers + sub + interior deep clean — combo install", status: "planning", priority: "medium", timing: "longterm", notes: "Do these together since seats come out for all three jobs. 1) Pull seats. 2) Vacuum and deep clean the entire interior — under seats, carpet, dash crevices, door pockets. 3) Build and mount sub box behind/under seat. 4) Run amp power wire from battery with inline fuse. 5) Install seat covers. 6) Reinstall seats. Sub amp should be class D under 200W RMS. Seat covers and subwoofer ordered. PREREQUISITE: confirm battery/alternator health first.", mileage: null, parts: ['8" or 10" sub driver (ordered ✓)', "Small mono class D amp ($80–150)", "RCA cables", "Power wire kit with inline fuse", "MDF for custom box", "Seat covers (ordered ✓)"], solutions: [] },
];

const defaultServiceLog = [
  { id: 100, category: "Engine", title: "Oil change + Fumoto valve install", date: "Mar 2026", mileage: "88,734 km", notes: "First oil change since purchase. Installed Fumoto drain valve at the same time — no more fumbling with drain plugs. Used 3 quarts NAPA Gold synthetic 10W-40, NAPA Gold 1358 filter. Honda spec is 10W-30 — switch next time. Shorter interval planned to flush 10W-40 sooner.", parts: ["NAPA Gold synthetic 10W-40 × 3 qt", "NAPA Gold 1358 oil filter", "Fumoto drain valve (installed ✓)"] },
  { id: 103, category: "Electrical", title: "Battery replaced (prev. owner)", date: "Pre-purchase, 2025", mileage: "Unknown", notes: "Previous owner installed a brand new battery shortly before sale. Battery is on passenger side between the wheels. Cover is hand-tightened (no tools needed). Shares housing with coolant overflow tank.", parts: ["Battery (new)"] },
  { id: 101, category: "Engine", title: "Starter replaced (prev. owner)", date: "Pre-purchase, 2025", mileage: "Unknown", notes: "Previous owner noted starter is 'brand new'. No specific date given but likely within his ownership period (Sept 2022 – Feb 2026).", parts: ["Starter motor"] },
  { id: 102, category: "Cooling", title: "Radiator replaced (prev. owner)", date: "Pre-purchase, 2025", mileage: "Unknown", notes: "Previous owner noted radiator is 'less than a year old' as of late Feb 2026. Combined with starter replacement, suggests possible overheating event. Currently running straight water, not coolant.", parts: ["Radiator"] },
  { id: 104, category: "Wheels", title: "Tires replaced (prev. owner)", date: "Pre-purchase, 2025", mileage: "Unknown", notes: "Previous owner noted tires are 'less than a year old' as of late Feb 2026. Inflate to 35 PSI. Still worth checking sidewall date codes to confirm.", parts: ["Tires (4)"] },
];

/* ─── CONFIG ─── */
const statusConfig = { todo: { label: "To Do", dot: "#c9a84c" }, investigating: { label: "Investigating", dot: "#3a7fc1" }, planning: { label: "Planning", dot: "#7c3ac1" }, inprogress: { label: "In Progress", dot: "#2ea84a" }, done: { label: "Done", dot: "#555" } };
const priorityConfig = { high: { label: "HIGH", color: "#c0392b" }, medium: { label: "MED", color: "#d68910" }, low: { label: "LOW", color: "#2e86c1" } };
const priorityOrder = ["high", "medium", "low"];
const timingConfig = { thisweek: { label: "This Week", color: "#3a7fc1", bg: "#3a7fc111" }, upcoming: { label: "Upcoming", color: "#c9a84c", bg: "#c9a84c11" }, longterm: { label: "Long-term", color: "#555", bg: "transparent" } };
const sectionConfig = { inspections: { label: "Inspections", color: "#d68910" }, maintenance: { label: "Maintenance", color: "#c0392b" }, monitoring: { label: "Monitoring", color: "#3a7fc1" }, installations: { label: "Installations", color: "#2ea84a" } };
const sectionsList = ["inspections", "maintenance", "monitoring", "installations"];

const defaultPurchases = [
  { id: 1, item: "Timing belt kit + tensioner + water pump", priority: "high", purchased: false, notes: "Need to confirm if timing belt has ever been replaced first" },
  { id: 2, item: "DOT 3/4 brake fluid", priority: "high", purchased: false, notes: "For brake flush" },
  { id: 3, item: "Honda Type-2 Blue Coolant", priority: "high", purchased: false, notes: "For coolant flush — currently running straight water" },
  { id: 4, item: "Honda MTF or 10W-30 for trans", priority: "high", purchased: false, notes: "~1.5 quarts for transmission fluid change" },
  { id: 5, item: "GL-4 75W-85 gear oil", priority: "medium", purchased: false, notes: "~1 quart for front diff" },
  { id: 6, item: "Spark plugs, wires, dist cap & rotor", priority: "medium", purchased: false, notes: "NGK or Denso — check gap spec" },
  { id: 7, item: "Fluid Film / rust inhibitor", priority: "medium", purchased: false, notes: "Spray on all exposed metal, rack, undercarriage. Reapply every 6 months." },
];

/* ─── APP ─── */
function ActyTracker() {
  const [tab, setTab] = useState("queue");
  const [issues, setIssuesRaw] = useState(() => loadState("issues", defaultWorkQueue));
  const [serviceLog, setServiceLogRaw] = useState(() => loadState("serviceLog", defaultServiceLog));
  const [vehicleOdo, setVehicleOdoRaw] = useState(() => loadState("vehicleOdo", "88,734 km"));
  const [purchases, setPurchasesRaw] = useState(() => loadState("purchases", defaultPurchases));
  const [timingFilter, setTimingFilter] = useState("all");
  const [sectionFilter, setSectionFilter] = useState("all");
  const [expandedId, setExpandedId] = useState(null);
  const [editingNote, setEditingNote] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [editingMileage, setEditingMileage] = useState(null);
  const [mileageText, setMileageText] = useState("");
  const [logFilter, setLogFilter] = useState("All");
  const [expandedLogId, setExpandedLogId] = useState(null);
  const [infoOpen, setInfoOpen] = useState(true);
  const [prevOwnerOpen, setPrevOwnerOpen] = useState(false);
  const [aftermarketOpen, setAftermarketOpen] = useState(false);
  const [contactsOpen, setContactsOpen] = useState(false);
  const [editingField, setEditingField] = useState(null);
  const [editingFieldValue, setEditingFieldValue] = useState("");
  const [newPurchaseText, setNewPurchaseText] = useState("");

  useEffect(() => {
    saveAll({ issues, serviceLog, vehicleOdo, purchases });
  }, [issues, serviceLog, vehicleOdo, purchases]);

  function setIssues(updater) { setIssuesRaw(updater); }
  function setPurchases(updater) { setPurchasesRaw(updater); }

  const filtered = issues.filter((i) => {
    if (timingFilter !== "all" && i.timing !== timingFilter) return false;
    if (sectionFilter !== "all" && i.section !== sectionFilter) return false;
    return true;
  });
  const thisweekCount = issues.filter(i => i.timing === "thisweek" && i.status !== "done").length;
  const upcomingCount = issues.filter(i => i.timing === "upcoming" && i.status !== "done").length;
  const longtermCount = issues.filter(i => i.timing === "longterm" && i.status !== "done").length;
  const doneCount = issues.filter(i => i.status === "done").length;

  function cycleStatus(id, e) {
    e.stopPropagation();
    const order = ["todo", "investigating", "planning", "inprogress", "done"];
    setIssues(prev => prev.map(i => i.id !== id ? i : { ...i, status: order[(order.indexOf(i.status) + 1) % order.length] }));
  }
  function cycleTiming(id, e) {
    e.stopPropagation();
    const order = ["thisweek", "upcoming", "longterm"];
    setIssues(prev => prev.map(i => i.id !== id ? i : { ...i, timing: order[(order.indexOf(i.timing) + 1) % order.length] }));
  }
  function cyclePriority(id, e) {
    e.stopPropagation();
    setIssues(prev => prev.map(i => i.id !== id ? i : { ...i, priority: priorityOrder[(priorityOrder.indexOf(i.priority) + 1) % priorityOrder.length] }));
  }
  function saveNote(id, e) {
    e.stopPropagation();
    setIssues(prev => prev.map(i => i.id === id ? { ...i, notes: noteText } : i));
    setEditingNote(null);
  }
  function saveMileage(id, e) {
    e.stopPropagation();
    setIssues(prev => prev.map(i => i.id === id ? { ...i, mileage: mileageText } : i));
    setEditingMileage(null);
  }

  const grouped = {};
  sectionsList.forEach(s => { grouped[s] = filtered.filter(i => i.section === s); });

  const filteredLog = serviceLog.filter(i => logFilter === "All" || i.category === logFilter);
  const logCategories = ["All", ...Array.from(new Set(serviceLog.map(s => s.category)))];

  const sh = { fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 };
  const btnS = (active, ac) => ({ background: active ? ac : "transparent", color: active ? "#1a1a18" : "#555", border: "1px solid " + (active ? ac : "#2e2e2a"), borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" });

  function renderCard(issue) {
    const sc = statusConfig[issue.status], pc = priorityConfig[issue.priority], tc = timingConfig[issue.timing];
    const sec = sectionConfig[issue.section];
    const isExp = expandedId === issue.id, isEN = editingNote === issue.id, isEM = editingMileage === issue.id;
    return (
      <div key={issue.id} style={{ background: "#222220", border: "1px solid #2e2e2a", borderLeft: `3px solid ${sec.color}`, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
        <div onClick={() => setExpandedId(isExp ? null : issue.id)} style={{ padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: sc.dot, flexShrink: 0 }} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#f0e6c8" }}>{issue.title}</span>
            <div style={{ fontSize: 10, color: "#555", marginTop: 1, letterSpacing: 1 }}>
              {sc.label} · {tc.label}
              {issue.mileage && <span style={{ color: "#c9a84c", marginLeft: 8 }}>@ {issue.mileage}</span>}
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <span style={{ fontSize: 9, color: pc.color, border: `1px solid ${pc.color}44`, borderRadius: 2, padding: "1px 5px", letterSpacing: 1 }}>{pc.label}</span>
            <span style={{ fontSize: 10, color: "#444" }}>{isExp ? "▲" : "▼"}</span>
          </div>
        </div>
        {isExp && (
          <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <div style={sh}>Mileage</div>
              {isEM ? (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input value={mileageText} onChange={e => setMileageText(e.target.value)} placeholder="e.g. 88734 km" style={{ background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", width: 140 }} />
                  <button onClick={e => saveMileage(issue.id, e)} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                  <button onClick={e => { e.stopPropagation(); setEditingMileage(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: issue.mileage ? "#c9a84c" : "#444" }}>
                  {issue.mileage || "Not recorded"}
                  <span onClick={e => { e.stopPropagation(); setEditingMileage(issue.id); setMileageText(issue.mileage || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span>
                </div>
              )}
            </div>
            <div>
              <div style={sh}>Notes</div>
              {isEN ? (
                <div>
                  <textarea value={noteText} onChange={e => setNoteText(e.target.value)} rows={3} style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                    <button onClick={e => saveNote(issue.id, e)} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                    <button onClick={e => { e.stopPropagation(); setEditingNote(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#b8b0a0", lineHeight: 1.7 }}>
                  {issue.notes}
                  <span onClick={e => { e.stopPropagation(); setEditingNote(issue.id); setNoteText(issue.notes); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span>
                </div>
              )}
            </div>
            {issue.solutions && issue.solutions.length > 0 && <div><div style={sh}>Potential Solutions</div><ul style={{ margin: 0, paddingLeft: 16, fontSize: 12, color: "#9a9080", lineHeight: 1.9 }}>{issue.solutions.map((s, i) => <li key={i}>{s}</li>)}</ul></div>}
            {issue.parts && issue.parts.length > 0 && <div><div style={sh}>Parts / Materials</div><ul style={{ margin: 0, paddingLeft: 16, fontSize: 12, color: "#9a9080", lineHeight: 1.9 }}>{issue.parts.map((p, i) => <li key={i}>{p}</li>)}</ul></div>}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", paddingTop: 4 }}>
              <button onClick={e => cycleStatus(issue.id, e)} style={{ background: "transparent", color: sc.dot, border: `1px solid ${sc.dot}55`, borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Status: {sc.label} →</button>

          <div style={{ marginTop: 20, textAlign: "center" }}>
            <button onClick={() => { if (confirm("Reset all data to defaults? This cannot be undone.")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }}
              style={{ background: "transparent", color: "#333", border: "1px solid #2e2e2a", borderRadius: 3, padding: "6px 16px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>
              Reset All Data
            </button>
          </div>
        </div>
      )}

      <div style={{ marginTop: 24, fontSize: 10, color: "#2e2e2a", textAlign: "center", letterSpacing: 2 }}>
        Data saves automatically to this browser
      </div>
    </div>
  );
}

ReactDOM.render(<ActyTracker />, document.getElementById("root"));
</script>
</body>
</html>
