/* ─── HELPERS ─── */
function fmt(val) { if (!val && val !== 0) return val; const d = String(val).replace(/[^0-9]/g, ""); if (!d) return String(val); return parseInt(d, 10).toLocaleString() + " km"; }
function parseOdo(val) { if (!val) return 0; const d = String(val).replace(/[^0-9]/g, ""); return d ? parseInt(d, 10) : 0; }

function getRecurringDue(recurring, completedAtKm) {
  if (!recurring) return null;
  const r = {};
  if (recurring.kmInterval && completedAtKm) r.dueAtKm = completedAtKm + recurring.kmInterval;
  if (recurring.monthsInterval) { const d = new Date(); d.setMonth(d.getMonth() + recurring.monthsInterval); r.dueByDate = d.toLocaleDateString("en-US", { month: "short", year: "numeric" }); }
  return r;
}

function buildRecurring(choice, currentOdo, kmVal, monthsVal) {
  if (!choice || choice === "none") return null;
  const odo = parseOdo(currentOdo);
  const kmI = (choice === "km" || choice === "both") && kmVal ? parseInt(String(kmVal).replace(/[^0-9]/g, ""), 10) : null;
  const moI = (choice === "months" || choice === "both") && monthsVal ? parseInt(String(monthsVal).replace(/[^0-9]/g, ""), 10) : null;
  if (!kmI && !moI) return null;
  const r = { kmInterval: kmI || null, monthsInterval: moI || null };
  return { ...r, ...getRecurringDue(r, odo) };
}

function autoEscalate(tasks, currentOdo) {
  const odo = parseOdo(currentOdo);
  const now = new Date();
  return tasks.map(t => {
    if (!t.recurring) return t;
    let newP = t.priority;
    if (t.recurring.dueAtKm && odo > 0) {
      const rem = t.recurring.dueAtKm - odo;
      if (rem <= 500) newP = "urgent";
      else if (rem <= 1000) newP = "thisweek";
      else if (rem <= 6000) newP = "upcoming";
    }
    if (t.recurring.dueByDate) {
      const dueD = new Date(t.recurring.dueByDate);
      const days = (dueD - now) / (1000 * 60 * 60 * 24);
      if (days <= 0) newP = "urgent";
      else if (days <= 7 && PRIORITIES.indexOf(newP) > 1) newP = "thisweek";
      else if (days <= 60 && PRIORITIES.indexOf(newP) > 2) newP = "upcoming";
    }
    return newP !== t.priority ? { ...t, priority: newP } : t;
  });
}

/* ─── AUTO-RESIZE TEXTAREA ─── */
function autoResize(el) {
  if (!el) return;
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 300) + "px";
}
function AutoTextarea({ value, onChange, placeholder, style, ...props }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) autoResize(ref.current); }, [value]);
  return (
    <textarea
      ref={ref}
      value={value}
      onChange={e => { onChange(e); if (ref.current) autoResize(ref.current); }}
      placeholder={placeholder}
      style={{ ...style, overflow: "hidden", minHeight: 40 }}
      {...props}
    />
  );
}

  const [logFieldText, setLogFieldText] = useState("");
  // Purchases
  const [purchases, setPurchasesRaw] = useState(defaultPurchases);
  const [expandedPurchaseId, setExpandedPurchaseId] = useState(null);
  const [editingPurchaseNote, setEditingPurchaseNote] = useState(null);
  const [purchaseNoteText, setPurchaseNoteText] = useState("");
  const [editingPurchaseName, setEditingPurchaseName] = useState(null);
  const [purchaseNameText, setPurchaseNameText] = useState("");
  const [editingCost, setEditingCost] = useState(null);
  const [costText, setCostText] = useState("");
  const [receivingId, setReceivingId] = useState(null);
  const [receivingStep, setReceivingStep] = useState(null);
  // Vehicle
  const [vehicleOdo, setVehicleOdoRaw] = useState("88,937 km");
  const [aftermarketItems, setAftermarketItems] = useState(defaultPartsList);
  const [infoOpen, setInfoOpen] = useState(true);
  const [prevOwnerOpen, setPrevOwnerOpen] = useState(false);
  const [aftermarketOpen, setAftermarketOpen] = useState(false);
  const [contactsOpen, setContactsOpen] = useState(false);
  const [editingField, setEditingField] = useState(null);
  const [editingFieldValue, setEditingFieldValue] = useState("");
  const [expandedPartId, setExpandedPartId] = useState(null);
  const [editingPartField, setEditingPartField] = useState(null);
  const [partFieldText, setPartFieldText] = useState("");
  const [partsFilter, setPartsFilter] = useState("All");
  // Sync
  const [syncStatus, setSyncStatus] = useState("loading");
  const [openPriorityGroups, setOpenPriorityGroups] = useState({ urgent: true, thisweek: false, upcoming: false, longterm: false });

  function setTasks(updater) { setTasksRaw(updater); }
  function setPurchases(updater) { setPurchasesRaw(updater); }

  // Load from cloud on mount — cloud is the single source of truth
  const loaded = useRef(false);
  useEffect(() => {
    cloudLoad().then(cloud => {
      if (cloud) {
        const odo = cloud.vehicleOdo || "88,937 km";
        setTasksRaw(autoEscalate(cloud.tasks || defaultTasks, odo));
        if (cloud.serviceLog) setServiceLogRaw(cloud.serviceLog);
        if (cloud.vehicleOdo) setVehicleOdoRaw(cloud.vehicleOdo);
        if (cloud.purchases) setPurchasesRaw(cloud.purchases);
        if (cloud.aftermarket) setAftermarketItems(cloud.aftermarket);
        setSyncStatus("saved");
      } else {
        // No cloud data yet — use defaults, first save will create the bin
        setTasksRaw(autoEscalate(defaultTasks, "88,937 km"));
        setSyncStatus("new");
      }
      loaded.current = true;
    }).catch(() => { setSyncStatus("offline"); loaded.current = true; });
  }, []);

  // Auto-save to cloud with debounce — only after initial load completes
  const saveTimer = useRef(null);
  useEffect(() => {
    if (!loaded.current) return;
    const state = { tasks, serviceLog, vehicleOdo, purchases, aftermarket: aftermarketItems };
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      setSyncStatus("saving");
      cloudSave(state).then(() => setSyncStatus("saved")).catch(() => setSyncStatus("offline"));
    }, 2000);
  }, [tasks, serviceLog, vehicleOdo, purchases, aftermarketItems]);

  /* ─── FILTERING & GROUPING ─── */
  const filtered = tasks.filter(t => {
    if (!stageFilters.has(t.stage)) return false;
    if (!typeFilters.has(t.type)) return false;
    if (priorityFilter && t.priority !== priorityFilter) return false;
    return true;
  });

  const grouped = {};
  PRIORITIES.forEach(p => { grouped[p] = filtered.filter(t => t.priority === p); });
  const counts = {};
  PRIORITIES.forEach(p => { counts[p] = tasks.filter(t => t.priority === p).length; });

  /* ─── TASK ACTIONS ─── */

  function startDone(id, e) {
    e.stopPropagation();
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    setDoneId(id);
    setDoneNote(task.notes || "");
    setDoneMileage(task.mileage || vehicleOdo || "");
    setNewTaskTitle("");
    setNewTaskNotes(task.notes || "");
    setNewTaskParts("");
    setDonePartCategory("Engine");
    setDonePartType(task.type === "modification" ? "Aftermarket" : "OEM");
    setRepeatChoice(task.recurring ? (task.recurring.kmInterval && task.recurring.monthsInterval ? "both" : task.recurring.kmInterval ? "km" : "months") : null);
    setRepeatKm(task.recurring?.kmInterval ? String(task.recurring.kmInterval) : "");
    setRepeatMonths(task.recurring?.monthsInterval ? String(task.recurring.monthsInterval) : "");

    if (task.stage === "monitor") setDoneStep("monitor_done");
    else if (task.stage === "inspect") setDoneStep("inspect_done");
    else if (task.stage === "purchase") setDoneStep("purchase_done");
    else if (task.stage === "install") setDoneStep("install_done");
  }

  /* ─── DONE FLOW HANDLERS ─── */
  function promoteToStage(task, newStage) {
    setTasks(prev => prev.map(t => t.id === task.id ? { ...t, stage: newStage } : t));
    setDoneId(null); setDoneStep(null); setExpandedId(null);
  }

  function resolveTask(task, logIt = true) {
    if (logIt) {
      const fmtM = fmt(doneMileage) || task.mileage || vehicleOdo;
      if (doneMileage && doneMileage.trim()) setVehicleOdoRaw(fmt(doneMileage));
      setServiceLogRaw(prev => [{ id: Date.now(), category: TYPE_CONFIG[task.type]?.label || task.type, title: task.title, date: new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }), mileage: fmtM, notes: doneNote || task.notes || "", parts: task.parts || [] }, ...prev]);
    }
    // Handle recurring
    const recurring = buildRecurring(repeatChoice, doneMileage || vehicleOdo, repeatKm, repeatMonths);
    if (recurring) {
      setTasks(prev => [...prev.filter(t => t.id !== task.id), {
        id: Date.now() + 1, stage: "monitor", type: task.type, priority: "longterm",
        title: task.title, notes: task.notes || "", mileage: null, parts: task.parts || [],
        recurring
      }]);
    } else {
      setTasks(prev => prev.filter(t => t.id !== task.id));
    }
    if (doneMileage && doneMileage.trim()) {
      setTimeout(() => setTasksRaw(prev => autoEscalate(prev, doneMileage)), 100);
    }
    setDoneId(null); setDoneStep(null); setExpandedId(null); setRepeatChoice(null);
  }

  function addToShoppingList(task) {
    const newParts = (task.parts || []).filter(p => p && !p.includes("(ordered"));
    if (newParts.length > 0) {
      setPurchasesRaw(prev => [...prev, ...newParts.map((p, i) => ({
        id: Date.now() + i, item: p, cost: "", status: "tobuy",
        notes: "For: " + task.title, partsCategory: "Engine", partsType: "OEM"
      }))]);
    }
    promoteToStage(task, "install");
  }

  function finishInstallLog(task) {
    resolveTask(task, true);
  }

  function finishInstallWithParts(task) {
    const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" });
    setAftermarketItems(prev => [...prev, {
      id: Date.now(), name: task.title + (doneNote ? " — " + doneNote : ""),
      category: donePartCategory, type: donePartType, installedDate: dateStr
    }]);
    resolveTask(task, true);
  }

  function saveNote(id, e) { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === id ? { ...t, notes: noteText } : t)); setEditingNote(null); }
  function saveMileage(id, e) { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === id ? { ...t, mileage: fmt(mileageText) } : t)); setEditingMileage(null); }

  /* ─── STYLES ─── */
  const sh = { fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 };
  const btnS = (active, ac) => ({ background: active ? ac : "transparent", color: active ? "#1a1a18" : "#555", border: "1px solid " + (active ? ac : "#2e2e2a"), borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" });

  /* ─── REPEAT UI (shared) ─── */
  function renderRepeatUI() {
    return (
      <div style={{ borderTop: "1px solid #2a2a26", paddingTop: 10, marginBottom: 8 }}>
        <div style={{ fontSize: 9, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Repeat?</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
          {[["km", "KM"], ["months", "Months"], ["both", "Both"], ["none", "No"]].map(([key, label]) => {
            const active = repeatChoice === key;
            const isNo = key === "none";
            return <button key={key} onClick={e => { e.stopPropagation(); setRepeatChoice(key); }} style={{
              background: active ? (isNo ? "rgba(85,85,85,0.12)" : "rgba(201,168,76,0.12)") : "transparent",
              color: active ? (isNo ? "#888" : "#c9a84c") : "#444",
              border: `1px solid ${active ? (isNo ? "rgba(85,85,85,0.35)" : "rgba(201,168,76,0.35)") : "#2e2e2a"}`,
              borderRadius: 3, padding: "4px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, fontFamily: "inherit",
            }}>{label}</button>;
          })}
        </div>
        {(repeatChoice === "km" || repeatChoice === "both") && (
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: "#555", width: 50 }}>Every</span>
            <input value={repeatKm} onChange={e => setRepeatKm(e.target.value)} placeholder="e.g. 10000" style={{ flex: 1, background: "#1a1a18", color: "#c9a84c", border: "1px solid rgba(201,168,76,0.35)", borderRadius: 3, padding: "5px 8px", fontSize: 11, fontFamily: "inherit", boxSizing: "border-box" }} />
            <span style={{ fontSize: 10, color: "#555" }}>km</span>
          </div>
        )}
        {(repeatChoice === "months" || repeatChoice === "both") && (
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: "#555", width: 50 }}>Every</span>
            <input value={repeatMonths} onChange={e => setRepeatMonths(e.target.value)} placeholder="e.g. 6" style={{ flex: 1, background: "#1a1a18", color: "#c9a84c", border: "1px solid rgba(201,168,76,0.35)", borderRadius: 3, padding: "5px 8px", fontSize: 11, fontFamily: "inherit", boxSizing: "border-box" }} />
            <span style={{ fontSize: 10, color: "#555" }}>months</span>
          </div>
        )}
        {repeatChoice && repeatChoice !== "none" && (repeatKm || repeatMonths) && doneMileage && (
          <div style={{ fontSize: 10, color: "#555", marginTop: 4 }}>
            Next due:{" "}
            {(repeatChoice === "km" || repeatChoice === "both") && repeatKm && <span style={{ color: "#c9a84c" }}>@ {fmt(parseOdo(doneMileage) + parseInt(repeatKm.replace(/[^0-9]/g, "") || "0", 10))}</span>}
            {repeatChoice === "both" && repeatKm && repeatMonths && <span style={{ color: "#555" }}> or </span>}
            {(repeatChoice === "months" || repeatChoice === "both") && repeatMonths && <span style={{ color: "#c9a84c" }}>{(() => { const d = new Date(); d.setMonth(d.getMonth() + parseInt(repeatMonths || "0", 10)); return d.toLocaleDateString("en-US", { month: "short", year: "numeric" }); })()}</span>}
          </div>
        )}
      </div>
    );
  }

  /* ─── TASK CARD ─── */
  function renderCard(task) {
    const pc = PRIORITY_CONFIG[task.priority];
    const sc = STAGE_CONFIG[task.stage];
    const tc = TYPE_CONFIG[task.type];
    const isExp = expandedId === task.id;
    const isEN = editingNote === task.id;
    const isEM = editingMileage === task.id;
    const isET = editingTitle === task.id;

    return (
      <div key={task.id} id={"task-" + task.id} style={{ background: "#222220", border: "1px solid #2e2e2a", borderLeft: `3px solid ${sc.color}`, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
        {/* ─── COLLAPSED HEADER ─── */}
        <div onClick={() => setExpandedId(isExp ? null : task.id)} style={{ padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#f0e6c8" }}>{task.title}</span>
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4, flexWrap: "wrap" }}>
              {/* Stage badge */}
              <span style={{ fontSize: 9, color: sc.color, border: `1px solid ${sc.color}44`, borderRadius: 2, padding: "1px 6px", letterSpacing: 1 }}>{sc.icon} {sc.label}</span>
              {/* Type badge */}
              <span style={{ fontSize: 9, color: tc.color, border: `1px solid ${tc.color}44`, borderRadius: 2, padding: "1px 6px", letterSpacing: 1 }}>{tc.abbr}</span>
              {/* Recurring info */}
              {task.recurring && task.recurring.dueAtKm && (() => {
                const rem = task.recurring.dueAtKm - parseOdo(vehicleOdo);
                const overdue = rem <= 0;
                return <span style={{ fontSize: 9, color: overdue ? "#e74c3c" : "#c9a84c", letterSpacing: 1 }}>{overdue ? "OVERDUE" : `due @ ${fmt(task.recurring.dueAtKm)}`}</span>;
              })()}
              {task.recurring && task.recurring.dueByDate && !task.recurring.dueAtKm && (
                <span style={{ fontSize: 9, color: new Date(task.recurring.dueByDate) < new Date() ? "#e74c3c" : "#c9a84c", letterSpacing: 1 }}>{new Date(task.recurring.dueByDate) < new Date() ? "OVERDUE" : `due ${task.recurring.dueByDate}`}</span>
              )}
              {!task.recurring && task.mileage && <span style={{ fontSize: 9, color: "#c9a84c" }}>@ {task.mileage}</span>}
            </div>
          </div>
          <span onClick={e => { e.stopPropagation(); setDeletingId(task.id); setDeletingType("task"); }}
            style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px", lineHeight: 1 }}>✕</span>
        </div>

        {/* Delete confirmation */}
        {deletingId === task.id && deletingType === "task" && (
          <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 11, color: "#c0392b" }}>Delete this task?</span>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={e => { e.stopPropagation(); setTasks(prev => prev.filter(t => t.id !== task.id)); setDeletingId(null); }} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
              <button onClick={e => { e.stopPropagation(); setDeletingId(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
            </div>
          </div>
        )}

        {!isExp && <div onClick={() => setExpandedId(task.id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -4 }}><span style={{ fontSize: 10, color: "#333" }}>▼</span></div>}

        {/* ─── EXPANDED ─── */}
        {isExp && (
          <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
            {/* Title */}
            <div>
              <div style={sh}>Title</div>
              {isET ? (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input value={titleText} onChange={e => setTitleText(e.target.value)} style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                  <button onClick={e => { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === task.id ? { ...t, title: titleText } : t)); setEditingTitle(null); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                  <button onClick={e => { e.stopPropagation(); setEditingTitle(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#f0e6c8" }}>{task.title}<span onClick={e => { e.stopPropagation(); setEditingTitle(task.id); setTitleText(task.title); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
              )}
            </div>
            {/* Mileage */}
            <div>
              <div style={sh}>Mileage</div>
              {isEM ? (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input value={mileageText} onChange={e => setMileageText(e.target.value)} placeholder="e.g. 88734 km" style={{ background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", width: 140 }} />
                  <button onClick={e => saveMileage(task.id, e)} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                  <button onClick={e => { e.stopPropagation(); setEditingMileage(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: task.mileage ? "#c9a84c" : "#444" }}>{task.mileage || "Not recorded"}<span onClick={e => { e.stopPropagation(); setEditingMileage(task.id); setMileageText(task.mileage || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
              )}
            </div>
            {/* Notes */}
            <div>
              <div style={sh}>Notes</div>
              {isEN ? (
                <div>
                  <AutoTextarea value={noteText} onChange={e => setNoteText(e.target.value)} style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                    <button onClick={e => saveNote(task.id, e)} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                    <button onClick={e => { e.stopPropagation(); setEditingNote(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#b8b0a0", lineHeight: 1.7 }}>{task.notes || "No notes"}<span onClick={e => { e.stopPropagation(); setEditingNote(task.id); setNoteText(task.notes || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
              )}
            </div>
            {/* Recurring */}
            {task.recurring && (
              <div>
                <div style={sh}>Recurring</div>
                <div style={{ fontSize: 12, color: "#c9a84c", lineHeight: 1.7 }}>
                  {task.recurring.kmInterval && <span>Every {task.recurring.kmInterval.toLocaleString()} km</span>}
                  {task.recurring.kmInterval && task.recurring.monthsInterval && <span> or </span>}
                  {task.recurring.monthsInterval && <span>Every {task.recurring.monthsInterval} months</span>}
                  {task.recurring.dueAtKm && <span style={{ color: "#888" }}> · Next @ {fmt(task.recurring.dueAtKm)}</span>}
                  {task.recurring.dueByDate && <span style={{ color: "#888" }}> · Next by {task.recurring.dueByDate}</span>}
                </div>
              </div>
            )}
            {/* Parts */}
            {task.parts && task.parts.length > 0 && <div><div style={sh}>Parts / Materials</div><ul style={{ margin: 0, paddingLeft: 16, fontSize: 12, color: "#9a9080", lineHeight: 1.9 }}>{task.parts.map((p, i) => <li key={i}>{p}</li>)}</ul></div>}
            {/* Shopping list items for purchase-stage tasks */}
            {task.stage === "purchase" && (() => {
              const related = purchases.filter(p => (p.notes || "").includes("For: " + task.title) || (task.parts || []).some(pt => p.item === pt || p.item.includes(pt.split(" (")[0])));
              const toBuy = related.filter(p => p.status === "tobuy");
              const ordered = related.filter(p => p.status === "ordered");
              if (toBuy.length === 0 && ordered.length === 0) return null;
              return (
                <div>
                  <div style={sh}>Shopping List</div>
                  {toBuy.map(p => (
                    <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, lineHeight: 1.9 }}>
                      <span style={{ color: "#c9a84c" }}>○</span>
                      <span style={{ color: "#b8b0a0", flex: 1 }}>{p.item}</span>
                      {p.cost && <span style={{ color: "#c9a84c", fontSize: 11 }}>{p.cost}</span>}
                      <span style={{ fontSize: 9, color: "#555", letterSpacing: 1 }}>TO BUY</span>
                    </div>
                  ))}
                  {ordered.map(p => (
                    <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, lineHeight: 1.9 }}>
                      <span style={{ color: "#d68910" }}>◉</span>
                      <span style={{ color: "#b8b0a0", flex: 1 }}>{p.item}</span>
                      {p.cost && <span style={{ color: "#c9a84c", fontSize: 11 }}>{p.cost}</span>}
                      <span style={{ fontSize: 9, color: "#d68910", letterSpacing: 1 }}>ORDERED</span>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* Action buttons */}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", paddingTop: 4 }}>
              <button onClick={e => { e.stopPropagation(); setPickerId(pickerId === task.id && pickerField === "priority" ? null : task.id); setPickerField("priority"); }} style={{ background: pickerId === task.id && pickerField === "priority" ? pc.color + "22" : "transparent", color: pc.color, border: `1px solid ${pc.color}55`, borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{pc.label}</button>
              <button onClick={e => { e.stopPropagation(); setPickerId(pickerId === task.id && pickerField === "stage" ? null : task.id); setPickerField("stage"); }} style={{ background: pickerId === task.id && pickerField === "stage" ? sc.color + "22" : "transparent", color: sc.color, border: `1px solid ${sc.color}55`, borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{sc.icon} {sc.label}</button>
              <button onClick={e => { e.stopPropagation(); setPickerId(pickerId === task.id && pickerField === "type" ? null : task.id); setPickerField("type"); }} style={{ background: pickerId === task.id && pickerField === "type" ? tc.color + "22" : "transparent", color: tc.color, border: `1px solid ${tc.color}55`, borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{tc.abbr}</button>
              <button onClick={e => startDone(task.id, e)} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>✓ Done</button>
            </div>

            {/* Priority picker */}
            {pickerId === task.id && pickerField === "priority" && (
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", paddingTop: 8 }}>
                {PRIORITIES.map(p => {
                  const cfg = PRIORITY_CONFIG[p];
                  const active = task.priority === p;
                  return <button key={p} onClick={e => { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === task.id ? { ...t, priority: p } : t)); setPickerId(null); setOpenPriorityGroups(prev => ({ ...prev, [p]: true })); setTimeout(() => { const el = document.getElementById("task-" + task.id); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 100); }} style={{
                    background: active ? cfg.color + "33" : "transparent", color: active ? cfg.color : "#555",
                    border: `1px solid ${active ? cfg.color + "88" : "#2e2e2a"}`,
                    borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: active ? 700 : 400,
                  }}>{cfg.label}</button>;
                })}
              </div>
            )}

            {/* Stage picker */}
            {pickerId === task.id && pickerField === "stage" && (
              <div style={{ paddingTop: 8 }}>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {STAGES.map(s => {
                    const cfg = STAGE_CONFIG[s];
                    const active = task.stage === s;
                    if (s === "purchase" && task.stage !== "purchase") {
                      return <button key={s} onClick={e => { e.stopPropagation(); setPickerField("stage_purchase"); setStagePickerShopItem(""); setStagePickerShopCost(""); }} style={{
                        background: "transparent", color: cfg.color,
                        border: `1px solid ${cfg.color}44`,
                        borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                      }}>{cfg.icon} {cfg.label}</button>;
                    }
                    return <button key={s} onClick={e => { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === task.id ? { ...t, stage: s } : t)); setPickerId(null); }} style={{
                      background: active ? cfg.color + "33" : "transparent", color: active ? cfg.color : "#555",
                      border: `1px solid ${active ? cfg.color + "88" : "#2e2e2a"}`,
                      borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: active ? 700 : 400,
                    }}>{cfg.icon} {cfg.label}</button>;
                  })}
                </div>
              </div>
            )}

            {/* Stage → Purchase with shopping list prompt */}
            {pickerId === task.id && pickerField === "stage_purchase" && (
              <div style={{ paddingTop: 8 }}>
                <div style={{ fontSize: 9, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Add to Shopping List? (optional)</div>
                <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  <input value={stagePickerShopItem} onChange={e => setStagePickerShopItem(e.target.value)} placeholder="Item name..." style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c44", borderRadius: 3, padding: "6px 8px", fontSize: 12, fontFamily: "inherit" }} />
                  <input value={stagePickerShopCost} onChange={e => setStagePickerShopCost(e.target.value)} placeholder="Cost" style={{ width: 80, background: "#1a1a18", color: "#c9a84c", border: "1px solid #c9a84c44", borderRadius: 3, padding: "6px 8px", fontSize: 12, fontFamily: "inherit" }} />
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={e => { e.stopPropagation();
                    if (stagePickerShopItem.trim()) {
                      setPurchasesRaw(prev => [...prev, { id: Date.now() + 1, item: stagePickerShopItem.trim(), cost: stagePickerShopCost, status: "tobuy", notes: "For: " + task.title, partsCategory: "Engine", partsType: "OEM" }]);
                    }
                    setTasks(prev => prev.map(t => t.id === task.id ? { ...t, stage: "purchase" } : t)); setPickerId(null); setPickerField(null);
                  }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{stagePickerShopItem.trim() ? "Move + Add Item" : "Move to Purchase"}</button>
                  <button onClick={e => { e.stopPropagation(); setPickerField("stage"); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                </div>
              </div>
            )}

            {/* Type picker */}
            {pickerId === task.id && pickerField === "type" && (
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", paddingTop: 8 }}>
                {TYPES.map(t => {
                  const cfg = TYPE_CONFIG[t];
                  const active = task.type === t;
                  return <button key={t} onClick={e => { e.stopPropagation(); setTasks(prev => prev.map(tk => tk.id === task.id ? { ...tk, type: t } : tk)); setPickerId(null); }} style={{
                    background: active ? cfg.color + "33" : "transparent", color: active ? cfg.color : "#555",
                    border: `1px solid ${active ? cfg.color + "88" : "#2e2e2a"}`,
                    borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: active ? 700 : 400,
                  }}>{cfg.label}</button>;
                })}
              </div>
            )}

            {/* ─── DONE FLOWS ─── */}

            {/* MONITOR DONE */}
            {doneId === task.id && doneStep === "monitor_done" && (
              <div style={{ background: "#252520", border: "1px solid #3a7fc144", borderRadius: 4, padding: "12px 14px", marginTop: 4 }}>
                <div style={{ fontSize: 10, color: "#3a7fc1", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Monitoring Complete — What Next?</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={e => { e.stopPropagation(); promoteToStage(task, "inspect"); }} style={{ background: "#d6891022", color: "#d68910", border: "1px solid #d6891055", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Inspect</button>
                  <button onClick={e => { e.stopPropagation(); setStagePickerShopItem(""); setStagePickerShopCost(""); setDoneStep("done_to_purchase"); }} style={{ background: "#c9a84c22", color: "#c9a84c", border: "1px solid #c9a84c55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Purchase</button>
                  <button onClick={e => { e.stopPropagation(); promoteToStage(task, "install"); }} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Install</button>
                  <button onClick={e => { e.stopPropagation(); setDoneStep("resolve"); }} style={{ background: "#55555522", color: "#888", border: "1px solid #55555555", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Resolve (no action)</button>
                  <button onClick={e => { e.stopPropagation(); setDoneId(null); setDoneStep(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              </div>
            )}

            {/* INSPECT DONE */}
            {doneId === task.id && doneStep === "inspect_done" && (
              <div style={{ background: "#252520", border: "1px solid #d6891044", borderRadius: 4, padding: "12px 14px", marginTop: 4 }}>
                <div style={{ fontSize: 10, color: "#d68910", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Inspection Complete — What Next?</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={e => { e.stopPropagation(); setDoneStep("resolve"); }} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Passed ✓ (resolve)</button>
                  <button onClick={e => { e.stopPropagation(); setStagePickerShopItem(""); setStagePickerShopCost(""); setDoneStep("done_to_purchase"); }} style={{ background: "#c9a84c22", color: "#c9a84c", border: "1px solid #c9a84c55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Needs work → Purchase</button>
                  <button onClick={e => { e.stopPropagation(); promoteToStage(task, "install"); }} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Needs work → Install (have parts)</button>
                  <button onClick={e => { e.stopPropagation(); setDoneId(null); setDoneStep(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              </div>
            )}

            {/* DONE → PURCHASE with shopping list prompt */}
            {doneId === task.id && doneStep === "done_to_purchase" && (
              <div style={{ background: "#252520", border: "1px solid #c9a84c44", borderRadius: 4, padding: "12px 14px", marginTop: 4 }}>
                <div style={{ fontSize: 9, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Add to Shopping List? (optional)</div>
                <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  <input value={stagePickerShopItem} onChange={e => setStagePickerShopItem(e.target.value)} placeholder="Item name..." style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c44", borderRadius: 3, padding: "6px 8px", fontSize: 12, fontFamily: "inherit" }} />
                  <input value={stagePickerShopCost} onChange={e => setStagePickerShopCost(e.target.value)} placeholder="Cost" style={{ width: 80, background: "#1a1a18", color: "#c9a84c", border: "1px solid #c9a84c44", borderRadius: 3, padding: "6px 8px", fontSize: 12, fontFamily: "inherit" }} />
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={e => { e.stopPropagation();
                    if (stagePickerShopItem.trim()) {
                      setPurchasesRaw(prev => [...prev, { id: Date.now() + 1, item: stagePickerShopItem.trim(), cost: stagePickerShopCost, status: "tobuy", notes: "For: " + task.title, partsCategory: "Engine", partsType: "OEM" }]);
                    }
                    promoteToStage(task, "purchase");
                  }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{stagePickerShopItem.trim() ? "Move + Add Item" : "Move to Purchase"}</button>
                  <button onClick={e => { e.stopPropagation(); setDoneId(null); setDoneStep(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              </div>
            )}

            {/* PURCHASE DONE */}
            {doneId === task.id && doneStep === "purchase_done" && (
              <div style={{ background: "#252520", border: "1px solid #c9a84c44", borderRadius: 4, padding: "12px 14px", marginTop: 4 }}>
                <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Purchase Stage — What Next?</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={e => { e.stopPropagation(); addToShoppingList(task); }} style={{ background: "#c9a84c22", color: "#c9a84c", border: "1px solid #c9a84c55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Add parts to Shopping List → Install</button>
                  <button onClick={e => { e.stopPropagation(); promoteToStage(task, "install"); }} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Already have parts → Install</button>
                  <button onClick={e => { e.stopPropagation(); setDoneId(null); setDoneStep(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              </div>
            )}

            {/* INSTALL DONE */}
            {doneId === task.id && doneStep === "install_done" && (
              <div style={{ background: "#252520", border: "1px solid #2ea84a44", borderRadius: 4, padding: "12px 14px", marginTop: 4 }}>
                <div style={{ fontSize: 10, color: "#2ea84a", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Install Complete — Log It</div>
                <input value={doneMileage} onChange={e => setDoneMileage(e.target.value)} placeholder="Mileage (e.g. 89,100 km)" style={{ width: "100%", background: "#1a1a18", color: "#c9a84c", border: "1px solid #2ea84a", borderRadius: 3, padding: "6px 8px", fontSize: 12, fontFamily: "inherit", marginBottom: 8, boxSizing: "border-box" }} />
                <AutoTextarea value={doneNote} onChange={e => setDoneNote(e.target.value)} placeholder="Service log note (optional)" style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #2ea84a", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box", marginBottom: 8 }} />
                {renderRepeatUI()}
                {task.type === "modification" && (
                  <div style={{ borderTop: "1px solid #2a2a26", paddingTop: 10, marginBottom: 8 }}>
                    <div style={{ fontSize: 9, color: "#7c3ac1", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Add to Parts List?</div>
                    <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                      <button onClick={() => { const i = PARTS_CATEGORIES.indexOf(donePartCategory); setDonePartCategory(PARTS_CATEGORIES[(i + 1) % PARTS_CATEGORIES.length]); }}
                        style={{ flex: 1, background: "transparent", color: PARTS_CAT_COLORS[donePartCategory], border: `1px solid ${PARTS_CAT_COLORS[donePartCategory]}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}>{donePartCategory} →</button>
                      <button onClick={() => setDonePartType(donePartType === "OEM" ? "Aftermarket" : "OEM")}
                        style={{ width: 120, background: "transparent", color: donePartType === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${donePartType === "OEM" ? "#c0392b" : "#2e86c1"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{donePartType} →</button>
                    </div>
                  </div>
                )}
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={e => { e.stopPropagation(); finishInstallLog(task); }} style={{ background: "#2ea84a", color: "#1a1a18", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Log to Service History</button>
                  {task.type === "modification" && (
                    <button onClick={e => { e.stopPropagation(); finishInstallWithParts(task); }} style={{ background: "#7c3ac1", color: "#fff", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Log + Add to Parts List</button>
                  )}
                  <button onClick={e => { e.stopPropagation(); setDoneId(null); setDoneStep(null); setRepeatChoice(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              </div>
            )}

            {/* RESOLVE (shared) */}
            {doneId === task.id && doneStep === "resolve" && (
              <div style={{ background: "#252520", border: "1px solid #55555544", borderRadius: 4, padding: "12px 14px", marginTop: 4 }}>
                <div style={{ fontSize: 10, color: "#888", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Resolve — Log & Remove</div>
                <input value={doneMileage} onChange={e => setDoneMileage(e.target.value)} placeholder="Mileage (optional)" style={{ width: "100%", background: "#1a1a18", color: "#c9a84c", border: "1px solid #555", borderRadius: 3, padding: "6px 8px", fontSize: 12, fontFamily: "inherit", marginBottom: 8, boxSizing: "border-box" }} />
                <AutoTextarea value={doneNote} onChange={e => setDoneNote(e.target.value)} placeholder="Note (optional)" style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #555", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box", marginBottom: 8 }} />
                {renderRepeatUI()}
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={e => { e.stopPropagation(); resolveTask(task, true); }} style={{ background: "#2ea84a", color: "#1a1a18", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Resolve + Log</button>
                  <button onClick={e => { e.stopPropagation(); resolveTask(task, false); }} style={{ background: "#55555533", color: "#888", border: "1px solid #55555555", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Resolve (no log)</button>
                  <button onClick={e => { e.stopPropagation(); setDoneId(null); setDoneStep(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}
        {isExp && <div onClick={() => setExpandedId(null)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, paddingTop: 2 }}><span style={{ fontSize: 10, color: "#333" }}>▲</span></div>}
      </div>
    );
  }

  /* ─── TABS ─── */
  const tabDefs = [
    { key: "queue", label: "Work Queue", count: tasks.length, color: "#c0392b" },
    { key: "purchases", label: "Shopping List", count: purchases.filter(p => p.status !== "received").length, color: "#c9a84c" },
    { key: "log", label: "Service Log", count: serviceLog.length, color: "#2ea84a" },
    { key: "vehicle", label: "Vehicle Info", count: null, color: "#7c3ac1" },
  ];

  const filteredLog = serviceLog.filter(i => logFilter === "All" || i.category === logFilter);
  const logCategories = ["All", ...Array.from(new Set(serviceLog.map(s => s.category)))];

  /* ─── RENDER ─── */
  if (syncStatus === "loading") {
    return (
      <div style={{ maxWidth: 720, margin: "0 auto", textAlign: "center", paddingTop: 120 }}>
        <div style={{ borderLeft: "4px solid #c0392b", paddingLeft: 16, display: "inline-block", textAlign: "left", marginBottom: 30 }}>
          <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: "#f0e6c8" }}>ActyTracker</h1>
          <div style={{ fontSize: 10, color: "#c0392b", letterSpacing: 3, textTransform: "uppercase", marginTop: 4 }}>HA4 · 660cc · E07A</div>
        </div>
        <div style={{ fontSize: 11, color: "#555", letterSpacing: 2, textTransform: "uppercase" }}>☁ Loading...</div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 720, margin: "0 auto" }}>
      {/* HEADER */}
      <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
        <div style={{ borderLeft: "4px solid #c0392b", paddingLeft: 16, flex: 1 }}>
          <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: "#f0e6c8" }}>1994 Honda Acty</h1>
          <div style={{ fontSize: 10, color: "#c0392b", letterSpacing: 3, textTransform: "uppercase", marginTop: 4 }}>HA4 · 660cc · E07A</div>
        </div>
        <button onClick={() => setAddMode(addMode ? null : "choose")}
          style={{ width: 44, height: 44, borderRadius: 8, background: "transparent", color: addMode ? "#c0392b" : "#2ea84a", border: "2px solid #e8e0c8", fontSize: 24, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, lineHeight: 1, paddingRight: addMode ? 2 : 0 }}>
          {addMode ? "×" : "+"}
        </button>
      </div>

      {/* ─── ADD ITEM FORM ─── */}
      {addMode === "choose" && (
        <div style={{ background: "#222220", border: "1px solid #e8e0c8", borderRadius: 6, padding: "16px", marginBottom: 20 }}>
          <div style={{ fontSize: 10, color: "#e8e0c8", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10, textAlign: "center" }}>Add New Item</div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setAddMode("task")} style={{ flex: 1, background: "transparent", color: "#c0392b", border: "2px solid #c0392b", borderRadius: 4, padding: "12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, letterSpacing: 1 }}>Work Queue Task</button>
            <button onClick={() => setAddMode("purchase")} style={{ flex: 1, background: "transparent", color: "#c9a84c", border: "2px solid #c9a84c", borderRadius: 4, padding: "12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, letterSpacing: 1 }}>Shopping List Item</button>
          </div>
        </div>
      )}

      {addMode === "task" && (
        <div style={{ background: "#222220", border: "1px solid #c9a84c44", borderRadius: 4, padding: "14px", marginBottom: 20 }}>
          <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>New Work Queue Task</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <input value={addTitle} onChange={e => setAddTitle(e.target.value)} placeholder="Task title..." style={{ background: "#1a1a18", color: "#e8e0c8", border: "1px solid #2e2e2a", borderRadius: 3, padding: "8px 10px", fontSize: 13, fontFamily: "inherit" }} />
            <AutoTextarea value={addNotes} onChange={e => setAddNotes(e.target.value)} placeholder="Notes (optional)..." style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #2e2e2a", borderRadius: 3, padding: "8px 10px", fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
            {/* Stage */}
            <div>
              <div style={{ fontSize: 9, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Starting Stage</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {STAGES.map(s => {
                  const cfg = STAGE_CONFIG[s];

            </div>
            {aftermarketOpen && (
              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px" }}>
                <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
                  {[["All", "200,195,180"], ...PARTS_CATEGORIES.map(c => { const rgbMap = { Engine: "192,57,43", Drivetrain: "214,137,16", Electric: "201,168,76", "Brakes/Suspension": "46,168,74", "Wheels/Tires": "46,134,193", Cosmetic: "124,58,193" }; return [c, rgbMap[c]]; })].map(([c, rgb]) => {
                    const active = partsFilter === c;
                    return <button key={c} onClick={() => setPartsFilter(c)} style={{
                      background: active ? `rgba(${rgb},0.12)` : "transparent", color: active ? `rgb(${rgb})` : "#333",
                      border: `1px solid ${active ? `rgba(${rgb},0.35)` : "#2e2e2a"}`,
                      borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit",
                    }}>{c}</button>;
                  })}
                </div>
                {aftermarketItems.filter(p => partsFilter === "All" || (typeof p === "object" ? p.category : "") === partsFilter).map((item, idx) => {
                  const id = typeof item === "object" ? (item.id || idx) : idx;
                  const name = typeof item === "object" ? item.name : item;
                  const cat = typeof item === "object" ? item.category : "Uncategorized";
                  const type = typeof item === "object" ? item.type : "Aftermarket";
                  const installed = typeof item === "object" ? item.installedDate : null;
                  const partNotes = typeof item === "object" ? item.notes : "";
                  const catColor = PARTS_CAT_COLORS[cat] || "#555";
                  const isPartExp = expandedPartId === id;
                  return (
                    <div key={id} style={{ background: "#1a1a18", border: "1px solid #2e2e2a", borderLeft: `3px solid ${catColor}`, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
                      <div onClick={() => setExpandedPartId(isPartExp ? null : id)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, color: "#f0e6c8" }}>{name}</div>
                          <div style={{ fontSize: 10, color: "#555", marginTop: 1, display: "flex", gap: 6, alignItems: "center" }}>
                            <span style={{ color: catColor }}>{cat}</span>
                            {installed && <span>· {installed}</span>}
                          </div>
                        </div>
                        <span style={{ fontSize: 8, color: type === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${type === "OEM" ? "#c0392b44" : "#2e86c144"}`, borderRadius: 2, padding: "1px 5px", letterSpacing: 1, flexShrink: 0 }}>{type}</span>
                        <span onClick={e => { e.stopPropagation(); setDeletingId(id); setDeletingType("part"); }} style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px", lineHeight: 1, flexShrink: 0 }}>✕</span>
                      </div>
                      {deletingId === id && deletingType === "part" && (
                        <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 11, color: "#c0392b" }}>Delete this part?</span>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={e => { e.stopPropagation(); setAftermarketItems(prev => prev.filter(p => p !== item)); setDeletingId(null); }} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
                            <button onClick={e => { e.stopPropagation(); setDeletingId(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        </div>
                      )}
                      {!isPartExp && <div onClick={() => setExpandedPartId(id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -4 }}><span style={{ fontSize: 10, color: "#333" }}>▼</span></div>}
                      {isPartExp && (
                        <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
                          <div><div style={sh}>Name</div>
                            {editingPartField?.id === id && editingPartField?.field === "name" ? (
                              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                <input value={partFieldText} onChange={e => setPartFieldText(e.target.value)} style={{ flex: 1, background: "#222220", color: "#e8e0c8", border: "1px solid #7c3ac1", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                                <button onClick={() => { setAftermarketItems(prev => prev.map(p => p === item ? { ...p, name: partFieldText } : p)); setEditingPartField(null); }} style={{ background: "#7c3ac1", color: "#fff", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                                <button onClick={() => setEditingPartField(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                              </div>
                            ) : (
                              <div style={{ fontSize: 12, color: "#f0e6c8" }}>{name}<span onClick={() => { setEditingPartField({ id, field: "name" }); setPartFieldText(name); }} style={{ marginLeft: 8, fontSize: 10, color: "#7c3ac1", cursor: "pointer" }}>[edit]</span></div>
                            )}
                          </div>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={() => { const i = PARTS_CATEGORIES.indexOf(cat); setAftermarketItems(prev => prev.map(p => p === item ? { ...p, category: PARTS_CATEGORIES[(i + 1) % PARTS_CATEGORIES.length] } : p)); }}
                              style={{ flex: 1, background: "transparent", color: PARTS_CAT_COLORS[cat] || "#555", border: `1px solid ${PARTS_CAT_COLORS[cat] || "#555"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}>{cat} →</button>
                            <button onClick={() => { setAftermarketItems(prev => prev.map(p => p === item ? { ...p, type: type === "OEM" ? "Aftermarket" : "OEM" } : p)); }}
                              style={{ width: 120, background: "transparent", color: type === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${type === "OEM" ? "#c0392b" : "#2e86c1"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{type} →</button>
                          </div>
                          <div><div style={sh}>Installed</div>
                            {editingPartField?.id === id && editingPartField?.field === "date" ? (
                              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                <input value={partFieldText} onChange={e => setPartFieldText(e.target.value)} style={{ flex: 1, background: "#222220", color: "#e8e0c8", border: "1px solid #7c3ac1", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                                <button onClick={() => { setAftermarketItems(prev => prev.map(p => p === item ? { ...p, installedDate: partFieldText } : p)); setEditingPartField(null); }} style={{ background: "#7c3ac1", color: "#fff", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                                <button onClick={() => setEditingPartField(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                              </div>
                            ) : (
                              <div style={{ fontSize: 12, color: installed ? "#c9a84c" : "#444" }}>{installed || "Not recorded"}<span onClick={() => { setEditingPartField({ id, field: "date" }); setPartFieldText(installed || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#7c3ac1", cursor: "pointer" }}>[edit]</span></div>
                            )}
                          </div>
                          <div><div style={sh}>Notes</div>
                            {editingPartField?.id === id && editingPartField?.field === "notes" ? (
                              <div>
                                <AutoTextarea value={partFieldText} onChange={e => setPartFieldText(e.target.value)} style={{ width: "100%", background: "#222220", color: "#e8e0c8", border: "1px solid #7c3ac1", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
                                <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                                  <button onClick={() => { setAftermarketItems(prev => prev.map(p => p === item ? { ...p, notes: partFieldText } : p)); setEditingPartField(null); }} style={{ background: "#7c3ac1", color: "#fff", border: "none", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                                  <button onClick={() => setEditingPartField(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                                </div>
                              </div>
                            ) : (
                              <div style={{ fontSize: 12, color: "#b8b0a0", lineHeight: 1.7 }}>{partNotes || "No notes"}<span onClick={() => { setEditingPartField({ id, field: "notes" }); setPartFieldText(partNotes || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#7c3ac1", cursor: "pointer" }}>[edit]</span></div>
                            )}
                          </div>
                        </div>
                      )}
                      {isPartExp && <div onClick={() => setExpandedPartId(null)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, paddingTop: 2 }}><span style={{ fontSize: 10, color: "#333" }}>▲</span></div>}
                    </div>
                  );
                })}
                {aftermarketItems.filter(p => partsFilter === "All" || (typeof p === "object" ? p.category : "") === partsFilter).length === 0 && (
                  <div style={{ color: "#444", fontSize: 12, padding: 10, textAlign: "center" }}>No parts in this category.</div>
                )}
              </div>
            )}
          </div>

          {/* Shops & Contacts */}
          <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, marginBottom: 12, overflow: "hidden" }}>
            <div onClick={() => setContactsOpen(!contactsOpen)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 10, color: "#7c3ac1", letterSpacing: 3, textTransform: "uppercase" }}>Shops & Contacts</div>
              <span style={{ fontSize: 10, color: "#444" }}>{contactsOpen ? "▲" : "▼"}</span>
            </div>
            {contactsOpen && (
              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 14 }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#f0e6c8" }}>Tagami Auto Service</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Annual safety check</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0", marginTop: 2 }}>1733 Kahai St, Honolulu, HI 96819</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0" }}>(808) 841-5009</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>Hours: 7–10 AM, then 12–4 PM. Call ahead.</div>
                  <div style={{ fontSize: 10, color: "#d68910", marginTop: 2 }}>Tip: follow the old man's instructions. He can be grumpy but it's simple.</div>
                </div>
                <div style={{ borderTop: "1px solid #2a2a26", paddingTop: 12 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#f0e6c8" }}>JDM Imports Hawaii — Aaron Rideout</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Mechanical work, upgrades (no body work)</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0", marginTop: 2 }}>Same address — subleases from Tagami Auto</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0" }}>(808) 391-3425</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>Call for appointment. Prev. owner's recommendation.</div>
                </div>
              </div>
            )}
          </div>

          {/* Previous Owner Notes */}
          <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, marginBottom: 12, overflow: "hidden" }}>
            <div onClick={() => setPrevOwnerOpen(!prevOwnerOpen)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 10, color: "#7c3ac1", letterSpacing: 3, textTransform: "uppercase" }}>Previous Owner Notes (Original Doc)</div>
              <span style={{ fontSize: 10, color: "#444" }}>{prevOwnerOpen ? "▲" : "▼"}</span>
            </div>
            {prevOwnerOpen && (
              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px" }}>
                <div style={{ fontSize: 11, color: "#9a9080", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{`Good to Know Stuffs:
• Tires - inflate to 35 psi
• Gas - unleaded; tank is on the driver's side just past the door
• Oil - 10w-30; tank is on the passenger side towards the end of the bed; the dipstick is tucked in by the back wheel on the passenger side under the wheel well; use the smaller nozzle (blue) hanging in the bed
• Battery - passenger side between the wheels; hand-tightened cover, no tools needed; battery is brand new
• Water - the battery cover also houses the overflow tank; the overflow tank is to the left of the battery; top off whenever temp gauge goes above halfway; use the bigger nozzle (clear) hanging in the bed
• Tires - less than a year old
• Radiator - less than a year old
• Starter Motor - brand new

Recommendations:
1. Drive under 80 KPH (48 MPH)
2. Avoid potholes, divots, manhole covers — 4-lug wheels don't absorb uneven surfaces well
3. If you need a tow, get a flatbed. If not possible, tell driver not to go over 30 MPH
4. Top off the overflow tank every week or two
5. One quart of oil per year is plenty
6. When insuring, make sure they know it's a "kei" truck — 3 cyl, 660cc. Keeps payment low
7. Drive slow and defensive — only safety feature is the seat belt
8. Tagami Auto Service for safety check — 1733 Kahai St, (808) 841-5009
9. JDM Imports Hawaii for mechanical — Aaron Rideout, (808) 391-3425

Helpful Links:
• honda-acty.com/ha3-ha4-acty-truck/ — parts/accessories
• oiwa.co — tips from a longtime owner
• roadlancer.com/honda-mini-truck/ — owner tips
• minitruckimports.com/honda-acty-maintenance-tips/`}</div>
              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{ marginTop: 20, display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
            <div style={{ fontSize: 9, color: syncStatus === "saved" ? "#2ea84a" : syncStatus === "saving" ? "#c9a84c" : syncStatus === "offline" ? "#c0392b" : syncStatus === "loading" ? "#555" : "#333", letterSpacing: 1 }}>
              {syncStatus === "saved" ? "☁ SYNCED" : syncStatus === "saving" ? "☁ SAVING..." : syncStatus === "offline" ? "⚠ OFFLINE — changes not saved" : syncStatus === "loading" ? "☁ LOADING..." : ""}
            </div>
            <button onClick={() => {
              const state = { tasks, serviceLog, vehicleOdo, purchases, aftermarket: aftermarketItems };
              const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
              const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
              a.download = "acty-backup-" + new Date().toISOString().slice(0, 10) + ".json"; a.click();
            }} style={{ background: "transparent", color: "#2e2e2a", border: "1px solid #2e2e2a", borderRadius: 3, padding: "6px 16px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>Export Backup</button>
            <button onClick={() => {
              const input = document.createElement("input"); input.type = "file"; input.accept = ".json";
              input.onchange = e => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                  try {
                    const data = JSON.parse(ev.target.result);
                    if (data.tasks) setTasksRaw(autoEscalate(data.tasks, data.vehicleOdo || vehicleOdo));
                    if (data.serviceLog) setServiceLogRaw(data.serviceLog);
                    if (data.vehicleOdo) setVehicleOdoRaw(data.vehicleOdo);
                    if (data.purchases) setPurchasesRaw(data.purchases);
                    if (data.aftermarket) setAftermarketItems(data.aftermarket);
                    setSyncStatus("saving");
                  } catch { alert("Could not read backup file."); }
                };
                reader.readAsText(file);
              };
              input.click();
            }} style={{ background: "transparent", color: "#2e2e2a", border: "1px solid #2e2e2a", borderRadius: 3, padding: "6px 16px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>Import Backup</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<ActyTracker />, document.getElementById("root"));
</script>
</body>
</html>
