if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'acty-v1';
    const URLS_TO_CACHE = [
      './',
      './index.html',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js'
    ];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(URLS_TO_CACHE)).then(() => self.skipWaiting()));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))).then(() => self.clients.claim()));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => {
          if (cached) return cached;
          return fetch(e.request).then(response => {
            if (response && response.status === 200) {
              const clone = response.clone();
              caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
            }
            return response;
          }).catch(() => cached);
        })
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => {
    // Blob SW registration may fail due to scope restrictions — that's OK,
    // the app still works, just without offline caching.
    // For full offline support, save the SW as a separate file (sw.js) at the same directory.
  });
}

const STORAGE_KEY = "acty_tracker_v2";
const JSONBIN_KEY = "$2a$10$k8e6dDUkcBTWUYPEopWhEuKlQzn2yGacUCZugtl0JWrGJbzi.LC1i";
const BIN_ID_KEY = "acty_bin_id";

function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return fallback;
    const data = JSON.parse(raw);
    return data[key] !== undefined ? data[key] : fallback;
  } catch { return fallback; }
}

function saveLocal(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// Cloud sync functions
async function cloudSave(state) {
  saveLocal(state); // always save locally first
  const binId = localStorage.getItem(BIN_ID_KEY);
  try {
    if (binId) {
      await fetch("https://api.jsonbin.io/v3/b/" + binId, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
        body: JSON.stringify(state)
      });
    } else {
      const res = await fetch("https://api.jsonbin.io/v3/b", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY, "X-Bin-Name": "acty-tracker" },
        body: JSON.stringify(state)
      });
      const data = await res.json();
      if (data?.metadata?.id) localStorage.setItem(BIN_ID_KEY, data.metadata.id);
    }
  } catch {} // fail silently, local save is the backup
}

async function cloudLoad() {
  const binId = localStorage.getItem(BIN_ID_KEY);
  if (!binId) return null;
  try {
    const res = await fetch("https://api.jsonbin.io/v3/b/" + binId + "/latest", {
      headers: { "X-Master-Key": JSONBIN_KEY }
    });
    const data = await res.json();
    return data?.record || null;
  } catch { return null; }
}

function loadState(key, fallback) { return loadLocal(key, fallback); }

/* ─── HELPERS ─── */ /* v2 */
function formatMileage(val) {
  if (!val && val !== 0) return val;
  const str = String(val);
  const digits = str.replace(/[^0-9]/g, "");
  if (!digits) return str;
  const num = parseInt(digits, 10);
  return num.toLocaleString() + " km";
}

function parseOdo(val) {
  if (!val) return 0;
  const digits = String(val).replace(/[^0-9]/g, "");
  return digits ? parseInt(digits, 10) : 0;
}

function getRecurringDue(recurring, completedAtKm) {
  if (!recurring) return null;
  const result = {};
  if (recurring.kmInterval && completedAtKm) {
    result.dueAtKm = completedAtKm + recurring.kmInterval;
  }
  if (recurring.monthsInterval) {
    const d = new Date();
    d.setMonth(d.getMonth() + recurring.monthsInterval);
    result.dueByDate = d.toLocaleDateString("en-US", { month: "short", year: "numeric" });
  }
  return result;
}

function buildRecurring(choice, currentOdo, kmVal, monthsVal) {
  if (!choice || choice === "none") return null;
  const odo = parseOdo(currentOdo);
  const kmInterval = (choice === "km" || choice === "both") && kmVal ? parseInt(String(kmVal).replace(/[^0-9]/g, ""), 10) : null;
  const monthsInterval = (choice === "months" || choice === "both") && monthsVal ? parseInt(String(monthsVal).replace(/[^0-9]/g, ""), 10) : null;
  if (!kmInterval && !monthsInterval) return null;
  const r = { kmInterval: kmInterval || null, monthsInterval: monthsInterval || null };
  const due = getRecurringDue(r, odo);
  return { ...r, ...due };
}

function autoPromote(issues, currentOdo) {
  const odo = parseOdo(currentOdo);
  const now = new Date();
  return issues.map(i => {
    if (!i.recurring) return i;
    const dueKm = i.recurring.dueAtKm;
    const dueDate = i.recurring.dueByDate ? new Date(i.recurring.dueByDate) : null;
    let newTiming = i.timing;
    // km-based promotion
    if (dueKm && odo > 0) {
      const remaining = dueKm - odo;
      if (remaining <= 1000) newTiming = "thisweek";
      else if (remaining <= 6000) newTiming = "upcoming";
    }
    // date-based promotion
    if (dueDate) {
      const daysUntil = (dueDate - now) / (1000 * 60 * 60 * 24);
      if (daysUntil <= 14 && newTiming !== "thisweek") newTiming = newTiming === "thisweek" ? "thisweek" : "thisweek";
      else if (daysUntil <= 60 && newTiming === "longterm") newTiming = "upcoming";
    }
    return newTiming !== i.timing ? { ...i, timing: newTiming } : i;
  });
}

  const [aftermarketItems, setAftermarketItems] = useState(() => loadState("aftermarket", defaultPartsList));
  const [timingFilter, setTimingFilter] = useState("all");
  const [sectionFilter, setSectionFilter] = useState("all");
  const [priorityFilter, setPriorityFilter] = useState("all");
  const [openSections, setOpenSections] = useState({});
  const [expandedId, setExpandedId] = useState(null);
  const [editingNote, setEditingNote] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [editingMileage, setEditingMileage] = useState(null);
  const [mileageText, setMileageText] = useState("");
  const [editingTitle, setEditingTitle] = useState(null);
  const [titleText, setTitleText] = useState("");
  const [logFilter, setLogFilter] = useState("All");
  const [expandedLogId, setExpandedLogId] = useState(null);
  const [editingLogField, setEditingLogField] = useState(null); // { id, field }
  const [logFieldText, setLogFieldText] = useState("");
  const [expandedPurchaseId, setExpandedPurchaseId] = useState(null);
  const [editingPurchaseNote, setEditingPurchaseNote] = useState(null);
  const [purchaseNoteText, setPurchaseNoteText] = useState("");
  const [editingPurchaseName, setEditingPurchaseName] = useState(null);
  const [purchaseNameText, setPurchaseNameText] = useState("");
  const [infoOpen, setInfoOpen] = useState(true);
  const [prevOwnerOpen, setPrevOwnerOpen] = useState(false);
  const [aftermarketOpen, setAftermarketOpen] = useState(false);
  const [contactsOpen, setContactsOpen] = useState(false);
  const [editingField, setEditingField] = useState(null);
  const [editingFieldValue, setEditingFieldValue] = useState("");
  const [receivingId, setReceivingId] = useState(null);
  const [doneId, setDoneId] = useState(null);
  const [doneNote, setDoneNote] = useState("");
  const [doneMileage, setDoneMileage] = useState("");
  const [doneStep, setDoneStep] = useState(null); // "choose" | "log" | "maint" | "aftermarket"
  const [newMaintTitle, setNewMaintTitle] = useState("");
  const [newMaintNotes, setNewMaintNotes] = useState("");
  const [newMaintParts, setNewMaintParts] = useState("");
  const [donePartCategory, setDonePartCategory] = useState("Interior");
  const [donePartType, setDonePartType] = useState("Aftermarket");
  const [repeatChoice, setRepeatChoice] = useState(null); // null | "km" | "months" | "both" | "none"
  const [repeatKm, setRepeatKm] = useState("");
  const [repeatMonths, setRepeatMonths] = useState("");
  const [addMode, setAddMode] = useState(null);
  const [addTitle, setAddTitle] = useState("");
  const [addNotes, setAddNotes] = useState("");
  const [addSection, setAddSection] = useState("inspections");
  const [addPriority, setAddPriority] = useState("medium");
  const [addTiming, setAddTiming] = useState("upcoming");
  const [addCost, setAddCost] = useState("");
  const [addPartsCategory, setAddPartsCategory] = useState("Engine");
  const [addPartsType, setAddPartsType] = useState("Aftermarket");
  const [editingCost, setEditingCost] = useState(null);
  const [costText, setCostText] = useState("");
  const [deletingId, setDeletingId] = useState(null);
  const [deletingType, setDeletingType] = useState(null); // "task" | "purchase"
  const [syncStatus, setSyncStatus] = useState("idle"); // "idle" | "saving" | "saved" | "offline"

  // Load from cloud on mount
  useEffect(() => {
    cloudLoad().then(cloud => {
      if (cloud) {
        const loadedIssues = cloud.issues || defaultWorkQueue;
        const loadedOdo = cloud.vehicleOdo || "88,734 km";
        setIssuesRaw(autoPromote(loadedIssues, loadedOdo));
        if (cloud.serviceLog) setServiceLogRaw(cloud.serviceLog);
        if (cloud.vehicleOdo) setVehicleOdoRaw(cloud.vehicleOdo);
        if (cloud.purchases) setPurchasesRaw(cloud.purchases);
        if (cloud.aftermarket) setAftermarketItems(cloud.aftermarket);
        saveLocal(cloud);
        setSyncStatus("saved");
      } else {
        // No cloud data — auto-promote defaults
        setIssuesRaw(prev => autoPromote(prev, vehicleOdo));
      }
    }).catch(() => setSyncStatus("offline"));
  }, []);

  // Auto-save with debounce (saves locally immediately, cloud after 2s of inactivity)
  const saveTimerRef = React.useRef(null);
  useEffect(() => {
    const state = { issues, serviceLog, vehicleOdo, purchases, aftermarket: aftermarketItems };
    saveLocal(state);
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      setSyncStatus("saving");
      cloudSave(state).then(() => setSyncStatus("saved")).catch(() => setSyncStatus("offline"));
    }, 2000);
  }, [issues, serviceLog, vehicleOdo, purchases, aftermarketItems]);

  function setIssues(updater) { setIssuesRaw(updater); }
  function setPurchases(updater) { setPurchasesRaw(updater); }

  const filtered = issues.filter((i) => {
    if (timingFilter !== "all" && i.timing !== timingFilter) return false;
    if (sectionFilter !== "all" && i.section !== sectionFilter) return false;
    if (priorityFilter !== "all" && i.priority !== priorityFilter) return false;
    return true;
  });
  const thisweekCount = issues.filter(i => i.timing === "thisweek").length;
  const upcomingCount = issues.filter(i => i.timing === "upcoming").length;
  const longtermCount = issues.filter(i => i.timing === "longterm").length;

  function cycleTiming(id, e) {
    e.stopPropagation();
    const order = ["thisweek", "upcoming", "longterm"];
    setIssues(prev => prev.map(i => i.id !== id ? i : { ...i, timing: order[(order.indexOf(i.timing) + 1) % order.length] }));
  }
  function cyclePriority(id, e) {
    e.stopPropagation();
    setIssues(prev => prev.map(i => i.id !== id ? i : { ...i, priority: priorityOrder[(priorityOrder.indexOf(i.priority) + 1) % priorityOrder.length] }));
  }

  function startDone(id, e) {
    e.stopPropagation();
    const issue = issues.find(i => i.id === id);
    setDoneId(id);
    setDoneNote(issue?.notes || "");
    setDoneMileage(issue?.mileage || vehicleOdo || "");
    setNewMaintTitle("");
    setNewMaintNotes(issue?.notes || "");
    setNewMaintParts("");
    setDonePartCategory(issue?.partsCategory || "Interior");
    setDonePartType(issue?.partsType || "Aftermarket");
    setRepeatChoice(issue?.recurring ? (issue.recurring.kmInterval && issue.recurring.monthsInterval ? "both" : issue.recurring.kmInterval ? "km" : issue.recurring.monthsInterval ? "months" : null) : null);
    setRepeatKm(issue?.recurring?.kmInterval ? String(issue.recurring.kmInterval) : "");
    setRepeatMonths(issue?.recurring?.monthsInterval ? String(issue.recurring.monthsInterval) : "");
    if (issue?.section === "monitoring") {
      // monitoring: just delete
      setIssues(prev => prev.filter(i => i.id !== id));
      setDoneId(null);
      setExpandedId(null);
    } else if (issue?.section === "inspections") {
      setDoneStep("choose"); // passed or create maintenance
    } else if (issue?.section === "maintenance") {
      setDoneStep("log"); // log to service log
    } else if (issue?.section === "installations") {
      setDoneStep("log_install"); // log + option to add to aftermarket
    }
  }

  function finishLogToService(issue) {
    const fmtMileage = formatMileage(doneMileage) || issue.mileage || vehicleOdo;
    if (doneMileage.trim()) setVehicleOdoRaw(formatMileage(doneMileage));
    // Log to service
    setServiceLogRaw(prev => [{
      id: Date.now(), category: sectionConfig[issue.section]?.label || issue.section,
      title: issue.title, date: new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }),
      mileage: fmtMileage, notes: doneNote || issue.notes || "",
      parts: issue.parts || []
    }, ...prev]);
    // Create recurring next task if repeat selected
    const recurring = buildRecurring(repeatChoice, doneMileage || vehicleOdo, repeatKm, repeatMonths);
    if (recurring) {
      const dueLabel = recurring.dueAtKm ? formatMileage(recurring.dueAtKm) : recurring.dueByDate;
      setIssues(prev => [
        ...prev.filter(i => i.id !== issue.id),
        { id: Date.now() + 1, section: issue.section, title: issue.title, priority: issue.priority, timing: "longterm",
          notes: issue.notes || "", mileage: null, parts: issue.parts || [], solutions: issue.solutions || [],
          recurring }
      ]);
    } else {
      setIssues(prev => prev.filter(i => i.id !== issue.id));
    }
    // Auto-promote all tasks with new odo
    if (doneMileage.trim()) {
      setTimeout(() => {
        setIssuesRaw(prev => autoPromote(prev, doneMileage));
      }, 100);
    }
    setDoneId(null); setDoneStep(null); setExpandedId(null); setRepeatChoice(null);
  }

  function finishCreateMaintenance(issue) {
    if (doneMileage.trim()) setVehicleOdoRaw(formatMileage(doneMileage));
    // create maintenance task + optional purchases
    setIssues(prev => [
      ...prev.filter(i => i.id !== issue.id),
      { id: Date.now(), section: "maintenance", title: newMaintTitle || ("Fix: " + issue.title), priority: issue.priority, timing: "upcoming", notes: newMaintNotes, mileage: null, parts: newMaintParts ? newMaintParts.split(",").map(s => s.trim()).filter(Boolean) : [], solutions: [] }
    ]);
    // add parts to purchase list if specified
    if (newMaintParts.trim()) {
      const newParts = newMaintParts.split(",").map(s => s.trim()).filter(Boolean);
      setPurchasesRaw(prev => [...prev, ...newParts.map((p, i) => ({ id: Date.now() + i + 1, item: p, cost: "", priority: issue.priority, status: "tobuy", notes: "For: " + (newMaintTitle || issue.title) }))]);
    }
    // log inspection as done
    setServiceLogRaw(prev => [{ id: Date.now() + 999, category: "Inspect", title: issue.title + " — needs work", date: new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }), mileage: formatMileage(doneMileage) || issue.mileage || vehicleOdo, notes: doneNote || "Inspection found issues. Maintenance task created.", parts: [] }, ...prev]);
    setDoneId(null); setDoneStep(null); setExpandedId(null);
  }

  function finishInstallWithAftermarket(issue) {
    const note = doneNote ? " — " + doneNote : "";
    const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" });
    setAftermarketItems(prev => [...prev, {
      id: Date.now(), name: issue.title + note,
      category: donePartCategory, type: donePartType,
      installedDate: dateStr
    }]);
    setIssues(prev => prev.filter(i => i.id !== issue.id));
    setDoneId(null); setDoneStep(null); setExpandedId(null);
  }
  function saveNote(id, e) {
    e.stopPropagation();
    setIssues(prev => prev.map(i => i.id === id ? { ...i, notes: noteText } : i));
    setEditingNote(null);
  }
  function saveMileage(id, e) {
    e.stopPropagation();
    setIssues(prev => prev.map(i => i.id === id ? { ...i, mileage: formatMileage(mileageText) } : i));
    setEditingMileage(null);
  }

  const grouped = {};
  sectionsList.forEach(s => { grouped[s] = filtered.filter(i => i.section === s); });

  const filteredLog = serviceLog.filter(i => logFilter === "All" || i.category === logFilter);
  const logCategories = ["All", ...Array.from(new Set(serviceLog.map(s => s.category)))];

  const sh = { fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 };
  const btnS = (active, ac) => ({ background: active ? ac : "transparent", color: active ? "#1a1a18" : "#555", border: "1px solid " + (active ? ac : "#2e2e2a"), borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" });

  function renderCard(issue) {
    const pc = priorityConfig[issue.priority], tc = timingConfig[issue.timing];
    const sec = sectionConfig[issue.section];
    const isExp = expandedId === issue.id, isEN = editingNote === issue.id, isEM = editingMileage === issue.id;
    const isET = editingTitle === issue.id;
    return (
      <div key={issue.id} style={{ background: "#222220", border: "1px solid #2e2e2a", borderLeft: `3px solid ${sec.color}`, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
        <div onClick={() => setExpandedId(isExp ? null : issue.id)} style={{ padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#f0e6c8" }}>{issue.title}</span>
            <div style={{ fontSize: 10, color: tc.color, marginTop: 1, letterSpacing: 1 }}>
              {tc.label}
              {issue.recurring && issue.recurring.dueAtKm && (() => {
                const remaining = issue.recurring.dueAtKm - parseOdo(vehicleOdo);
                const overdue = remaining <= 0;
                return <span style={{ color: overdue ? "#c0392b" : "#c9a84c", marginLeft: 8 }}>{overdue ? "overdue · was due " : "due "}@ {formatMileage(issue.recurring.dueAtKm)}</span>;
              })()}
              {issue.recurring && issue.recurring.dueByDate && !issue.recurring.dueAtKm && (
                <span style={{ color: new Date(issue.recurring.dueByDate) < new Date() ? "#c0392b" : "#c9a84c", marginLeft: 8 }}>{new Date(issue.recurring.dueByDate) < new Date() ? "overdue · was due " : "due "}{issue.recurring.dueByDate}</span>
              )}
              {!issue.recurring && issue.mileage && <span style={{ color: "#c9a84c", marginLeft: 8 }}>@ {issue.mileage}</span>}
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <span style={{ fontSize: 9, color: pc.color, border: `1px solid ${pc.color}44`, borderRadius: 2, padding: "1px 5px", letterSpacing: 1 }}>{pc.label}</span>
            <span onClick={e => { e.stopPropagation(); setDeletingId(issue.id); setDeletingType("task"); }}
              style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px 4px", lineHeight: 1 }}>✕</span>
          </div>
        </div>
        {/* Delete confirmation */}
        {deletingId === issue.id && deletingType === "task" && (
          <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 11, color: "#c0392b" }}>Delete this item?</span>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={e => { e.stopPropagation(); setIssues(prev => prev.filter(i => i.id !== issue.id)); setDeletingId(null); }}
                style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
              <button onClick={e => { e.stopPropagation(); setDeletingId(null); }}
                style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
            </div>
          </div>
        )}
        {!isExp && (
          <div onClick={() => setExpandedId(issue.id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -4 }}>
            <span style={{ fontSize: 10, color: "#333" }}>▼</span>
          </div>
        )}
        {isExp && (
          <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
            {/* Title */}
            <div>
              <div style={sh}>Title</div>
              {isET ? (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input value={titleText} onChange={e => setTitleText(e.target.value)}
                    style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                  <button onClick={e => { e.stopPropagation(); setIssues(prev => prev.map(i => i.id === issue.id ? { ...i, title: titleText } : i)); setEditingTitle(null); }}
                    style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                  <button onClick={e => { e.stopPropagation(); setEditingTitle(null); }}
                    style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#f0e6c8" }}>
                  {issue.title}
                  <span onClick={e => { e.stopPropagation(); setEditingTitle(issue.id); setTitleText(issue.title); }}
                    style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span>
                </div>
              )}
            </div>
            {/* Mileage */}
            <div>
              <div style={sh}>Mileage</div>
              {isEM ? (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input value={mileageText} onChange={e => setMileageText(e.target.value)} placeholder="e.g. 88734 km" style={{ background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", width: 140 }} />
                  <button onClick={e => saveMileage(issue.id, e)} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                  <button onClick={e => { e.stopPropagation(); setEditingMileage(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: issue.mileage ? "#c9a84c" : "#444" }}>
                  {issue.mileage || "Not recorded"}
                  <span onClick={e => { e.stopPropagation(); setEditingMileage(issue.id); setMileageText(issue.mileage || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span>
                </div>
              )}
            </div>
            {/* Notes */}
            <div>
              <div style={sh}>Notes</div>
              {isEN ? (
                <div>
                  <textarea value={noteText} onChange={e => setNoteText(e.target.value)} rows={3} style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                    <button onClick={e => saveNote(issue.id, e)} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                    <button onClick={e => { e.stopPropagation(); setEditingNote(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#b8b0a0", lineHeight: 1.7 }}>
                  {issue.notes || "No notes"}
                  <span onClick={e => { e.stopPropagation(); setEditingNote(issue.id); setNoteText(issue.notes || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span>
                </div>
              )}
            </div>
            {issue.recurring && (
              <div>
                <div style={sh}>Recurring</div>
                <div style={{ fontSize: 12, color: "#c9a84c", lineHeight: 1.7 }}>
                  {issue.recurring.kmInterval && <span>Every {issue.recurring.kmInterval.toLocaleString()} km</span>}
                  {issue.recurring.kmInterval && issue.recurring.monthsInterval && <span> or </span>}
                  {issue.recurring.monthsInterval && <span>Every {issue.recurring.monthsInterval} months</span>}
                  {issue.recurring.dueAtKm && <span style={{ color: "#888" }}> · Next @ {formatMileage(issue.recurring.dueAtKm)}</span>}
                  {issue.recurring.dueByDate && <span style={{ color: "#888" }}> · Next by {issue.recurring.dueByDate}</span>}
                </div>
              </div>
            )}
            {issue.solutions && issue.solutions.length > 0 && <div><div style={sh}>Potential Solutions</div><ul style={{ margin: 0, paddingLeft: 16, fontSize: 12, color: "#9a9080", lineHeight: 1.9 }}>{issue.solutions.map((s, i) => <li key={i}>{s}</li>)}</ul></div>}
            {issue.parts && issue.parts.length > 0 && <div><div style={sh}>Parts / Materials</div><ul style={{ margin: 0, paddingLeft: 16, fontSize: 12, color: "#9a9080", lineHeight: 1.9 }}>{issue.parts.map((p, i) => <li key={i}>{p}</li>)}</ul></div>}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", paddingTop: 4 }}>
              <button onClick={e => cyclePriority(issue.id, e)} style={{ background: "transparent", color: pc.color, border: `1px solid ${pc.color}55`, borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Priority: {pc.label} →</button>
              <button onClick={e => cycleTiming(issue.id, e)} style={{ background: tc.bg, color: tc.color, border: `1px solid ${tc.color}55`, borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>📅 {tc.label} →</button>
              <button onClick={e => startDone(issue.id, e)}
                style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>✓ Done</button>
            </div>

            {/* ─── DONE FLOW ─── */}
            {doneId === issue.id && doneStep === "choose" && (
              <div style={{ background: "#252520", border: "1px solid #2ea84a44", borderRadius: 4, padding: "12px 14px", marginTop: 4 }}>
                <div style={{ fontSize: 10, color: "#2ea84a", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Inspection Complete</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button onClick={e => { e.stopPropagation(); setDoneStep("log"); }}
                    style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Passed ✓</button>
                  <button onClick={e => { e.stopPropagation(); setDoneStep("maint"); }}
                    style={{ background: "#c0392b22", color: "#c0392b", border: "1px solid #c0392b55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Create Maintenance Task</button>
                  <button onClick={e => { e.stopPropagation(); setDoneId(null); setDoneStep(null); }}
                    style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              </div>
            )}

            {doneId === issue.id && doneStep === "log" && (
              <div style={{ background: "#252520", border: "1px solid #2ea84a44", borderRadius: 4, padding: "12px 14px", marginTop: 4 }}>
                <div style={{ fontSize: 10, color: "#2ea84a", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Log to Service History</div>
                <input value={doneMileage} onChange={e => setDoneMileage(e.target.value)} placeholder="Mileage (e.g. 89,100 km)"

            })}
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
            {[["all", "All"], ["high", "HIGH"], ["medium", "MED"], ["low", "LOW"]].map(([key, label]) => {
              const active = priorityFilter === key;
              const colors = { all: "200,195,180", high: "192,57,43", medium: "214,137,16", low: "46,134,193" };
              const rgb = colors[key];
              return (
                <button key={key} onClick={() => { setPriorityFilter(key); if (key !== "all") setOpenSections({ inspections: true, maintenance: true, monitoring: true, installations: true }); }} style={{
                  background: active ? `rgba(${rgb},0.12)` : "transparent", color: active ? `rgb(${rgb})` : "#333",
                  border: `1px solid ${active ? `rgba(${rgb},0.35)` : "#2e2e2a"}`,
                  borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit",
                }}>{label}</button>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
            {[["all", "All", "200,195,180"], ...sectionsList.map(s => {
              const rgbMap = { inspections: "214,137,16", maintenance: "192,57,43", monitoring: "58,127,193", installations: "46,168,74" };
              return [s, sectionConfig[s].label, rgbMap[s]];
            })].map(([key, label, rgb]) => {
              const active = sectionFilter === key;
              return (
                <button key={key} onClick={() => { setSectionFilter(key); if (key !== "all") setOpenSections(prev => ({ ...prev, [key]: true })); }} style={{
                  background: active ? `rgba(${rgb},0.12)` : "transparent", color: active ? `rgb(${rgb})` : "#333",
                  border: `1px solid ${active ? `rgba(${rgb},0.35)` : "#2e2e2a"}`,
                  borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit",
                }}>{label}</button>
              );
            })}
          </div>
          {(sectionFilter === "all" ? sectionsList : [sectionFilter]).map(s => {
            const items = grouped[s];
            if (!items || items.length === 0) return null;
            const sc = sectionConfig[s];
            const isOpen = !!openSections[s];
            return (
              <div key={s} style={{ marginBottom: 16 }}>
                <div onClick={() => setOpenSections(prev => ({ ...prev, [s]: !prev[s] }))}
                  style={{ fontSize: 10, color: sc.color, letterSpacing: 3, textTransform: "uppercase", borderBottom: `1px solid ${sc.color}33`, paddingBottom: 6, marginBottom: isOpen ? 12 : 0, display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: sc.color, display: "inline-block" }} />
                  <span style={{ flex: 1 }}>{sc.label} · {items.length} item{items.length !== 1 ? "s" : ""}</span>
                  <span style={{ fontSize: 10, color: sc.color }}>{isOpen ? "▲" : "▼"}</span>
                </div>
                {isOpen && items.map(renderCard)}
              </div>
            );
          })}
        </div>
      )}

      {/* ─── PURCHASES ─── */}
      {tab === "purchases" && (
        <div>
          <div style={{ fontSize: 10, color: "#888", marginBottom: 16, lineHeight: 1.6 }}>Tap checkbox to advance: To Buy → Ordered → Received (creates work queue task).</div>
          {(() => {
            const toBuy = purchases.filter(p => p.status === "tobuy");
            const ordered = purchases.filter(p => p.status === "ordered");
            const parseCost = (c) => { const m = (c || "").replace(/[^0-9.]/g, ""); return m ? parseFloat(m) : 0; };
            const toBuyTotal = toBuy.reduce((sum, p) => sum + parseCost(p.cost), 0);
            const orderedTotal = ordered.reduce((sum, p) => sum + parseCost(p.cost), 0);

            function renderPurchaseRow(p, checkAction, checkStyle, textStyle) {
              const isEditingCostThis = editingCost === p.id;
              const isPExp = expandedPurchaseId === p.id;
              const isEPN = editingPurchaseNote === p.id;
              const isEPName = editingPurchaseName === p.id;
              return (
                <div key={p.id} style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
                  {/* Header */}
                  <div onClick={() => setExpandedPurchaseId(isPExp ? null : p.id)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                    <div onClick={e => { e.stopPropagation(); checkAction(); }} style={{ width: 18, height: 18, borderRadius: 3, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", ...checkStyle }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: textStyle?.color || "#f0e6c8" }}>{p.item}</div>
                      <div style={{ fontSize: 10, color: partsCatColors[p.partsCategory] || "#555", marginTop: 1, letterSpacing: 1, display: "flex", gap: 6, alignItems: "center" }}>
                        {p.partsCategory || "Uncategorized"}
                        {p.partsType && <span style={{ fontSize: 8, color: p.partsType === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${p.partsType === "OEM" ? "#c0392b44" : "#2e86c144"}`, borderRadius: 2, padding: "0px 4px", letterSpacing: 1 }}>{p.partsType}</span>}
                      </div>
                    </div>
                    <span style={{ fontSize: 12, color: p.cost ? "#c9a84c" : "#333", fontWeight: 600, flexShrink: 0 }}>{p.cost || "—"}</span>
                    <span onClick={e => { e.stopPropagation(); setDeletingId(p.id); setDeletingType("purchase"); }}
                      style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px 4px", lineHeight: 1, flexShrink: 0 }}>✕</span>
                  </div>
                  {/* Delete confirmation */}
                  {deletingId === p.id && deletingType === "purchase" && (
                    <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 11, color: "#c0392b" }}>Delete this item?</span>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={e => { e.stopPropagation(); setPurchases(prev => prev.filter(x => x.id !== p.id)); setDeletingId(null); }}
                          style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
                        <button onClick={e => { e.stopPropagation(); setDeletingId(null); }}
                          style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                      </div>
                    </div>
                  )}
                  {/* Expand indicator */}
                  {!isPExp && (
                    <div onClick={() => setExpandedPurchaseId(p.id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -4 }}>
                      <span style={{ fontSize: 10, color: "#333" }}>▼</span>
                    </div>
                  )}
                  {/* Expanded details */}
                  {isPExp && (
                    <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
                      {/* Name */}
                      <div>
                        <div style={sh}>Item Name</div>
                        {isEPName ? (
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <input value={purchaseNameText} onChange={e => setPurchaseNameText(e.target.value)}
                              style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                            <button onClick={e => { e.stopPropagation(); setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, item: purchaseNameText } : x)); setEditingPurchaseName(null); }}
                              style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                            <button onClick={() => setEditingPurchaseName(null)}
                              style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: "#f0e6c8" }}>
                            {p.item}
                            <span onClick={() => { setEditingPurchaseName(p.id); setPurchaseNameText(p.item); }}
                              style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span>
                          </div>
                        )}
                      </div>
                      {/* Cost */}
                      <div>
                        <div style={sh}>Cost</div>
                        {isEditingCostThis ? (
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <input value={costText} onChange={e => setCostText(e.target.value)} placeholder="$0"
                              onKeyDown={e => { if (e.key === "Enter") { setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, cost: costText } : x)); setEditingCost(null); } }}
                              style={{ background: "#1a1a18", color: "#c9a84c", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", width: 100 }} />
                            <button onClick={() => { setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, cost: costText } : x)); setEditingCost(null); }}
                              style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                            <button onClick={() => setEditingCost(null)}
                              style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: p.cost ? "#c9a84c" : "#444" }}>
                            {p.cost || "No price set"}
                            <span onClick={() => { setEditingCost(p.id); setCostText(p.cost || ""); }}
                              style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span>
                          </div>
                        )}
                      </div>
                      {/* Notes */}
                      <div>
                        <div style={sh}>Notes</div>
                        {isEPN ? (
                          <div>
                            <textarea value={purchaseNoteText} onChange={e => setPurchaseNoteText(e.target.value)} rows={2}
                              style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
                            <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                              <button onClick={() => { setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, notes: purchaseNoteText } : x)); setEditingPurchaseNote(null); }}
                                style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                              <button onClick={() => setEditingPurchaseNote(null)}
                                style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: "#b8b0a0", lineHeight: 1.7 }}>
                            {p.notes || "No notes"}
                            <span onClick={() => { setEditingPurchaseNote(p.id); setPurchaseNoteText(p.notes || ""); }}
                              style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span>
                          </div>
                        )}
                      </div>
                      {/* Category & Type */}
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => { const cur = p.partsCategory || "Engine"; const i = partsCategories.indexOf(cur); setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, partsCategory: partsCategories[(i + 1) % partsCategories.length] } : x)); }}
                          style={{ flex: 1, background: "transparent", color: partsCatColors[p.partsCategory] || "#555", border: `1px solid ${partsCatColors[p.partsCategory] || "#555"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}>
                          {p.partsCategory || "Uncategorized"} →
                        </button>
                        <button onClick={() => setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, partsType: (p.partsType || "Aftermarket") === "OEM" ? "Aftermarket" : "OEM" } : x))}
                          style={{ width: 120, background: "transparent", color: (p.partsType || "Aftermarket") === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${(p.partsType || "Aftermarket") === "OEM" ? "#c0392b" : "#2e86c1"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                          {p.partsType || "Aftermarket"} →
                        </button>
                      </div>
                    </div>
                  )}
                  {/* Collapse indicator */}
                  {isPExp && (
                    <div onClick={() => setExpandedPurchaseId(null)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, paddingTop: 2 }}>
                      <span style={{ fontSize: 10, color: "#333" }}>▲</span>
                    </div>
                  )}
                </div>
              );
            }

            return (
              <div>
                {/* TO BUY */}
                {toBuy.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 3, textTransform: "uppercase", borderBottom: "1px solid #c9a84c33", paddingBottom: 6, marginBottom: 12 }}>To Buy</div>
                    {toBuy.map(p => renderPurchaseRow(p,
                      () => setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, status: "ordered" } : x)),
                      { border: "2px solid #555" },
                      {}
                    ))}
                    {toBuyTotal > 0 && (
                      <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 14px 0", gap: 10 }}>
                        <span style={{ fontSize: 10, color: "#555", letterSpacing: 1, textTransform: "uppercase" }}>To Buy Total</span>
                        <span style={{ fontSize: 12, color: "#c9a84c", fontWeight: 600, width: 70, textAlign: "right" }}>~${toBuyTotal.toFixed(0)}</span>
                        <span style={{ width: 14 }} />
                      </div>
                    )}
                  </div>
                )}
                {/* ORDERED */}
                {ordered.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 10, color: "#d68910", letterSpacing: 3, textTransform: "uppercase", borderBottom: "1px solid #d6891033", paddingBottom: 6, marginBottom: 12 }}>
                      Ordered — tap ✓ when received
                    </div>
                    {ordered.map(p => {
                      const isReceiving = receivingId === p.id;
                      return (
                        <div key={p.id}>
                          {renderPurchaseRow(p,
                            () => setReceivingId(p.id),
                            { border: "2px solid #d68910", background: "#d6891022" },
                            {}
                          )}
                          {isReceiving && (
                            <div style={{ background: "#252520", border: "1px solid #c9a84c44", borderRadius: 4, padding: "10px 14px", marginBottom: 8, marginTop: -4 }}>
                              <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Received — add to work queue as:</div>
                              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                {[["thisweek", "This Week", "#c0392b"], ["upcoming", "Upcoming", "#d68910"], ["longterm", "Long-term", "#2e86c1"]].map(([timing, label, color]) => (
                                  <button key={timing} onClick={() => {
                                    setIssues(prev => [...prev, {
                                      id: Date.now(), section: "installations", title: p.item,
                                      priority: "medium", timing,
                                      notes: p.notes || `Received. Ready to install.`, mileage: null,
                                      parts: [p.item + (p.cost ? ` (${p.cost})` : "")], solutions: [],
                                      partsCategory: p.partsCategory || "Cosmetic", partsType: p.partsType || "Aftermarket"
                                    }]);
                                    setPurchases(prev => prev.filter(x => x.id !== p.id));
                                    setReceivingId(null);
                                  }}
                                  style={{ background: color + "22", color, border: `1px solid ${color}66`, borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", letterSpacing: 1 }}>
                                    {label}
                                  </button>
                                ))}
                                <button onClick={() => setReceivingId(null)}
                                  style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      )}

      {/* ─── SERVICE LOG ─── */}
      {tab === "log" && (
        <div>
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            {logCategories.map(c => {
              const catColorMap = { Inspect: "#d68910", Maintain: "#c0392b", Monitor: "#2e86c1", Install: "#2ea84a" };
              const catColor = catColorMap[c] || "#2ea84a";
              return <button key={c} onClick={() => setLogFilter(c)} style={btnS(logFilter === c, c === "All" ? "#2ea84a" : catColor)}>{c}</button>;
            })}
          </div>
          {filteredLog.length === 0
            ? <div style={{ color: "#444", fontSize: 12, padding: 20, textAlign: "center" }}>No entries match this filter.</div>
            : filteredLog.map((entry, idx) => {
              const isExp = expandedLogId === entry.id;
              const isLast = idx === filteredLog.length - 1;
              return (
                <div key={entry.id} style={{ display: "flex", gap: 0 }}>
                  {/* Timeline rail with date */}
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 64, flexShrink: 0 }}>
                    <div style={{ fontSize: 9, color: "#c9a84c", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4, textAlign: "center", lineHeight: 1.3 }}>
                      {entry.date.split(",")[0]}<br/>
                      <span style={{ color: "#555" }}>{entry.date.includes(",") ? entry.date.split(",")[1].trim() : ""}</span>
                    </div>
                    <div style={{ width: 12, height: 12, borderRadius: "50%", background: "#2ea84a", flexShrink: 0, boxShadow: "0 0 6px #2ea84a44" }} />
                    {!isLast && <div style={{ width: 2, flex: 1, background: "linear-gradient(to bottom, #2ea84a44, #2e2e2a)" }} />}
                  </div>
                  {/* Card */}
                  <div style={{ flex: 1, marginBottom: 16, marginLeft: 8 }}>
                    <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, overflow: "hidden" }}>
                      <div onClick={() => setExpandedLogId(isExp ? null : entry.id)} style={{ padding: "11px 14px", cursor: "pointer" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 600, color: "#f0e6c8" }}>{entry.title}</div>
                            <div style={{ fontSize: 10, color: ({"Inspect":"#d68910","Maintain":"#c0392b","Monitor":"#2e86c1","Install":"#2ea84a"})[entry.category] || "#888", marginTop: 2, letterSpacing: 1 }}>{entry.category}</div>
                          </div>
                          <div style={{ display: "flex", gap: 6, alignItems: "center", flexShrink: 0, marginLeft: 12 }}>
                            {entry.mileage && <span style={{ fontSize: 11, color: "#c9a84c" }}>@ {entry.mileage}</span>}
                            <span onClick={e => { e.stopPropagation(); setDeletingId(entry.id); setDeletingType("log"); }}
                              style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px 4px", lineHeight: 1 }}>✕</span>
                          </div>
                        </div>
                      </div>
                      {/* Delete confirmation */}
                      {deletingId === entry.id && deletingType === "log" && (
                        <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 11, color: "#c0392b" }}>Delete this entry?</span>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={e => { e.stopPropagation(); setServiceLogRaw(prev => prev.filter(x => x.id !== entry.id)); setDeletingId(null); }}
                              style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
                            <button onClick={e => { e.stopPropagation(); setDeletingId(null); }}
                              style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        </div>
                      )}
                      {!isExp && (
                        <div onClick={() => setExpandedLogId(entry.id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -2 }}>
                          <span style={{ fontSize: 10, color: "#333" }}>▼</span>
                        </div>
                      )}
                      {isExp && (
                        <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
                          {/* Title */}
                          <div>
                            <div style={sh}>Title</div>
                            {editingLogField?.id === entry.id && editingLogField?.field === "title" ? (
                              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                <input value={logFieldText} onChange={e => setLogFieldText(e.target.value)}
                                  style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #2ea84a", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                                <button onClick={() => { setServiceLogRaw(prev => prev.map(x => x.id === entry.id ? { ...x, title: logFieldText } : x)); setEditingLogField(null); }}
                                  style={{ background: "#2ea84a", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                                <button onClick={() => setEditingLogField(null)}
                                  style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                              </div>
                            ) : (
                              <div style={{ fontSize: 12, color: "#f0e6c8" }}>
                                {entry.title}
                                <span onClick={() => { setEditingLogField({ id: entry.id, field: "title" }); setLogFieldText(entry.title); }}
                                  style={{ marginLeft: 8, fontSize: 10, color: "#2ea84a", cursor: "pointer" }}>[edit]</span>
                              </div>
                            )}
                          </div>
                          {/* Category */}
                          <div>
                            <div style={sh}>Category</div>
                            {editingLogField?.id === entry.id && editingLogField?.field === "category" ? (
                              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                {["inspections", "maintenance", "monitoring"].map(s => {

          <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, marginBottom: 12, overflow: "hidden" }}>
            <div onClick={() => setContactsOpen(!contactsOpen)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 10, color: "#7c3ac1", letterSpacing: 3, textTransform: "uppercase" }}>Shops & Contacts</div>
              <span style={{ fontSize: 10, color: "#444" }}>{contactsOpen ? "▲" : "▼"}</span>
            </div>
            {contactsOpen && (
              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 14 }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#f0e6c8" }}>Tagami Auto Service</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Annual safety check</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0", marginTop: 2 }}>1733 Kahai St, Honolulu, HI 96819</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0" }}>(808) 841-5009</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>Hours: 7–10 AM, then 12–4 PM. Call ahead — sometimes closes without notice.</div>
                  <div style={{ fontSize: 10, color: "#d68910", marginTop: 2 }}>Tip: follow the old man's instructions. He can be grumpy but it's simple.</div>
                </div>
                <div style={{ borderTop: "1px solid #2a2a26", paddingTop: 12 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#f0e6c8" }}>JDM Imports Hawaii — Aaron Rideout</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Mechanical work, upgrades (no body work)</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0", marginTop: 2 }}>Same address — subleases from Tagami Auto</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0" }}>(808) 391-3425</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>Call for appointment. Prev. owner's recommendation.</div>
                </div>
              </div>
            )}
          </div>

          <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, marginBottom: 12, overflow: "hidden" }}>
            <div onClick={() => setPrevOwnerOpen(!prevOwnerOpen)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 10, color: "#7c3ac1", letterSpacing: 3, textTransform: "uppercase" }}>Previous Owner Notes (Original Doc)</div>
              <span style={{ fontSize: 10, color: "#444" }}>{prevOwnerOpen ? "▲" : "▼"}</span>
            </div>
            {prevOwnerOpen && (
              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px" }}>
                <div style={{ fontSize: 11, color: "#9a9080", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{`Good to Know Stuffs:
• Tires - inflate to 35 psi
• Gas - unleaded; tank is on the driver's side just past the door
• Oil - 10w-30; tank is on the passenger side towards the end of the bed; the dipstick is tucked in by the back wheel on the passenger side under the wheel well; use the smaller nozzle (blue) hanging in the bed
• Battery - passenger side between the wheels; hand-tightened cover, no tools needed; battery is brand new
• Water - the battery cover also houses the overflow tank; the overflow tank is to the left of the battery; top off whenever temp gauge goes above halfway; use the bigger nozzle (clear) hanging in the bed
• Tires - less than a year old
• Radiator - less than a year old
• Starter Motor - brand new

Recommendations:
1. Drive under 80 KPH (48 MPH)
2. Avoid potholes, divots, manhole covers — 4-lug wheels don't absorb uneven surfaces well
3. If you need a tow, get a flatbed. If not possible, tell driver not to go over 30 MPH
4. Top off the overflow tank every week or two
5. One quart of oil per year is plenty
6. When insuring, make sure they know it's a "kei" truck — 3 cyl, 660cc. Keeps payment low
7. Drive slow and defensive — only safety feature is the seat belt
8. Tagami Auto Service for safety check — 1733 Kahai St, (808) 841-5009
9. JDM Imports Hawaii for mechanical — Aaron Rideout, (808) 391-3425

Helpful Links:
• honda-acty.com/ha3-ha4-acty-truck/ — parts/accessories
• oiwa.co — tips from a longtime owner
• roadlancer.com/honda-mini-truck/ — owner tips
• minitruckimports.com/honda-acty-maintenance-tips/`}</div>
              </div>
            )}
          </div>

          <div style={{ marginTop: 20, display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
            <div style={{ fontSize: 9, color: syncStatus === "saved" ? "#2ea84a" : syncStatus === "saving" ? "#c9a84c" : syncStatus === "offline" ? "#c0392b" : "#333", letterSpacing: 1 }}>
              {syncStatus === "saved" ? "☁ SYNCED" : syncStatus === "saving" ? "☁ SAVING..." : syncStatus === "offline" ? "⚠ OFFLINE — saved locally" : ""}
            </div>
            <button onClick={() => {
              const state = { issues, serviceLog, vehicleOdo, purchases, aftermarket: aftermarketItems };
              const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
              const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
              a.download = "acty-backup-" + new Date().toISOString().slice(0, 10) + ".json"; a.click();
            }}
              style={{ background: "transparent", color: "#2e2e2a", border: "1px solid #2e2e2a", borderRadius: 3, padding: "6px 16px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>
              Export Backup
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<ActyTracker />, document.getElementById("root"));
</script>
</body>
</html>
