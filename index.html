/* ─── FORMATTING HELPERS ─── */
function fmtKm(val) {
  if (!val && val !== 0) return "";
  const d = String(val).replace(/[^0-9]/g, "");
  if (!d) return String(val);
  return parseInt(d, 10).toLocaleString() + " km";
}
function parseOdo(val) {
  if (!val) return 0;
  const d = String(val).replace(/[^0-9]/g, "");
  return d ? parseInt(d, 10) : 0;
}
function fmtCost(val) {
  if (val === null || val === undefined || val === "") return "";
  const raw = String(val).replace(/[^0-9.]/g, "");
  if (!raw) return "";
  const n = parseFloat(raw);
  if (isNaN(n)) return "";
  return "$" + n.toFixed(2);
}
function parseCost(val) {
  if (!val) return 0;
  const raw = String(val).replace(/[^0-9.]/g, "");
  return raw ? parseFloat(raw) || 0 : 0;
}

/* ─── MIGRATION ─── */
// v8 data model:
//   - purchases[] holds ALL parts/shopping items with optional taskId field
//   - task.parts is removed (read from purchases.filter(p => p.taskId === task.id))
//   - stage "maintain" (legacy) is remapped to "tuneup"
// migrate() handles any prior shape: string parts, object parts, legacy stage names.
function normalizePart(p, idx) {
  if (!p) return null;
  if (typeof p === "string") {
    // "Name ($25.00)" or just "Name"
    const match = p.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
    const name = match ? match[1].trim() : p.trim();
    const cost = match ? fmtCost(match[2]) : "";
    if (!name) return null;
    return { name, cost, status: "tobuy" };
  }
  if (typeof p === "object") {
    return {
      name: p.name || p.item || "",
      cost: p.cost || "",
      status: p.status || "tobuy",
    };
  }
  return null;
}

function migrate(cloud) {
  if (!cloud) return null;
  const existingPurchases = Array.isArray(cloud.purchases) ? cloud.purchases : [];
  // Keep existing standalone purchases as-is, ensuring taskId field exists
  const newPurchases = existingPurchases.map(p => ({
    id: p.id,
    item: p.item || "",
    cost: p.cost || "",
    status: p.status || "tobuy",
    notes: p.notes || "",
    partsCategory: p.partsCategory || "Engine",
    partsType: p.partsType || "Aftermarket",
    taskId: p.taskId != null ? p.taskId : null,
  }));
  // Flatten any task.parts into new purchases with taskId linkage
  const newTasks = (cloud.tasks || []).map(t => {
    const stage = t.stage === "maintain" ? "tuneup" : t.stage;
    const parts = Array.isArray(t.parts) ? t.parts : [];
    parts.forEach((p, idx) => {
      const norm = normalizePart(p, idx);
      if (!norm || !norm.name) return;
      newPurchases.push({
        id: Date.now() + Math.floor(Math.random() * 1000000) + idx + newPurchases.length,
        item: norm.name,
        cost: norm.cost,
        status: norm.status,
        notes: "",
        partsCategory: "Engine",
        partsType: "Aftermarket",
        taskId: t.id,
      });
    });
    const { parts: _discard, ...rest } = t;
    return { ...rest, stage };
  });
  return { ...cloud, tasks: newTasks, purchases: newPurchases };
}

/* ─── RECURRING LOGIC ─── */
function getRecurringDue(recurring, completedAtKm) {
  if (!recurring) return null;
  const r = {};
  if (recurring.kmInterval && completedAtKm) r.dueAtKm = completedAtKm + recurring.kmInterval;
  if (recurring.monthsInterval) { const d = new Date(); d.setMonth(d.getMonth() + recurring.monthsInterval); r.dueByDate = d.toLocaleDateString("en-US", { month: "short", year: "numeric" }); }
  return r;
}
function buildRecurring(choice, currentOdo, kmVal, monthsVal) {
  if (!choice || choice === "none") return null;
  const odo = parseOdo(currentOdo);
  const kmI = (choice === "km" || choice === "both") && kmVal ? parseInt(String(kmVal).replace(/[^0-9]/g, ""), 10) : null;
  const moI = (choice === "months" || choice === "both") && monthsVal ? parseInt(String(monthsVal).replace(/[^0-9]/g, ""), 10) : null;
  if (!kmI && !moI) return null;
  const r = { kmInterval: kmI || null, monthsInterval: moI || null };
  return { ...r, ...getRecurringDue(r, odo) };
}
function autoEscalate(tasks, currentOdo) {
  const odo = parseOdo(currentOdo);
  const now = new Date();
  return tasks.map(t => {
    if (!t.recurring) return t;
    let newP = t.priority;
    if (t.recurring.dueAtKm && odo > 0) {
      const rem = t.recurring.dueAtKm - odo;
      if (rem <= 500) newP = "urgent";
      else if (rem <= 1000) newP = "thisweek";
      else if (rem <= 6000) newP = "upcoming";
    }
    if (t.recurring.dueByDate) {
      const dueD = new Date(t.recurring.dueByDate);
      const days = (dueD - now) / (1000 * 60 * 60 * 24);
      if (days <= 0) newP = "urgent";
      else if (days <= 7 && PRIORITIES.indexOf(newP) > 1) newP = "thisweek";
      else if (days <= 60 && PRIORITIES.indexOf(newP) > 2) newP = "upcoming";
    }
    return newP !== t.priority ? { ...t, priority: newP } : t;
  });
}

function autoResize(el) { if (!el) return; el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 300) + "px"; }
function AutoTextarea({ value, onChange, placeholder, style, ...props }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) autoResize(ref.current); }, [value]);
  return (
    <textarea ref={ref} value={value} onChange={e => { onChange(e); if (ref.current) autoResize(ref.current); }} placeholder={placeholder}
      style={{ ...style, overflow: "hidden", minHeight: 40 }} {...props} />
  );
}

}

/* ─── APP ─── */
function ActyTracker() {
  const [tab, setTab] = useState("queue");
  // Work queue
  const [tasks, setTasksRaw] = useState([]);
  const [stageFilters, setStageFilters] = useState(new Set(STAGES));
  const [typeFilters, setTypeFilters] = useState(new Set(TYPES));
  const [priorityFilter, setPriorityFilter] = useState(null);
  const [expandedId, setExpandedId] = useState(null);
  const [editingNote, setEditingNote] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [editingTitle, setEditingTitle] = useState(null);
  const [titleText, setTitleText] = useState("");
  const [editingMileage, setEditingMileage] = useState(null);
  const [mileageText, setMileageText] = useState("");
  // Inline part editing on task cards
  const [editingPartOnTask, setEditingPartOnTask] = useState(null); // { taskId, partId, field: "name" | "cost" }
  const [partEditText, setPartEditText] = useState("");
  const [addingPartToTask, setAddingPartToTask] = useState(null);
  const [newPartName, setNewPartName] = useState("");
  const [newPartCost, setNewPartCost] = useState("");
  // Done flow (unified)
  const [doneId, setDoneId] = useState(null);
  const [doneNote, setDoneNote] = useState("");
  const [doneMileage, setDoneMileage] = useState("");
  const [doneLogToService, setDoneLogToService] = useState(true);
  const [doneAddToParts, setDoneAddToParts] = useState(false);
  const [donePartCategory, setDonePartCategory] = useState("Engine");
  const [donePartType, setDonePartType] = useState("Aftermarket");
  const [repeatChoice, setRepeatChoice] = useState(null);
  const [repeatKm, setRepeatKm] = useState("");
  const [repeatMonths, setRepeatMonths] = useState("");
  // Add mode
  const [addMode, setAddMode] = useState(null);
  const [addTitle, setAddTitle] = useState("");
  const [addNotes, setAddNotes] = useState("");
  const [addStage, setAddStage] = useState("inspect");
  const [addType, setAddType] = useState("repair");
  const [addPriority, setAddPriority] = useState("upcoming");
  const [addCost, setAddCost] = useState("");
  const [addPartsCategory, setAddPartsCategory] = useState("Engine");
  const [addPartsType, setAddPartsType] = useState("Aftermarket");
  // Delete
  const [deletingId, setDeletingId] = useState(null);
  const [deletingType, setDeletingType] = useState(null);
  // Inline picker
  const [pickerId, setPickerId] = useState(null);
  const [pickerField, setPickerField] = useState(null);
  // Service log
  const [serviceLog, setServiceLogRaw] = useState([]);
  const [logFilter, setLogFilter] = useState("All");
  const [expandedLogId, setExpandedLogId] = useState(null);
  const [editingLogField, setEditingLogField] = useState(null);
  const [logFieldText, setLogFieldText] = useState("");
  const [editingLogPart, setEditingLogPart] = useState(null); // { logId, partIdx }
  const [logPartText, setLogPartText] = useState("");
  // Purchases (standalone)
  const [purchases, setPurchasesRaw] = useState([]);
  const [expandedPurchaseId, setExpandedPurchaseId] = useState(null);
  const [editingPurchaseNote, setEditingPurchaseNote] = useState(null);
  const [purchaseNoteText, setPurchaseNoteText] = useState("");
  const [editingPurchaseName, setEditingPurchaseName] = useState(null);
  const [purchaseNameText, setPurchaseNameText] = useState("");
  const [editingCost, setEditingCost] = useState(null);
  const [costText, setCostText] = useState("");
  const [receivingId, setReceivingId] = useState(null);
  const [receivingStep, setReceivingStep] = useState(null);
  // Vehicle
  const [vehicleOdo, setVehicleOdoRaw] = useState("");
  const [aftermarketItems, setAftermarketItems] = useState([]);
  const [infoOpen, setInfoOpen] = useState(true);
  const [aftermarketOpen, setAftermarketOpen] = useState(false);

  const [expandedPartId, setExpandedPartId] = useState(null);
  const [editingPartField, setEditingPartField] = useState(null);
  const [partFieldText, setPartFieldText] = useState("");
  const [partsFilter, setPartsFilter] = useState("All");
  // Sync
  const [syncStatus, setSyncStatus] = useState("loading");
  const [openPriorityGroups, setOpenPriorityGroups] = useState({ urgent: true, thisweek: false, upcoming: false, longterm: false });

  function setTasks(updater) { setTasksRaw(updater); }
  function setPurchases(updater) { setPurchasesRaw(updater); }

  // Load from cloud on mount (with migration)
  const loaded = useRef(false);
  useEffect(() => {
    cloudLoad().then(cloud => {
      if (cloud) {
        const migrated = migrate(cloud);
        const odo = migrated.vehicleOdo || "";
        setTasksRaw(autoEscalate(migrated.tasks || [], odo));
        setServiceLogRaw(migrated.serviceLog || []);
        setVehicleOdoRaw(migrated.vehicleOdo || "");
        setPurchasesRaw(migrated.purchases || []);
        setAftermarketItems(migrated.aftermarket || []);
        setSyncStatus("saved");
      } else {
        setSyncStatus("offline");
      }
      loaded.current = true;
    }).catch(() => { setSyncStatus("offline"); loaded.current = true; });
  }, []);

  // Auto-save with debounce
  const saveTimer = useRef(null);
  useEffect(() => {
    if (!loaded.current) return;
    const state = { tasks, serviceLog, vehicleOdo, purchases, aftermarket: aftermarketItems };
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      setSyncStatus("saving");
      cloudSave(state).then(() => setSyncStatus("saved")).catch(() => setSyncStatus("offline"));
    }, 2000);
  }, [tasks, serviceLog, vehicleOdo, purchases, aftermarketItems]);

  /* ─── FILTERING & GROUPING ─── */
  const filtered = tasks.filter(t => {
    if (!stageFilters.has(t.stage)) return false;
    if (!typeFilters.has(t.type)) return false;
    if (priorityFilter && t.priority !== priorityFilter) return false;
    return true;
  });
  const grouped = {};
  PRIORITIES.forEach(p => { grouped[p] = filtered.filter(t => t.priority === p); });
  const counts = {};
  PRIORITIES.forEach(p => { counts[p] = tasks.filter(t => t.priority === p).length; });

  /* ─── TASK ACTIONS ─── */
  function startDone(id, e) {
    e.stopPropagation();
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    setDoneId(id);
    setDoneNote(task.notes || "");
    setDoneMileage(task.mileage || vehicleOdo || "");
    setDoneLogToService(true);
    setDoneAddToParts(task.type === "modification");
    setDonePartCategory("Engine");
    setDonePartType(task.type === "modification" ? "Aftermarket" : "OEM");
    setRepeatChoice(task.recurring ? (task.recurring.kmInterval && task.recurring.monthsInterval ? "both" : task.recurring.kmInterval ? "km" : "months") : null);
    setRepeatKm(task.recurring?.kmInterval ? String(task.recurring.kmInterval) : "");
    setRepeatMonths(task.recurring?.monthsInterval ? String(task.recurring.monthsInterval) : "");
  }

  function resolveTask(task) {
    const fmtM = fmtKm(doneMileage) || task.mileage || vehicleOdo;
    const taskPurchases = purchases.filter(p => p.taskId === task.id);
    if (doneLogToService) {
      const partStrings = taskPurchases.map(p => p.item + (p.cost ? ` (${p.cost})` : "")).filter(Boolean);
      setServiceLogRaw(prev => [{
        id: Date.now(),
        category: TYPE_CONFIG[task.type]?.label || task.type,
        title: task.title,
        date: new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }),
        mileage: fmtM,
        notes: doneNote || task.notes || "",
        parts: partStrings,
      }, ...prev]);
    }
    // Add to parts list
    if (doneAddToParts) {
      const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" });
      setAftermarketItems(prev => [...prev, {
        id: Date.now() + 1,
        name: task.title + (doneNote ? " — " + doneNote : ""),
        category: donePartCategory,
        type: donePartType,
        installedDate: dateStr,
      }]);
    }
    // Update vehicle odo
    if (doneMileage && doneMileage.trim()) setVehicleOdoRaw(fmtKm(doneMileage));
    // Handle recurring
    const recurring = buildRecurring(repeatChoice, doneMileage || vehicleOdo, repeatKm, repeatMonths);
    const newTaskId = Date.now() + 2;
    // Always clear out this task's linked purchases (they've been consumed)
    setPurchases(prev => {
      const withoutTask = prev.filter(p => p.taskId !== task.id);
      if (!recurring) return withoutTask;
      // For recurring tasks, clone the purchases to the new task with fresh ids and status
      const cloned = taskPurchases.map((p, i) => ({
        ...p,
        id: Date.now() + 100 + i + Math.floor(Math.random() * 10000),
        status: "tobuy",
        taskId: newTaskId,
      }));
      return [...withoutTask, ...cloned];
    });
    if (recurring) {
      setTasks(prev => [...prev.filter(t => t.id !== task.id), {
        id: newTaskId,
        stage: "monitor",
        type: task.type,
        priority: "longterm",
        title: task.title,
        notes: task.notes || "",
        mileage: null,
        recurring,
      }]);
    } else {
      setTasks(prev => prev.filter(t => t.id !== task.id));
    }
    if (doneMileage && doneMileage.trim()) setTimeout(() => setTasksRaw(prev => autoEscalate(prev, doneMileage)), 100);
    setDoneId(null);
    setExpandedId(null);
    setRepeatChoice(null);
  }

  function saveNote(id, e) { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === id ? { ...t, notes: noteText } : t)); setEditingNote(null); }
  function saveMileage(id, e) { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === id ? { ...t, mileage: fmtKm(mileageText) } : t)); setEditingMileage(null); }

  /* ─── TASK PART ACTIONS ─── */
  function addPartToTask(taskId) {
    const nm = newPartName.trim();
    if (!nm) return;
    const newPurchase = {
      id: Date.now(),
      item: nm,
      cost: fmtCost(newPartCost),
      status: "tobuy",
      notes: "",
      partsCategory: "Engine",
      partsType: "Aftermarket",
      taskId,
    };
    setPurchases(prev => [...prev, newPurchase]);
    setNewPartName(""); setNewPartCost(""); setAddingPartToTask(null);
  }
  function updateTaskPart(taskId, partId, updates) {
    // purchases-based update: translate name→item, keep cost/status as-is
    const mapped = { ...updates };
    if (mapped.name !== undefined) { mapped.item = mapped.name; delete mapped.name; }
    setPurchases(prev => prev.map(p => p.id === partId ? { ...p, ...mapped } : p));
  }
  function removeTaskPart(taskId, partId) {
    setPurchases(prev => prev.filter(p => p.id !== partId));
  }
  // Toggle part status: tobuy → ordered → received flow
  function advanceTaskPart(task, partId) {
    const part = purchases.find(p => p.id === partId && p.taskId === task.id);
    if (!part) return;
    if (part.status === "tobuy") {
      setPurchases(prev => prev.map(p => p.id === partId ? { ...p, status: "ordered" } : p));
    } else if (part.status === "ordered") {
      // Received — open the unified receive menu (shared with shopping list)
      setReceivingId(partId);
      setReceivingStep("choose");
    }
  }

  /* ─── STYLES ─── */
  const sh = { fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 };
  const btnS = (active, ac) => ({ background: active ? ac : "transparent", color: active ? "#1a1a18" : "#555", border: "1px solid " + (active ? ac : "#2e2e2a"), borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" });

  /* ─── REPEAT UI ─── */
  function renderRepeatUI() {
    return (
      <div style={{ borderTop: "1px solid #2a2a26", paddingTop: 10, marginBottom: 8 }}>
        <div style={{ fontSize: 9, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Repeat?</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
          {[["km", "KM"], ["months", "Months"], ["both", "Both"], ["none", "No"]].map(([key, label]) => {
            const active = repeatChoice === key;
            const isNo = key === "none";
            return <button key={key} onClick={e => { e.stopPropagation(); setRepeatChoice(key); }} style={{
              background: active ? (isNo ? "rgba(85,85,85,0.12)" : "rgba(201,168,76,0.12)") : "transparent",
              color: active ? (isNo ? "#888" : "#c9a84c") : "#444",
              border: `1px solid ${active ? (isNo ? "rgba(85,85,85,0.35)" : "rgba(201,168,76,0.35)") : "#2e2e2a"}`,
              borderRadius: 3, padding: "4px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, fontFamily: "inherit",
            }}>{label}</button>;
          })}
        </div>
        {(repeatChoice === "km" || repeatChoice === "both") && (
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: "#555", width: 50 }}>Every</span>
            <input value={repeatKm} onChange={e => setRepeatKm(e.target.value)} placeholder="e.g. 10000" style={{ flex: 1, background: "#1a1a18", color: "#c9a84c", border: "1px solid rgba(201,168,76,0.35)", borderRadius: 3, padding: "5px 8px", fontSize: 11, fontFamily: "inherit", boxSizing: "border-box" }} />
            <span style={{ fontSize: 10, color: "#555" }}>km</span>
          </div>
        )}
        {(repeatChoice === "months" || repeatChoice === "both") && (
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: "#555", width: 50 }}>Every</span>
            <input value={repeatMonths} onChange={e => setRepeatMonths(e.target.value)} placeholder="e.g. 6" style={{ flex: 1, background: "#1a1a18", color: "#c9a84c", border: "1px solid rgba(201,168,76,0.35)", borderRadius: 3, padding: "5px 8px", fontSize: 11, fontFamily: "inherit", boxSizing: "border-box" }} />
            <span style={{ fontSize: 10, color: "#555" }}>months</span>
          </div>
        )}
        {repeatChoice && repeatChoice !== "none" && (repeatKm || repeatMonths) && doneMileage && (
          <div style={{ fontSize: 10, color: "#555", marginTop: 4 }}>
            Next due:{" "}
            {(repeatChoice === "km" || repeatChoice === "both") && repeatKm && <span style={{ color: "#c9a84c" }}>@ {fmtKm(parseOdo(doneMileage) + parseInt(repeatKm.replace(/[^0-9]/g, "") || "0", 10))}</span>}
            {repeatChoice === "both" && repeatKm && repeatMonths && <span style={{ color: "#555" }}> or </span>}
            {(repeatChoice === "months" || repeatChoice === "both") && repeatMonths && <span style={{ color: "#c9a84c" }}>{(() => { const d = new Date(); d.setMonth(d.getMonth() + parseInt(repeatMonths || "0", 10)); return d.toLocaleDateString("en-US", { month: "short", year: "numeric" }); })()}</span>}
          </div>
        )}
      </div>
    );
  }

  /* ─── RENDER TASK PARTS (inline editable; source = purchases linked by taskId) ─── */
  function renderTaskParts(task) {
    // Read parts from the unified purchases array, filtered by this task's id.
    // Map `item` → `name` so the render logic below stays unchanged.
    const parts = purchases
      .filter(p => p.taskId === task.id)
      .map(p => ({ ...p, name: p.item }));
    const isAdding = addingPartToTask === task.id;
    return (
      <div>
        <div style={sh}>Parts</div>
        {parts.length === 0 && !isAdding && (
          <div style={{ fontSize: 11, color: "#444", marginBottom: 6 }}>No parts</div>
        )}
        {parts.map(p => {
          const isEditingName = editingPartOnTask?.taskId === task.id && editingPartOnTask?.partId === p.id && editingPartOnTask?.field === "name";
          const isEditingCost = editingPartOnTask?.taskId === task.id && editingPartOnTask?.partId === p.id && editingPartOnTask?.field === "cost";
          const statusColor = p.status === "received" ? "#2ea84a" : p.status === "ordered" ? "#b8892e" : "#c9a84c";
          const statusChar = p.status === "received" ? "●" : p.status === "ordered" ? "◉" : "○";
          const isReceiving = receivingId === p.id;
          return (
            <div key={p.id}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, lineHeight: 1.9, paddingTop: 2, paddingBottom: 2 }}>
                <span onClick={e => { e.stopPropagation(); advanceTaskPart(task, p.id); }} style={{ color: statusColor, cursor: "pointer", fontSize: 14, width: 16, textAlign: "center" }}>{statusChar}</span>
                {isEditingName ? (
                  <input autoFocus value={partEditText} onChange={e => setPartEditText(e.target.value)}
                    onBlur={() => { updateTaskPart(task.id, p.id, { name: partEditText }); setEditingPartOnTask(null); }}
                    onKeyDown={e => { if (e.key === "Enter") { updateTaskPart(task.id, p.id, { name: partEditText }); setEditingPartOnTask(null); } }}
                    style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "3px 6px", fontSize: 12, fontFamily: "inherit" }} />
                ) : (
                  <span onClick={e => { e.stopPropagation(); setEditingPartOnTask({ taskId: task.id, partId: p.id, field: "name" }); setPartEditText(p.name); }} style={{ color: "#b8b0a0", flex: 1, cursor: "pointer", textDecoration: "underline", textDecorationColor: "#2e2e2a", textUnderlineOffset: 3 }}>
                    {p.name || <em style={{ color: "#555" }}>unnamed</em>}
                  </span>
                )}
                {isEditingCost ? (
                  <input autoFocus value={partEditText} onChange={e => setPartEditText(e.target.value)}
                    onBlur={() => { updateTaskPart(task.id, p.id, { cost: fmtCost(partEditText) }); setEditingPartOnTask(null); }}
                    onKeyDown={e => { if (e.key === "Enter") { updateTaskPart(task.id, p.id, { cost: fmtCost(partEditText) }); setEditingPartOnTask(null); } }}
                    style={{ width: 80, background: "#1a1a18", color: "#c9a84c", border: "1px solid #c9a84c", borderRadius: 3, padding: "3px 6px", fontSize: 11, fontFamily: "inherit" }} inputMode="decimal" />
                ) : (
                  <span onClick={e => { e.stopPropagation(); setEditingPartOnTask({ taskId: task.id, partId: p.id, field: "cost" }); setPartEditText(p.cost || ""); }} style={{ color: p.cost ? "#c9a84c" : "#444", fontSize: 11, cursor: "pointer", minWidth: 44, textAlign: "right" }}>
                    {p.cost || "—"}
                  </span>
                )}
                <span style={{ fontSize: 8, color: statusColor, letterSpacing: 1, width: 52, textAlign: "right", textTransform: "uppercase" }}>
                  {p.status === "tobuy" ? "TO BUY" : p.status === "ordered" ? "ORDERED" : "RECEIVED"}
                </span>
                <span onClick={e => { e.stopPropagation(); removeTaskPart(task.id, p.id); }} style={{ fontSize: 12, color: "#444", cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>✕</span>
              </div>
              {isReceiving && (
                <div style={{ background: "#252520", border: "1px solid #c9a84c44", borderRadius: 4, padding: "10px 14px", marginTop: 6, marginBottom: 6, marginLeft: 24 }}>
                  {(!receivingStep || receivingStep === "choose") && (
                    <div>
                      <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Received — what next?</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <button onClick={e => { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === task.id ? { ...t, stage: "install" } : t)); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Move task to Install</button>
                        <button onClick={e => { e.stopPropagation(); setReceivingStep("parts"); }} style={{ background: "#7c4fb822", color: "#7c4fb8", border: "1px solid #7c4fb855", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Parts List</button>
                        <button onClick={e => { e.stopPropagation(); setReceivingStep("log"); }} style={{ background: "#c9a84c22", color: "#c9a84c", border: "1px solid #c9a84c55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Service Log</button>
                        <button onClick={e => { e.stopPropagation(); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#55555522", color: "#888", border: "1px solid #55555555", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Just Remove</button>
                        <button onClick={e => { e.stopPropagation(); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                      </div>
                    </div>
                  )}
                  {receivingStep === "parts" && (
                    <div>
                      <div style={{ fontSize: 10, color: "#7c4fb8", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Add to Parts List</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <button onClick={e => { e.stopPropagation(); const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }); setAftermarketItems(prev => [...prev, { id: Date.now(), name: p.name, category: p.partsCategory || "Cosmetic", type: p.partsType || "Aftermarket", installedDate: dateStr, notes: p.notes || "" }]); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#7c4fb8", color: "#fff", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Add to Parts List</button>
                        <button onClick={e => { e.stopPropagation(); setReceivingStep("choose"); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                      </div>
                    </div>
                  )}
                  {receivingStep === "log" && (
                    <div>
                      <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Log to Service History</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <button onClick={e => { e.stopPropagation(); const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }); setServiceLogRaw(prev => [{ id: Date.now(), category: "Maintenance", title: p.name, date: dateStr, mileage: vehicleOdo || "", notes: p.notes || "Purchased and received.", parts: [p.name + (p.cost ? ` (${p.cost})` : "")] }, ...prev]); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#2ea84a", color: "#1a1a18", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Log It</button>
                        <button onClick={e => { e.stopPropagation(); setReceivingStep("choose"); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
        {isAdding ? (
          <div style={{ display: "flex", gap: 6, marginTop: 8, alignItems: "center" }}>
            <input autoFocus value={newPartName} onChange={e => setNewPartName(e.target.value)} placeholder="Part name..." style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "5px 8px", fontSize: 12, fontFamily: "inherit" }} />
            <CostInput value={newPartCost} onChange={e => setNewPartCost(e.target.value)} placeholder="Cost" style={{ width: 80, background: "#1a1a18", color: "#c9a84c", border: "1px solid #c9a84c", borderRadius: 3, padding: "5px 8px", fontSize: 11, fontFamily: "inherit", boxSizing: "border-box" }} />
            <button onClick={e => { e.stopPropagation(); addPartToTask(task.id); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "5px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Add</button>
            <button onClick={e => { e.stopPropagation(); setAddingPartToTask(null); setNewPartName(""); setNewPartCost(""); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>✕</button>
          </div>
        ) : (
          <div onClick={e => { e.stopPropagation(); setAddingPartToTask(task.id); }} style={{ fontSize: 10, color: "#c9a84c", cursor: "pointer", marginTop: 6, letterSpacing: 1 }}>+ Add part</div>
        )}
      </div>
    );
  }

  /* ─── TASK CARD ─── */
  function renderCard(task) {
    const pc = PRIORITY_CONFIG[task.priority];
    const sc = STAGE_CONFIG[task.stage];
    const tc = TYPE_CONFIG[task.type];
    const isExp = expandedId === task.id;
    const isEN = editingNote === task.id;
    const isEM = editingMileage === task.id;
    const isET = editingTitle === task.id;
    const isDone = doneId === task.id;

    return (
      <div key={task.id} id={"task-" + task.id} style={{ background: "#222220", border: "1px solid #2e2e2a", borderLeft: `3px solid ${sc.color}`, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
        <div onClick={() => setExpandedId(isExp ? null : task.id)} style={{ padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#f0e6c8" }}>{task.title}</span>
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4, flexWrap: "wrap" }}>
              <span style={{ fontSize: 9, color: pc.color, border: `1px solid ${pc.color}66`, borderRadius: 2, padding: "1px 6px", letterSpacing: 1 }}>{pc.label.toUpperCase()}</span>
              <span style={{ fontSize: 9, color: sc.color, border: `1px solid ${sc.color}66`, borderRadius: 2, padding: "1px 6px", letterSpacing: 1, display: "inline-flex", alignItems: "center", gap: 4 }}><StageIcon name={sc.icon} color={sc.color} size={10} /> {sc.label}</span>
              <span style={{ fontSize: 9, color: tc.color, border: `1px solid ${tc.color}66`, borderRadius: 2, padding: "1px 6px", letterSpacing: 1 }}>{tc.abbr}</span>
              {task.recurring && task.recurring.dueAtKm && (() => {
                const rem = task.recurring.dueAtKm - parseOdo(vehicleOdo);
                const overdue = rem <= 0;
                return <span style={{ fontSize: 9, color: overdue ? "#e74c3c" : "#c9a84c", letterSpacing: 1 }}>{overdue ? "OVERDUE" : `due @ ${fmtKm(task.recurring.dueAtKm)}`}</span>;
              })()}
              {task.recurring && task.recurring.dueByDate && !task.recurring.dueAtKm && (
                <span style={{ fontSize: 9, color: new Date(task.recurring.dueByDate) < new Date() ? "#e74c3c" : "#c9a84c", letterSpacing: 1 }}>{new Date(task.recurring.dueByDate) < new Date() ? "OVERDUE" : `due ${task.recurring.dueByDate}`}</span>
              )}
              {!task.recurring && task.mileage && <span style={{ fontSize: 9, color: "#c9a84c" }}>@ {task.mileage}</span>}
            </div>
          </div>
          <span onClick={e => { e.stopPropagation(); setDeletingId(task.id); setDeletingType("task"); }} style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px", lineHeight: 1 }}>✕</span>
        </div>

        {deletingId === task.id && deletingType === "task" && (() => {
          const linkedCount = purchases.filter(p => p.taskId === task.id).length;
          return (
            <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
              <span style={{ fontSize: 11, color: "#c0392b" }}>{linkedCount > 0 ? `Delete task + ${linkedCount} linked part${linkedCount !== 1 ? "s" : ""}?` : "Delete this task?"}</span>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={e => { e.stopPropagation(); setPurchases(prev => prev.filter(p => p.taskId !== task.id)); setTasks(prev => prev.filter(t => t.id !== task.id)); setDeletingId(null); }} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
                <button onClick={e => { e.stopPropagation(); setDeletingId(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
              </div>
            </div>
          );
        })()}

        {!isExp && <div onClick={() => setExpandedId(task.id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -4 }}><span style={{ fontSize: 10, color: "#333" }}>▼</span></div>}

        {isExp && (
          <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <div style={sh}>Title</div>
              {isET ? (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input value={titleText} onChange={e => setTitleText(e.target.value)} style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                  <button onClick={e => { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === task.id ? { ...t, title: titleText } : t)); setEditingTitle(null); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                  <button onClick={e => { e.stopPropagation(); setEditingTitle(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: "#f0e6c8" }}>{task.title}<span onClick={e => { e.stopPropagation(); setEditingTitle(task.id); setTitleText(task.title); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
              )}
            </div>
            <div>
              <div style={sh}>Mileage</div>
              {isEM ? (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <MileageInput value={mileageText} onChange={e => setMileageText(e.target.value)} placeholder="e.g. 88734" style={{ background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", width: 140 }} />
                  <button onClick={e => saveMileage(task.id, e)} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                  <button onClick={e => { e.stopPropagation(); setEditingMileage(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              ) : (
                <div style={{ fontSize: 12, color: task.mileage ? "#c9a84c" : "#444" }}>{task.mileage || "Not recorded"}<span onClick={e => { e.stopPropagation(); setEditingMileage(task.id); setMileageText(task.mileage || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
              )}
            </div>
            <div>
              <div style={sh}>Notes</div>
              {isEN ? (
                <div>

            {pickerId === task.id && pickerField === "stage" && (

            {pickerId === task.id && pickerField === "type" && (

                  <button onClick={e => { e.stopPropagation(); resolveTask(task); }} style={{ background: sc.color, color: "#1a1a18", border: "none", borderRadius: 3, padding: "7px 16px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>Complete</button>
                  <button onClick={e => { e.stopPropagation(); setDoneId(null); setRepeatChoice(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "7px 16px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                </div>
              </div>

      </div>

  const tabDefs = [
    { key: "queue", label: "Work Queue", color: "#c0392b" },
    { key: "purchases", label: "Shopping List", color: "#c9a84c" },
    { key: "log", label: "Service Log", color: "#2ea84a" },
    { key: "vehicle", label: "Vehicle Info", color: "#7c4fb8" },

  const filteredLog = serviceLog.filter(i => logFilter === "All" || i.category === logFilter);
  const logCategories = ["All", ...Array.from(new Set(serviceLog.map(s => s.category)))];

  /* ─── LOADING SCREEN ─── */
  if (syncStatus === "loading") {
    return (
      <div style={{ maxWidth: 720, margin: "0 auto", textAlign: "center", paddingTop: 120 }}>
        <div style={{ borderLeft: "4px solid #c0392b", paddingLeft: 16, display: "inline-block", textAlign: "left", marginBottom: 30 }}>

          <div style={{ fontSize: 13, fontWeight: 600, color: "#e8e0c8", letterSpacing: 1, marginTop: 4 }}>by wowsuchchris</div>
          <div style={{ fontSize: 10, color: "#c0392b", letterSpacing: 3, textTransform: "uppercase", marginTop: 4 }}>HA4 · 660cc · E07A</div>
        </div>
        <div style={{ fontSize: 11, color: "#555", letterSpacing: 2, textTransform: "uppercase" }}>☁ Loading...</div>

      <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>

          <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: "#f0e6c8" }}>1994 Honda Acty</h1>
          <div style={{ fontSize: 10, color: "#c0392b", letterSpacing: 3, textTransform: "uppercase", marginTop: 4 }}>HA4 · 660cc · E07A</div>

        <button onClick={() => setAddMode(addMode ? null : "choose")}
          style={{ width: 44, height: 44, borderRadius: 8, background: "transparent", color: addMode ? "#c0392b" : "#2ea84a", border: "2px solid #e8e0c8", fontSize: 24, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, lineHeight: 1, paddingRight: addMode ? 2 : 0 }}>

      {addMode === "choose" && (

          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setAddMode("task")} style={{ flex: 1, background: "transparent", color: "#c0392b", border: "2px solid #c0392b", borderRadius: 4, padding: "12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, letterSpacing: 1 }}>Work Queue Task</button>
            <button onClick={() => setAddMode("purchase")} style={{ flex: 1, background: "transparent", color: "#c9a84c", border: "2px solid #c9a84c", borderRadius: 4, padding: "12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, letterSpacing: 1 }}>Shopping List Item</button>
          </div>
        </div>

      {addMode === "task" && (
        <div style={{ background: "#222220", border: "1px solid #c9a84c44", borderRadius: 4, padding: "14px", marginBottom: 20 }}>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <input value={addTitle} onChange={e => setAddTitle(e.target.value)} placeholder="Task title..." style={{ background: "#1a1a18", color: "#e8e0c8", border: "1px solid #2e2e2a", borderRadius: 3, padding: "8px 10px", fontSize: 13, fontFamily: "inherit" }} />
            <AutoTextarea value={addNotes} onChange={e => setAddNotes(e.target.value)} placeholder="Notes (optional)..." style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #2e2e2a", borderRadius: 3, padding: "8px 10px", fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
            <div>
              <div style={{ fontSize: 9, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Starting Stage</div>

              </div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Type</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {TYPES.map(t => { const cfg = TYPE_CONFIG[t]; return <button key={t} onClick={() => setAddType(t)} style={{ background: addType === t ? cfg.color + "22" : "transparent", color: addType === t ? cfg.color : "#444", border: `1px solid ${addType === t ? cfg.color + "66" : "#2e2e2a"}`, borderRadius: 3, padding: "4px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, fontFamily: "inherit" }}>{cfg.label}</button>; })}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Priority</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>

            </div>
          </div>

            <div>

                {PARTS_CATEGORIES.map(c => <button key={c} onClick={() => setAddPartsCategory(c)} style={{ background: addPartsCategory === c ? PARTS_CAT_COLORS[c] + "22" : "transparent", color: addPartsCategory === c ? PARTS_CAT_COLORS[c] : "#444", border: `1px solid ${addPartsCategory === c ? PARTS_CAT_COLORS[c] + "66" : "#2e2e2a"}`, borderRadius: 3, padding: "4px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, fontFamily: "inherit" }}>{c}</button>)}

              <div style={{ display: "flex", gap: 6 }}>
                {["OEM", "Aftermarket"].map(t => <button key={t} onClick={() => setAddPartsType(t)} style={{ background: addPartsType === t ? (t === "OEM" ? "#c0392b22" : "#2e86c122") : "transparent", color: addPartsType === t ? (t === "OEM" ? "#c0392b" : "#2e86c1") : "#444", border: `1px solid ${addPartsType === t ? (t === "OEM" ? "#c0392b66" : "#2e86c166") : "#2e2e2a"}`, borderRadius: 3, padding: "4px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, fontFamily: "inherit" }}>{t}</button>)}

            <div style={{ display: "flex", gap: 8, paddingTop: 4 }}>
              <button onClick={() => { if (!addTitle.trim()) return; setPurchasesRaw(prev => [...prev, { id: Date.now(), item: addTitle.trim(), cost: addCost, status: "tobuy", notes: addNotes, partsCategory: addPartsCategory, partsType: addPartsType }]); setAddMode(null); setAddTitle(""); setAddNotes(""); setAddCost(""); setAddPartsCategory("Engine"); setAddPartsType("Aftermarket"); setTab("purchases"); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "8px 18px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>Add to Shopping List</button>
              <button onClick={() => setAddMode(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "8px 18px", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
            </div>
          </div>
        </div>

      {/* TAB BAR */}
      <div style={{ display: "flex", gap: 0, marginBottom: 20, borderBottom: "1px solid #2e2e2a", justifyContent: "center" }}>
        {tabDefs.map(t => (

        ))}
      </div>

      {/* ═══ WORK QUEUE ═══ */}
      {tab === "queue" && (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>

                <div key={p} onClick={() => setPriorityFilter(isActive ? null : p)}

            })}
          </div>
          <div style={{ display: "flex", gap: 4, marginBottom: 10, flexWrap: "wrap" }}>
            {STAGES.map(s => {
              const cfg = STAGE_CONFIG[s]; const active = stageFilters.has(s);
              const c = cfg.color; const m = c.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
              const rgb = m ? `${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)}` : "200,195,180";
              return <button key={s} onClick={() => setStageFilters(prev => { const next = new Set(prev); if (next.has(s)) { if (next.size > 1) next.delete(s); } else { next.add(s); } return next; })} style={{ flex: 1, minWidth: 60, background: active ? `rgba(${rgb},0.12)` : "transparent", color: active ? `rgb(${rgb})` : "#333", border: `1px solid ${active ? `rgba(${rgb},0.35)` : "#2e2e2a"}`, borderRadius: 3, padding: "4px 4px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit", textAlign: "center", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 4 }}><StageIcon name={cfg.icon} color={active ? `rgb(${rgb})` : "#333"} size={10} /> {cfg.label}</button>;
            })}
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 20 }}>
            {TYPES.map(t => {
              const cfg = TYPE_CONFIG[t]; const active = typeFilters.has(t);
              const c = cfg.color; const m = c.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
              const rgb = m ? `${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)}` : "200,195,180";
              return <button key={t} onClick={() => setTypeFilters(prev => { const next = new Set(prev); if (next.has(t)) { if (next.size > 1) next.delete(t); } else { next.add(t); } return next; })} style={{ flex: 1, background: active ? `rgba(${rgb},0.12)` : "transparent", color: active ? `rgb(${rgb})` : "#333", border: `1px solid ${active ? `rgba(${rgb},0.35)` : "#2e2e2a"}`, borderRadius: 3, padding: "4px 6px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit", textAlign: "center" }}>{cfg.label}</button>;
            })}
          </div>
          {(priorityFilter ? [priorityFilter] : PRIORITIES).map(p => {
            const items = grouped[p]; if (!items || items.length === 0) return null;
            const cfg = PRIORITY_CONFIG[p]; const isOpen = priorityFilter ? true : !!openPriorityGroups[p];
            return (
              <div key={p} style={{ marginBottom: 16 }}>
                <div onClick={() => { if (!priorityFilter) setOpenPriorityGroups(prev => ({ ...prev, [p]: !prev[p] })); }}
                  style={{ fontSize: 10, color: cfg.color, letterSpacing: 3, textTransform: "uppercase", borderBottom: `1px solid ${cfg.color}33`, paddingBottom: 6, marginBottom: isOpen ? 12 : 0, display: "flex", alignItems: "center", gap: 8, cursor: priorityFilter ? "default" : "pointer" }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: cfg.color, display: "inline-block" }} />
                  <span style={{ flex: 1 }}>{cfg.label} · {items.length} task{items.length !== 1 ? "s" : ""}</span>
                  {!priorityFilter && <span style={{ fontSize: 10, color: cfg.color }}>{isOpen ? "▲" : "▼"}</span>}
                </div>
                {isOpen && items.map(renderCard)}
                {isOpen && items.length >= 3 && !priorityFilter && (
                  <div onClick={() => setOpenPriorityGroups(prev => ({ ...prev, [p]: false }))} style={{ textAlign: "center", cursor: "pointer", padding: "6px 0", marginTop: -4 }}>
                    <span style={{ fontSize: 9, color: cfg.color + "88", letterSpacing: 2, textTransform: "uppercase" }}>▲ collapse {cfg.label}</span>
                  </div>
                )}
              </div>
            );
          })}
          {filtered.length === 0 && <div style={{ color: "#444", fontSize: 12, padding: 20, textAlign: "center" }}>No tasks match these filters.</div>}
          <div onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} style={{ textAlign: "center", cursor: "pointer", padding: "16px 0 8px", marginTop: 8 }}>
            <span style={{ fontSize: 9, color: "#333", letterSpacing: 2, textTransform: "uppercase" }}>▲ back to top</span>
          </div>
        </div>
      )}

      {/* ═══ SHOPPING LIST (unified purchases) ═══ */}
      {tab === "purchases" && (
        <div>
          <div style={{ fontSize: 10, color: "#888", marginBottom: 16, lineHeight: 1.6 }}>Tap checkbox to advance: To Buy → Ordered → Received.</div>
          {(() => {
            const toBuy = purchases.filter(p => p.status === "tobuy");
            const ordered = purchases.filter(p => p.status === "ordered");
            const toBuyTotal = toBuy.reduce((s, p) => s + parseCost(p.cost), 0);
            const orderedTotal = ordered.reduce((s, p) => s + parseCost(p.cost), 0);

            function renderPurchaseRow(p, checkAction, checkStyle) {
              const isPExp = expandedPurchaseId === p.id;
              const isEPN = editingPurchaseNote === p.id;
              const isEPName = editingPurchaseName === p.id;
              const isEditingCostThis = editingCost === p.id;
              const parentTask = p.taskId ? tasks.find(t => t.id === p.taskId) : null;
              const leftBorderColor = parentTask ? (STAGE_CONFIG[parentTask.stage]?.color || "#555") : null;
              return (
                <div key={p.id} style={{ background: "#222220", border: "1px solid #2e2e2a", borderLeft: leftBorderColor ? `3px solid ${leftBorderColor}` : "1px solid #2e2e2a", borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
                  <div onClick={() => setExpandedPurchaseId(isPExp ? null : p.id)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                    <div onClick={e => { e.stopPropagation(); checkAction(); }} style={{ width: 18, height: 18, borderRadius: 3, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", ...checkStyle }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: "#f0e6c8" }}>{p.item}</div>
                      <div style={{ fontSize: 10, color: PARTS_CAT_COLORS[p.partsCategory] || "#555", marginTop: 1, letterSpacing: 1, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                        <span>{p.partsCategory || "Uncategorized"}</span>
                        {p.partsType && <span style={{ fontSize: 8, color: p.partsType === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${p.partsType === "OEM" ? "#c0392b44" : "#2e86c144"}`, borderRadius: 2, padding: "0px 4px", letterSpacing: 1 }}>{p.partsType}</span>}
                        {parentTask && <span style={{ fontSize: 8, color: "#888", letterSpacing: 1 }}>FOR: {parentTask.title.toUpperCase()}</span>}
                      </div>
                    </div>
                    <span style={{ fontSize: 12, color: p.cost ? "#c9a84c" : "#333", fontWeight: 600, flexShrink: 0 }}>{p.cost || "—"}</span>
                    <span onClick={e => { e.stopPropagation(); setDeletingId(p.id); setDeletingType("purchase"); }} style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px", lineHeight: 1, flexShrink: 0 }}>✕</span>
                  </div>
                  {deletingId === p.id && deletingType === "purchase" && (
                    <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 11, color: "#c0392b" }}>{parentTask ? "Remove this part from its task?" : "Delete this item?"}</span>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={e => { e.stopPropagation(); setPurchases(prev => prev.filter(x => x.id !== p.id)); setDeletingId(null); }} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
                        <button onClick={e => { e.stopPropagation(); setDeletingId(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                      </div>
                    </div>
                  )}
                  {!isPExp && <div onClick={() => setExpandedPurchaseId(p.id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -4 }}><span style={{ fontSize: 10, color: "#333" }}>▼</span></div>}
                  {isPExp && (
                    <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
                      <div><div style={sh}>Item Name</div>
                        {isEPName ? (
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <input value={purchaseNameText} onChange={e => setPurchaseNameText(e.target.value)} style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                            <button onClick={e => { e.stopPropagation(); setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, item: purchaseNameText } : x)); setEditingPurchaseName(null); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                            <button onClick={() => setEditingPurchaseName(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: "#f0e6c8" }}>{p.item}<span onClick={() => { setEditingPurchaseName(p.id); setPurchaseNameText(p.item); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
                        )}
                      </div>
                      <div><div style={sh}>Cost</div>
                        {isEditingCostThis ? (
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <CostInput value={costText} onChange={e => setCostText(e.target.value)} placeholder="0" style={{ background: "#1a1a18", color: "#c9a84c", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", width: 100, boxSizing: "border-box" }} />
                            <button onClick={() => { setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, cost: fmtCost(costText) } : x)); setEditingCost(null); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                            <button onClick={() => setEditingCost(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: p.cost ? "#c9a84c" : "#444" }}>{p.cost || "No price set"}<span onClick={() => { setEditingCost(p.id); setCostText(p.cost || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
                        )}
                      </div>
                      <div><div style={sh}>Notes</div>
                        {isEPN ? (
                          <div>
                            <AutoTextarea value={purchaseNoteText} onChange={e => setPurchaseNoteText(e.target.value)} style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
                            <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                              <button onClick={() => { setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, notes: purchaseNoteText } : x)); setEditingPurchaseNote(null); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                              <button onClick={() => setEditingPurchaseNote(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: "#b8b0a0", lineHeight: 1.7 }}>{p.notes || "No notes"}<span onClick={() => { setEditingPurchaseNote(p.id); setPurchaseNoteText(p.notes || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => { const cur = p.partsCategory || "Engine"; const i = PARTS_CATEGORIES.indexOf(cur); setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, partsCategory: PARTS_CATEGORIES[(i + 1) % PARTS_CATEGORIES.length] } : x)); }} style={{ flex: 1, background: "transparent", color: PARTS_CAT_COLORS[p.partsCategory] || "#555", border: `1px solid ${PARTS_CAT_COLORS[p.partsCategory] || "#555"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}>{p.partsCategory || "Uncategorized"} →</button>
                        <button onClick={() => setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, partsType: (p.partsType || "Aftermarket") === "OEM" ? "Aftermarket" : "OEM" } : x))} style={{ width: 120, background: "transparent", color: (p.partsType || "Aftermarket") === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${(p.partsType || "Aftermarket") === "OEM" ? "#c0392b" : "#2e86c1"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{p.partsType || "Aftermarket"} →</button>
                      </div>
                    </div>
                  )}
                  {isPExp && <div onClick={() => setExpandedPurchaseId(null)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, paddingTop: 2 }}><span style={{ fontSize: 10, color: "#333" }}>▲</span></div>}
                </div>
              );
            }

            return (
              <div>
                {toBuy.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 3, textTransform: "uppercase", borderBottom: "1px solid #c9a84c33", paddingBottom: 6, marginBottom: 12 }}>To Buy · {toBuy.length}</div>
                    {toBuy.map(p => renderPurchaseRow(p, () => setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, status: "ordered" } : x)), { border: "2px solid #555" }))}
                    {toBuyTotal > 0 && (
                      <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 14px 0", gap: 10 }}>
                        <span style={{ fontSize: 10, color: "#555", letterSpacing: 1, textTransform: "uppercase" }}>To Buy Total</span>
                        <span style={{ fontSize: 12, color: "#c9a84c", fontWeight: 600, width: 80, textAlign: "right" }}>~${toBuyTotal.toFixed(2)}</span>
                      </div>
                    )}
                  </div>
                )}
                {ordered.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 10, color: "#b8892e", letterSpacing: 3, textTransform: "uppercase", borderBottom: "1px solid #b8892e33", paddingBottom: 6, marginBottom: 12 }}>Ordered · {ordered.length} — tap ✓ when received</div>
                    {ordered.map(p => {
                      const isReceiving = receivingId === p.id;
                      const parentTask = p.taskId ? tasks.find(t => t.id === p.taskId) : null;
                      return (
                        <div key={p.id}>
                          {renderPurchaseRow(p, () => { setReceivingId(p.id); setReceivingStep("choose"); }, { border: "2px solid #b8892e", background: "#b8892e22" })}
                          {isReceiving && (
                            <div style={{ background: "#252520", border: "1px solid #c9a84c44", borderRadius: 4, padding: "10px 14px", marginBottom: 8, marginTop: -4 }}>
                              {(!receivingStep || receivingStep === "choose") && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Received — what next?</div>
                                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                    {parentTask ? (
                                      <button onClick={() => { setTasks(prev => prev.map(t => t.id === parentTask.id ? { ...t, stage: "install" } : t)); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Move task to Install</button>
                                    ) : (
                                      <button onClick={() => setReceivingStep("install")} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Create Install task</button>
                                    )}
                                    <button onClick={() => setReceivingStep("parts")} style={{ background: "#7c4fb822", color: "#7c4fb8", border: "1px solid #7c4fb855", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Parts List</button>
                                    <button onClick={() => setReceivingStep("log")} style={{ background: "#c9a84c22", color: "#c9a84c", border: "1px solid #c9a84c55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>→ Service Log</button>
                                    <button onClick={() => { setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#55555522", color: "#888", border: "1px solid #55555555", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Just Remove</button>
                                    <button onClick={() => { setReceivingId(null); setReceivingStep(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                                  </div>
                                </div>
                              )}
                              {receivingStep === "install" && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#2ea84a", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Create Install Task — Priority?</div>
                                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                    {PRIORITIES.map(pr => { const cfg = PRIORITY_CONFIG[pr]; return <button key={pr} onClick={() => { setTasks(prev => [...prev, { id: Date.now(), stage: "install", type: "modification", priority: pr, title: p.item, notes: p.notes || "Received. Ready to install.", mileage: null }]); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: cfg.color + "22", color: cfg.color, border: `1px solid ${cfg.color}66`, borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", letterSpacing: 1 }}>{cfg.label}</button>; })}
                                    <button onClick={() => setReceivingStep("choose")} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                                  </div>
                                </div>
                              )}
                              {receivingStep === "parts" && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#7c4fb8", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Add to Parts List</div>
                                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                    <button onClick={() => { const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }); setAftermarketItems(prev => [...prev, { id: Date.now(), name: p.item, category: p.partsCategory || "Cosmetic", type: p.partsType || "Aftermarket", installedDate: dateStr, notes: p.notes || "" }]); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#7c4fb8", color: "#fff", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Add to Parts List</button>
                                    <button onClick={() => setReceivingStep("choose")} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                                  </div>
                                </div>
                              )}
                              {receivingStep === "log" && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Log to Service History</div>
                                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                    <button onClick={() => { const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }); setServiceLogRaw(prev => [{ id: Date.now(), category: "Maintenance", title: p.item, date: dateStr, mileage: vehicleOdo || "", notes: p.notes || "Purchased and received.", parts: [p.item + (p.cost ? ` (${p.cost})` : "")] }, ...prev]); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#2ea84a", color: "#1a1a18", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Log It</button>
                                    <button onClick={() => setReceivingStep("choose")} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {orderedTotal > 0 && (
                      <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 14px 0", gap: 10 }}>
                        <span style={{ fontSize: 10, color: "#555", letterSpacing: 1, textTransform: "uppercase" }}>Ordered Total</span>
                        <span style={{ fontSize: 12, color: "#b8892e", fontWeight: 600, width: 80, textAlign: "right" }}>~${orderedTotal.toFixed(2)}</span>
                      </div>
                    )}
                  </div>
                )}
                {toBuy.length === 0 && ordered.length === 0 && <div style={{ color: "#444", fontSize: 12, padding: 20, textAlign: "center" }}>Shopping list is empty.</div>}
              </div>
            );
          })()}
        </div>
      )}

      {/* ═══ SERVICE LOG ═══ */}
      {tab === "log" && (
        <div>
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            {logCategories.map(c => { const catColorMap = { Maintenance: "#c0392b", Repair: "#3a7fb8", Modification: "#b8892e", Inspect: "#c0392b", "Tune-up": "#3d8f4a", Maintain: "#3d8f4a", Monitor: "#b8892e", Install: "#7c4fb8" }; return <button key={c} onClick={() => setLogFilter(c)} style={btnS(logFilter === c, c === "All" ? "#2ea84a" : catColorMap[c] || "#2ea84a")}>{c}</button>; })}
          </div>
          {filteredLog.length === 0
            ? <div style={{ color: "#444", fontSize: 12, padding: 20, textAlign: "center" }}>No entries match this filter.</div>
            : filteredLog.map((entry, idx) => {
              const isExp = expandedLogId === entry.id; const isLast = idx === filteredLog.length - 1;
              return (
                <div key={entry.id} style={{ display: "flex", gap: 0 }}>

            </div>
            <button onClick={() => { const state = { tasks, serviceLog, vehicleOdo, purchases, aftermarket: aftermarketItems }; const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "acty-backup-" + new Date().toISOString().slice(0, 10) + ".json"; a.click(); }} style={{ background: "transparent", color: "#2e2e2a", border: "1px solid #2e2e2a", borderRadius: 3, padding: "6px 16px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>Export Backup</button>
            <button onClick={() => { const input = document.createElement("input"); input.type = "file"; input.accept = ".json"; input.onchange = e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = ev => { try { const data = JSON.parse(ev.target.result); const m = migrate(data); if (m.tasks) setTasksRaw(autoEscalate(m.tasks, m.vehicleOdo || vehicleOdo)); if (m.serviceLog) setServiceLogRaw(m.serviceLog); if (m.vehicleOdo) setVehicleOdoRaw(m.vehicleOdo); if (m.purchases) setPurchasesRaw(m.purchases); if (m.aftermarket) setAftermarketItems(m.aftermarket); setSyncStatus("saving"); } catch { alert("Could not read backup file."); } }; reader.readAsText(file); }; input.click(); }} style={{ background: "transparent", color: "#2e2e2a", border: "1px solid #2e2e2a", borderRadius: 3, padding: "6px 16px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>Import Backup</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<ActyTracker />, document.getElementById("root"));
</script>
</body>
</html>
