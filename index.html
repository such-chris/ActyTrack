  const swCode = `
    const CACHE_NAME = 'acty-v2';
    const URLS_TO_CACHE = ['./', './index.html'];
    self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(URLS_TO_CACHE)).then(() => self.skipWaiting())); });
    self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))).then(() => self.clients.claim())); });
    self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(c => c || fetch(e.request).then(r => { if (r && r.status === 200) { const cl = r.clone(); caches.open(CACHE_NAME).then(ca => ca.put(e.request, cl)); } return r; }).catch(() => c))); });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' }).catch(() => {});
}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── PERSISTENCE ─── */
const JSONBIN_KEY = "$2a$10$k8e6dDUkcBTWUYPEopWhEuKlQzn2yGacUCZugtl0JWrGJbzi.LC1i";
const BIN_ID = "69c0230aaa77b81da90aee10";
const DATA_VERSION = 6;

async function cloudSave(state) {
  try {
    await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
      body: JSON.stringify({ ...state, _v: DATA_VERSION })
    });
  } catch {}
}

async function cloudLoad() {
  try {
    const res = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", {
      headers: { "X-Master-Key": JSONBIN_KEY }
    });
    const d = await res.json();
    return d?.record || null;
  } catch {
    return null;
  }
}

/* ─── CONSTANTS ─── */
const STAGES = ["monitor", "inspect", "purchase", "install"];
const STAGE_CONFIG = {
  monitor:  { label: "Monitor",  color: "#3a7fc1", icon: "◉" },
  inspect:  { label: "Inspect",  color: "#d68910", icon: "⊙" },
  purchase: { label: "Purchase", color: "#c9a84c", icon: "◎" },
  install:  { label: "Install",  color: "#2ea84a", icon: "◈" },
};
const TYPES = ["maintenance", "repair", "modification"];
const TYPE_CONFIG = {
  maintenance:  { label: "Maintenance",  color: "#c0392b", abbr: "MNT" },
  repair:       { label: "Repair",       color: "#d68910", abbr: "RPR" },
  modification: { label: "Modification", color: "#7c3ac1", abbr: "MOD" },
};
const PRIORITIES = ["urgent", "thisweek", "upcoming", "longterm"];
const PRIORITY_CONFIG = {
  urgent:   { label: "Urgent",    color: "#e74c3c", bg: "rgba(231,76,60,0.08)" },
  thisweek: { label: "This Week", color: "#c0392b", bg: "rgba(192,57,43,0.06)" },
  upcoming: { label: "Upcoming",  color: "#d68910", bg: "rgba(214,137,16,0.06)" },
  longterm: { label: "Long-term", color: "#2e86c1", bg: "rgba(46,134,193,0.06)" },
};

const PARTS_CATEGORIES = ["Engine", "Drivetrain", "Electric", "Brakes/Suspension", "Wheels/Tires", "Cosmetic"];
const PARTS_CAT_COLORS = { Engine: "#c0392b", Drivetrain: "#d68910", Electric: "#c9a84c", "Brakes/Suspension": "#2ea84a", "Wheels/Tires": "#2e86c1", Cosmetic: "#7c3ac1" };

/* ─── HELPERS ─── */
function fmt(val) { if (!val && val !== 0) return val; const d = String(val).replace(/[^0-9]/g, ""); if (!d) return String(val); return parseInt(d, 10).toLocaleString() + " km"; }
function parseOdo(val) { if (!val) return 0; const d = String(val).replace(/[^0-9]/g, ""); return d ? parseInt(d, 10) : 0; }

function getRecurringDue(recurring, completedAtKm) {
  if (!recurring) return null;
  const r = {};
  if (recurring.kmInterval && completedAtKm) r.dueAtKm = completedAtKm + recurring.kmInterval;
  if (recurring.monthsInterval) { const d = new Date(); d.setMonth(d.getMonth() + recurring.monthsInterval); r.dueByDate = d.toLocaleDateString("en-US", { month: "short", year: "numeric" }); }
  return r;
}

function buildRecurring(choice, currentOdo, kmVal, monthsVal) {
  if (!choice || choice === "none") return null;
  const odo = parseOdo(currentOdo);
  const kmI = (choice === "km" || choice === "both") && kmVal ? parseInt(String(kmVal).replace(/[^0-9]/g, ""), 10) : null;
  const moI = (choice === "months" || choice === "both") && monthsVal ? parseInt(String(monthsVal).replace(/[^0-9]/g, ""), 10) : null;
  if (!kmI && !moI) return null;
  const r = { kmInterval: kmI || null, monthsInterval: moI || null };
  return { ...r, ...getRecurringDue(r, odo) };
}

function autoEscalate(tasks, currentOdo) {
  const odo = parseOdo(currentOdo);
  const now = new Date();
  return tasks.map(t => {
    if (!t.recurring) return t;
    let newP = t.priority;
    if (t.recurring.dueAtKm && odo > 0) {
      const rem = t.recurring.dueAtKm - odo;
      if (rem <= 500) newP = "urgent";
      else if (rem <= 1000) newP = "thisweek";
      else if (rem <= 6000) newP = "upcoming";
    }
    if (t.recurring.dueByDate) {
      const dueD = new Date(t.recurring.dueByDate);
      const days = (dueD - now) / (1000 * 60 * 60 * 24);
      if (days <= 0) newP = "urgent";
      else if (days <= 7 && PRIORITIES.indexOf(newP) > 1) newP = "thisweek";
      else if (days <= 60 && PRIORITIES.indexOf(newP) > 2) newP = "upcoming";
    }
    return newP !== t.priority ? { ...t, priority: newP } : t;
  });
}

/* ─── AUTO-RESIZE TEXTAREA ─── */
function autoResize(el) { if (!el) return; el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 300) + "px"; }
function AutoTextarea({ value, onChange, placeholder, style, ...props }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) autoResize(ref.current); }, [value]);
  return (
    <textarea ref={ref} value={value} onChange={e => { onChange(e); if (ref.current) autoResize(ref.current); }} placeholder={placeholder}
      style={{ ...style, overflow: "hidden", minHeight: 40 }} {...props} />
  );
}

/* ─── APP ─── */
function ActyTracker() {
  const [tab, setTab] = useState("queue");
  // Work queue
  const [tasks, setTasksRaw] = useState([]);
  const [stageFilters, setStageFilters] = useState(new Set(STAGES));
  const [typeFilters, setTypeFilters] = useState(new Set(TYPES));
  const [priorityFilter, setPriorityFilter] = useState(null);
  const [expandedId, setExpandedId] = useState(null);
  const [editingNote, setEditingNote] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [editingTitle, setEditingTitle] = useState(null);
  const [titleText, setTitleText] = useState("");
  const [editingMileage, setEditingMileage] = useState(null);
  const [mileageText, setMileageText] = useState("");
  // Done flow
  const [doneId, setDoneId] = useState(null);
  const [doneStep, setDoneStep] = useState(null);
  const [doneNote, setDoneNote] = useState("");
  const [doneMileage, setDoneMileage] = useState("");
  const [donePartCategory, setDonePartCategory] = useState("Engine");
  const [donePartType, setDonePartType] = useState("Aftermarket");
  const [repeatChoice, setRepeatChoice] = useState(null);
  const [repeatKm, setRepeatKm] = useState("");
  const [repeatMonths, setRepeatMonths] = useState("");
  // Add mode
  const [addMode, setAddMode] = useState(null);
  const [addTitle, setAddTitle] = useState("");
  const [addNotes, setAddNotes] = useState("");
  const [addStage, setAddStage] = useState("monitor");
  const [addType, setAddType] = useState("repair");
  const [addPriority, setAddPriority] = useState("upcoming");
  const [addCost, setAddCost] = useState("");
  const [addPartsCategory, setAddPartsCategory] = useState("Engine");
  const [addPartsType, setAddPartsType] = useState("Aftermarket");
  const [addShopItem, setAddShopItem] = useState("");
  const [addShopCost, setAddShopCost] = useState("");
  const [stagePickerShopItem, setStagePickerShopItem] = useState("");
  const [stagePickerShopCost, setStagePickerShopCost] = useState("");
  // Delete
  const [deletingId, setDeletingId] = useState(null);
  const [deletingType, setDeletingType] = useState(null);
  // Inline picker
  const [pickerId, setPickerId] = useState(null);
  const [pickerField, setPickerField] = useState(null);
  // Service log
  const [serviceLog, setServiceLogRaw] = useState([]);
  const [logFilter, setLogFilter] = useState("All");
  const [expandedLogId, setExpandedLogId] = useState(null);
  const [editingLogField, setEditingLogField] = useState(null);
  const [logFieldText, setLogFieldText] = useState("");
  // Purchases
  const [purchases, setPurchasesRaw] = useState([]);
  const [expandedPurchaseId, setExpandedPurchaseId] = useState(null);
  const [editingPurchaseNote, setEditingPurchaseNote] = useState(null);
  const [purchaseNoteText, setPurchaseNoteText] = useState("");
  const [editingPurchaseName, setEditingPurchaseName] = useState(null);
  const [purchaseNameText, setPurchaseNameText] = useState("");
  const [editingCost, setEditingCost] = useState(null);
  const [costText, setCostText] = useState("");
  const [receivingId, setReceivingId] = useState(null);
  const [receivingStep, setReceivingStep] = useState(null);
  // Vehicle
  const [vehicleOdo, setVehicleOdoRaw] = useState("");
  const [aftermarketItems, setAftermarketItems] = useState([]);
  const [infoOpen, setInfoOpen] = useState(true);
  const [prevOwnerOpen, setPrevOwnerOpen] = useState(false);
  const [aftermarketOpen, setAftermarketOpen] = useState(false);
  const [contactsOpen, setContactsOpen] = useState(false);
  const [editingField, setEditingField] = useState(null);
  const [editingFieldValue, setEditingFieldValue] = useState("");
  const [expandedPartId, setExpandedPartId] = useState(null);
  const [editingPartField, setEditingPartField] = useState(null);
  const [partFieldText, setPartFieldText] = useState("");
  const [partsFilter, setPartsFilter] = useState("All");
  // Sync
  const [syncStatus, setSyncStatus] = useState("loading");
  const [openPriorityGroups, setOpenPriorityGroups] = useState({ urgent: true, thisweek: false, upcoming: false, longterm: false });

  function setTasks(updater) { setTasksRaw(updater); }
  function setPurchases(updater) { setPurchasesRaw(updater); }

  // Load from cloud on mount
  const loaded = useRef(false);
  useEffect(() => {
    cloudLoad().then(cloud => {
      if (cloud) {
        const odo = cloud.vehicleOdo || "";
        setTasksRaw(autoEscalate(cloud.tasks || [], odo));
        setServiceLogRaw(cloud.serviceLog || []);
        setVehicleOdoRaw(cloud.vehicleOdo || "");
        setPurchasesRaw(cloud.purchases || []);
        setAftermarketItems(cloud.aftermarket || []);
        setSyncStatus("saved");
      } else {
        setSyncStatus("offline");
      }
      loaded.current = true;
    }).catch(() => { setSyncStatus("offline"); loaded.current = true; });
  }, []);

  // Auto-save with debounce
  const saveTimer = useRef(null);
  useEffect(() => {
    if (!loaded.current) return;
    const state = { tasks, serviceLog, vehicleOdo, purchases, aftermarket: aftermarketItems };
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      setSyncStatus("saving");
      cloudSave(state).then(() => setSyncStatus("saved")).catch(() => setSyncStatus("offline"));
    }, 2000);
  }, [tasks, serviceLog, vehicleOdo, purchases, aftermarketItems]);

  /* ─── FILTERING & GROUPING ─── */
  const filtered = tasks.filter(t => {
    if (!stageFilters.has(t.stage)) return false;
    if (!typeFilters.has(t.type)) return false;
    if (priorityFilter && t.priority !== priorityFilter) return false;
    return true;
  });
  const grouped = {};
  PRIORITIES.forEach(p => { grouped[p] = filtered.filter(t => t.priority === p); });
  const counts = {};
  PRIORITIES.forEach(p => { counts[p] = tasks.filter(t => t.priority === p).length; });

  /* ─── TASK ACTIONS ─── */
  function startDone(id, e) {
    e.stopPropagation();
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    setDoneId(id);
    setDoneNote(task.notes || "");
    setDoneMileage(task.mileage || vehicleOdo || "");
    setDonePartCategory("Engine");
    setDonePartType(task.type === "modification" ? "Aftermarket" : "OEM");
    setRepeatChoice(task.recurring ? (task.recurring.kmInterval && task.recurring.monthsInterval ? "both" : task.recurring.kmInterval ? "km" : "months") : null);
    setRepeatKm(task.recurring?.kmInterval ? String(task.recurring.kmInterval) : "");
    setRepeatMonths(task.recurring?.monthsInterval ? String(task.recurring.monthsInterval) : "");
    if (task.stage === "monitor") setDoneStep("monitor_done");
    else if (task.stage === "inspect") setDoneStep("inspect_done");
    else if (task.stage === "purchase") setDoneStep("purchase_done");
    else if (task.stage === "install") setDoneStep("install_done");
  }

  function promoteToStage(task, newStage) {
    setTasks(prev => prev.map(t => t.id === task.id ? { ...t, stage: newStage } : t));
    setDoneId(null); setDoneStep(null); setExpandedId(null);
  }

  function resolveTask(task, logIt = true) {
    if (logIt) {
      const fmtM = fmt(doneMileage) || task.mileage || vehicleOdo;
      if (doneMileage && doneMileage.trim()) setVehicleOdoRaw(fmt(doneMileage));
      setServiceLogRaw(prev => [{ id: Date.now(), category: TYPE_CONFIG[task.type]?.label || task.type, title: task.title, date: new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }), mileage: fmtM, notes: doneNote || task.notes || "", parts: task.parts || [] }, ...prev]);
    }
    const recurring = buildRecurring(repeatChoice, doneMileage || vehicleOdo, repeatKm, repeatMonths);
    if (recurring) {
      setTasks(prev => [...prev.filter(t => t.id !== task.id), {
        id: Date.now() + 1, stage: "monitor", type: task.type, priority: "longterm",
        title: task.title, notes: task.notes || "", mileage: null, parts: task.parts || [], recurring
      }]);
    } else {
      setTasks(prev => prev.filter(t => t.id !== task.id));
    }
    if (doneMileage && doneMileage.trim()) setTimeout(() => setTasksRaw(prev => autoEscalate(prev, doneMileage)), 100);
    setDoneId(null); setDoneStep(null); setExpandedId(null); setRepeatChoice(null);
  }

  function addToShoppingList(task) {
    const newParts = (task.parts || []).filter(p => p && !p.includes("(ordered"));
    if (newParts.length > 0) {
      setPurchasesRaw(prev => [...prev, ...newParts.map((p, i) => ({
        id: Date.now() + i, item: p, cost: "", status: "tobuy", notes: "For: " + task.title, partsCategory: "Engine", partsType: "OEM"
      }))]);
    }
    promoteToStage(task, "install");
  }

  function finishInstallLog(task) { resolveTask(task, true); }

  function finishInstallWithParts(task) {
    const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" });
    setAftermarketItems(prev => [...prev, {
      id: Date.now(), name: task.title + (doneNote ? " — " + doneNote : ""),
      category: donePartCategory, type: donePartType, installedDate: dateStr
    }]);
    resolveTask(task, true);
  }

  function saveNote(id, e) { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === id ? { ...t, notes: noteText } : t)); setEditingNote(null); }
  function saveMileage(id, e) { e.stopPropagation(); setTasks(prev => prev.map(t => t.id === id ? { ...t, mileage: fmt(mileageText) } : t)); setEditingMileage(null); }

  /* ─── STYLES ─── */
  const sh = { fontSize: 10, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 };
  const btnS = (active, ac) => ({ background: active ? ac : "transparent", color: active ? "#1a1a18" : "#555", border: "1px solid " + (active ? ac : "#2e2e2a"), borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" });

  /* ─── REPEAT UI ─── */
  function renderRepeatUI() {
    return (
      <div style={{ borderTop: "1px solid #2a2a26", paddingTop: 10, marginBottom: 8 }}>
        <div style={{ fontSize: 9, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Repeat?</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
          {[["km", "KM"], ["months", "Months"], ["both", "Both"], ["none", "No"]].map(([key, label]) => {
            const active = repeatChoice === key;
            const isNo = key === "none";
            return <button key={key} onClick={e => { e.stopPropagation(); setRepeatChoice(key); }} style={{
              background: active ? (isNo ? "rgba(85,85,85,0.12)" : "rgba(201,168,76,0.12)") : "transparent",
              color: active ? (isNo ? "#888" : "#c9a84c") : "#444",
              border: `1px solid ${active ? (isNo ? "rgba(85,85,85,0.35)" : "rgba(201,168,76,0.35)") : "#2e2e2a"}`,
              borderRadius: 3, padding: "4px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, fontFamily: "inherit",
            }}>{label}</button>;
          })}
        </div>
        {(repeatChoice === "km" || repeatChoice === "both") && (
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: "#555", width: 50 }}>Every</span>
            <input value={repeatKm} onChange={e => setRepeatKm(e.target.value)} placeholder="e.g. 10000" style={{ flex: 1, background: "#1a1a18", color: "#c9a84c", border: "1px solid rgba(201,168,76,0.35)", borderRadius: 3, padding: "5px 8px", fontSize: 11, fontFamily: "inherit", boxSizing: "border-box" }} />
            <span style={{ fontSize: 10, color: "#555" }}>km</span>
          </div>
        )}
        {(repeatChoice === "months" || repeatChoice === "both") && (
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: "#555", width: 50 }}>Every</span>
            <input value={repeatMonths} onChange={e => setRepeatMonths(e.target.value)} placeholder="e.g. 6" style={{ flex: 1, background: "#1a1a18", color: "#c9a84c", border: "1px solid rgba(201,168,76,0.35)", borderRadius: 3, padding: "5px 8px", fontSize: 11, fontFamily: "inherit", boxSizing: "border-box" }} />
            <span style={{ fontSize: 10, color: "#555" }}>months</span>
          </div>
        )}
        {repeatChoice && repeatChoice !== "none" && (repeatKm || repeatMonths) && doneMileage && (
          <div style={{ fontSize: 10, color: "#555", marginTop: 4 }}>
            Next due:{" "}
            {(repeatChoice === "km" || repeatChoice === "both") && repeatKm && <span style={{ color: "#c9a84c" }}>@ {fmt(parseOdo(doneMileage) + parseInt(repeatKm.replace(/[^0-9]/g, "") || "0", 10))}</span>}
            {repeatChoice === "both" && repeatKm && repeatMonths && <span style={{ color: "#555" }}> or </span>}
            {(repeatChoice === "months" || repeatChoice === "both") && repeatMonths && <span style={{ color: "#c9a84c" }}>{(() => { const d = new Date(); d.setMonth(d.getMonth() + parseInt(repeatMonths || "0", 10)); return d.toLocaleDateString("en-US", { month: "short", year: "numeric" }); })()}</span>}
          </div>
        )}
      </div>
    );
  }

  /* ─── TASK CARD ─── */
  function renderCard(task) {
    const pc = PRIORITY_CONFIG[task.priority];
    const sc = STAGE_CONFIG[task.stage];
    const tc = TYPE_CONFIG[task.type];
    const isExp = expandedId === task.id;
    const isEN = editingNote === task.id;
    const isEM = editingMileage === task.id;
    const isET = editingTitle === task.id;

    return (
      <div key={task.id} id={"task-" + task.id} style={{ background: "#222220", border: "1px solid #2e2e2a", borderLeft: `3px solid ${sc.color}`, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
        <div onClick={() => setExpandedId(isExp ? null : task.id)} style={{ padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "#f0e6c8" }}>{task.title}</span>
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4, flexWrap: "wrap" }}>
              <span style={{ fontSize: 9, color: sc.color, border: `1px solid ${sc.color}44`, borderRadius: 2, padding: "1px 6px", letterSpacing: 1 }}>{sc.icon} {sc.label}</span>

                  <div onClick={() => setExpandedPurchaseId(isPExp ? null : p.id)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                    <div onClick={e => { e.stopPropagation(); checkAction(); }} style={{ width: 18, height: 18, borderRadius: 3, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", ...checkStyle }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: "#f0e6c8" }}>{p.item}</div>
                      <div style={{ fontSize: 10, color: PARTS_CAT_COLORS[p.partsCategory] || "#555", marginTop: 1, letterSpacing: 1, display: "flex", gap: 6, alignItems: "center" }}>
                        {p.partsCategory || "Uncategorized"}
                        {p.partsType && <span style={{ fontSize: 8, color: p.partsType === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${p.partsType === "OEM" ? "#c0392b44" : "#2e86c144"}`, borderRadius: 2, padding: "0px 4px", letterSpacing: 1 }}>{p.partsType}</span>}
                      </div>
                    </div>
                    <span style={{ fontSize: 12, color: p.cost ? "#c9a84c" : "#333", fontWeight: 600, flexShrink: 0 }}>{p.cost || "—"}</span>
                    <span onClick={e => { e.stopPropagation(); setDeletingId(p.id); setDeletingType("purchase"); }} style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px", lineHeight: 1, flexShrink: 0 }}>✕</span>
                  </div>
                  {deletingId === p.id && deletingType === "purchase" && (
                    <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 11, color: "#c0392b" }}>Delete this item?</span>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={e => { e.stopPropagation(); setPurchases(prev => prev.filter(x => x.id !== p.id)); setDeletingId(null); }} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
                        <button onClick={e => { e.stopPropagation(); setDeletingId(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                      </div>
                    </div>
                  )}
                  {!isPExp && <div onClick={() => setExpandedPurchaseId(p.id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -4 }}><span style={{ fontSize: 10, color: "#333" }}>▼</span></div>}
                  {isPExp && (
                    <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
                      <div><div style={sh}>Item Name</div>
                        {isEPName ? (
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <input value={purchaseNameText} onChange={e => setPurchaseNameText(e.target.value)} style={{ flex: 1, background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                            <button onClick={e => { e.stopPropagation(); setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, item: purchaseNameText } : x)); setEditingPurchaseName(null); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                            <button onClick={() => setEditingPurchaseName(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: "#f0e6c8" }}>{p.item}<span onClick={() => { setEditingPurchaseName(p.id); setPurchaseNameText(p.item); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
                        )}
                      </div>
                      <div><div style={sh}>Cost</div>
                        {isEditingCostThis ? (
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <input value={costText} onChange={e => setCostText(e.target.value)} placeholder="$0" style={{ background: "#1a1a18", color: "#c9a84c", border: "1px solid #c9a84c", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit", width: 100 }} />
                            <button onClick={() => { setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, cost: costText } : x)); setEditingCost(null); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                            <button onClick={() => setEditingCost(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: p.cost ? "#c9a84c" : "#444" }}>{p.cost || "No price set"}<span onClick={() => { setEditingCost(p.id); setCostText(p.cost || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
                        )}
                      </div>
                      <div><div style={sh}>Notes</div>
                        {isEPN ? (
                          <div>
                            <AutoTextarea value={purchaseNoteText} onChange={e => setPurchaseNoteText(e.target.value)} style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #c9a84c", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
                            <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                              <button onClick={() => { setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, notes: purchaseNoteText } : x)); setEditingPurchaseNote(null); }} style={{ background: "#c9a84c", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                              <button onClick={() => setEditingPurchaseNote(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ fontSize: 12, color: "#b8b0a0", lineHeight: 1.7 }}>{p.notes || "No notes"}<span onClick={() => { setEditingPurchaseNote(p.id); setPurchaseNoteText(p.notes || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#c9a84c", cursor: "pointer" }}>[edit]</span></div>
                        )}
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => { const cur = p.partsCategory || "Engine"; const i = PARTS_CATEGORIES.indexOf(cur); setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, partsCategory: PARTS_CATEGORIES[(i + 1) % PARTS_CATEGORIES.length] } : x)); }} style={{ flex: 1, background: "transparent", color: PARTS_CAT_COLORS[p.partsCategory] || "#555", border: `1px solid ${PARTS_CAT_COLORS[p.partsCategory] || "#555"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}>{p.partsCategory || "Uncategorized"} →</button>
                        <button onClick={() => setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, partsType: (p.partsType || "Aftermarket") === "OEM" ? "Aftermarket" : "OEM" } : x))} style={{ width: 120, background: "transparent", color: (p.partsType || "Aftermarket") === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${(p.partsType || "Aftermarket") === "OEM" ? "#c0392b" : "#2e86c1"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{p.partsType || "Aftermarket"} →</button>
                      </div>
                    </div>
                  )}
                  {isPExp && <div onClick={() => setExpandedPurchaseId(null)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, paddingTop: 2 }}><span style={{ fontSize: 10, color: "#333" }}>▲</span></div>}
                </div>
              );
            }

            return (
              <div>
                {toBuy.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 3, textTransform: "uppercase", borderBottom: "1px solid #c9a84c33", paddingBottom: 6, marginBottom: 12 }}>To Buy</div>
                    {toBuy.map(p => renderPurchaseRow(p, () => setPurchases(prev => prev.map(x => x.id === p.id ? { ...x, status: "ordered" } : x)), { border: "2px solid #555" }))}
                    {toBuyTotal > 0 && (
                      <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 14px 0", gap: 10 }}>
                        <span style={{ fontSize: 10, color: "#555", letterSpacing: 1, textTransform: "uppercase" }}>To Buy Total</span>
                        <span style={{ fontSize: 12, color: "#c9a84c", fontWeight: 600, width: 70, textAlign: "right" }}>~${toBuyTotal.toFixed(0)}</span>
                      </div>
                    )}
                  </div>
                )}
                {ordered.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 10, color: "#d68910", letterSpacing: 3, textTransform: "uppercase", borderBottom: "1px solid #d6891033", paddingBottom: 6, marginBottom: 12 }}>Ordered — tap ✓ when received</div>
                    {ordered.map(p => {
                      const isReceiving = receivingId === p.id;
                      return (
                        <div key={p.id}>
                          {renderPurchaseRow(p, () => { setReceivingId(p.id); setReceivingStep("choose"); }, { border: "2px solid #d68910", background: "#d6891022" })}
                          {isReceiving && (
                            <div style={{ background: "#252520", border: "1px solid #c9a84c44", borderRadius: 4, padding: "10px 14px", marginBottom: 8, marginTop: -4 }}>
                              {(!receivingStep || receivingStep === "choose") && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Received — what next?</div>
                                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                    <button onClick={() => setReceivingStep("install")} style={{ background: "#2ea84a22", color: "#2ea84a", border: "1px solid #2ea84a55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Create Install Task</button>
                                    <button onClick={() => setReceivingStep("parts")} style={{ background: "#7c3ac122", color: "#7c3ac1", border: "1px solid #7c3ac155", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Add to Parts List</button>
                                    <button onClick={() => setReceivingStep("log")} style={{ background: "#c9a84c22", color: "#c9a84c", border: "1px solid #c9a84c55", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Log to Service History</button>
                                    <button onClick={() => { setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#55555522", color: "#888", border: "1px solid #55555555", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Just Remove</button>
                                    <button onClick={() => { setReceivingId(null); setReceivingStep(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                                  </div>
                                </div>
                              )}
                              {receivingStep === "install" && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#2ea84a", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Create Install Task — Priority?</div>
                                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                    {PRIORITIES.map(pr => { const cfg = PRIORITY_CONFIG[pr]; return <button key={pr} onClick={() => { setTasks(prev => [...prev, { id: Date.now(), stage: "install", type: "modification", priority: pr, title: p.item, notes: p.notes || "Received. Ready to install.", mileage: null, parts: [p.item + (p.cost ? ` (${p.cost})` : "")] }]); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: cfg.color + "22", color: cfg.color, border: `1px solid ${cfg.color}66`, borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", letterSpacing: 1 }}>{cfg.label}</button>; })}
                                    <button onClick={() => setReceivingStep("choose")} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                                  </div>
                                </div>
                              )}
                              {receivingStep === "parts" && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#7c3ac1", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Add to Parts List</div>
                                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                    <button onClick={() => { const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }); setAftermarketItems(prev => [...prev, { id: Date.now(), name: p.item, category: p.partsCategory || "Cosmetic", type: p.partsType || "Aftermarket", installedDate: dateStr, notes: p.notes || "" }]); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#7c3ac1", color: "#fff", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Add to Parts List</button>
                                    <button onClick={() => setReceivingStep("choose")} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                                  </div>
                                </div>
                              )}
                              {receivingStep === "log" && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#c9a84c", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Log to Service History</div>
                                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                    <button onClick={() => { const dateStr = new Date().toLocaleDateString("en-US", { month: "short", year: "numeric" }); setServiceLogRaw(prev => [{ id: Date.now(), category: "Maintain", title: p.item, date: dateStr, mileage: vehicleOdo || "", notes: p.notes || "Purchased and received.", parts: [p.item + (p.cost ? ` (${p.cost})` : "")] }, ...prev]); setPurchases(prev => prev.filter(x => x.id !== p.id)); setReceivingId(null); setReceivingStep(null); }} style={{ background: "#2ea84a", color: "#1a1a18", border: "none", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Log It</button>
                                    <button onClick={() => setReceivingStep("choose")} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "6px 14px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
                {toBuy.length === 0 && ordered.length === 0 && <div style={{ color: "#444", fontSize: 12, padding: 20, textAlign: "center" }}>Shopping list is empty.</div>}
              </div>
            );
          })()}
        </div>
      )}

      {/* ═══ SERVICE LOG ═══ */}
      {tab === "log" && (
        <div>
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            {logCategories.map(c => { const catColorMap = { Maintenance: "#c0392b", Repair: "#d68910", Modification: "#7c3ac1", Inspect: "#d68910", Maintain: "#c0392b", Monitor: "#2e86c1", Install: "#2ea84a" }; return <button key={c} onClick={() => setLogFilter(c)} style={btnS(logFilter === c, c === "All" ? "#2ea84a" : catColorMap[c] || "#2ea84a")}>{c}</button>; })}
          </div>
          {filteredLog.length === 0
            ? <div style={{ color: "#444", fontSize: 12, padding: 20, textAlign: "center" }}>No entries match this filter.</div>
            : filteredLog.map((entry, idx) => {
              const isExp = expandedLogId === entry.id; const isLast = idx === filteredLog.length - 1;
              return (
                <div key={entry.id} style={{ display: "flex", gap: 0 }}>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 64, flexShrink: 0 }}>
                    <div style={{ fontSize: 9, color: "#c9a84c", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4, textAlign: "center", lineHeight: 1.3 }}>
                      {entry.date.split(",")[0]}<br/><span style={{ color: "#555" }}>{entry.date.includes(",") ? entry.date.split(",")[1].trim() : ""}</span>
                    </div>
                    <div style={{ width: 12, height: 12, borderRadius: "50%", background: "#2ea84a", flexShrink: 0, boxShadow: "0 0 6px #2ea84a44" }} />
                    {!isLast && <div style={{ width: 2, flex: 1, background: "linear-gradient(to bottom, #2ea84a44, #2e2e2a)" }} />}
                  </div>
                  <div style={{ flex: 1, marginBottom: 16, marginLeft: 8 }}>
                    <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, overflow: "hidden" }}>
                      <div onClick={() => setExpandedLogId(isExp ? null : entry.id)} style={{ padding: "11px 14px", cursor: "pointer" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 600, color: "#f0e6c8" }}>{entry.title}</div>
                            <div style={{ fontSize: 10, color: ({ Maintenance: "#c0392b", Repair: "#d68910", Modification: "#7c3ac1", Inspect: "#d68910", Maintain: "#c0392b", Monitor: "#2e86c1", Install: "#2ea84a" })[entry.category] || "#888", marginTop: 2, letterSpacing: 1 }}>{entry.category}</div>
                          </div>
                          <div style={{ display: "flex", gap: 6, alignItems: "center", flexShrink: 0, marginLeft: 12 }}>
                            {entry.mileage && <span style={{ fontSize: 11, color: "#c9a84c" }}>@ {entry.mileage}</span>}
                            <span onClick={e => { e.stopPropagation(); setDeletingId(entry.id); setDeletingType("log"); }} style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px", lineHeight: 1 }}>✕</span>
                          </div>
                        </div>
                      </div>
                      {deletingId === entry.id && deletingType === "log" && (
                        <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 11, color: "#c0392b" }}>Delete this entry?</span>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={e => { e.stopPropagation(); setServiceLogRaw(prev => prev.filter(x => x.id !== entry.id)); setDeletingId(null); }} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
                            <button onClick={e => { e.stopPropagation(); setDeletingId(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        </div>
                      )}
                      {!isExp && <div onClick={() => setExpandedLogId(entry.id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -2 }}><span style={{ fontSize: 10, color: "#333" }}>▼</span></div>}
                      {isExp && (
                        <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
                          {["title", "date", "mileage", "notes"].map(field => (
                            <div key={field}><div style={sh}>{field.charAt(0).toUpperCase() + field.slice(1)}</div>
                              {editingLogField?.id === entry.id && editingLogField?.field === field ? (
                                <div>
                                  {field === "notes" ? <AutoTextarea value={logFieldText} onChange={e => setLogFieldText(e.target.value)} style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #2ea84a", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} /> : <input value={logFieldText} onChange={e => setLogFieldText(e.target.value)} style={{ width: "100%", background: "#1a1a18", color: "#e8e0c8", border: "1px solid #2ea84a", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />}
                                  <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                                    <button onClick={() => { setServiceLogRaw(prev => prev.map(x => x.id === entry.id ? { ...x, [field]: logFieldText } : x)); setEditingLogField(null); }} style={{ background: "#2ea84a", color: "#1a1a18", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                                    <button onClick={() => setEditingLogField(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                                  </div>
                                </div>
                              ) : (
                                <div style={{ fontSize: 12, color: field === "title" ? "#f0e6c8" : (entry[field] ? "#c9a84c" : "#444"), lineHeight: 1.7 }}>{entry[field] || (field === "notes" ? "No notes" : "Not recorded")}<span onClick={() => { setEditingLogField({ id: entry.id, field }); setLogFieldText(entry[field] || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#2ea84a", cursor: "pointer" }}>[edit]</span></div>
                              )}
                            </div>
                          ))}
                          {entry.parts && entry.parts.length > 0 && <div><div style={sh}>Parts Used</div><ul style={{ margin: 0, paddingLeft: 16, fontSize: 12, color: "#9a9080", lineHeight: 1.9 }}>{entry.parts.map((p, i) => <li key={i}>{p}</li>)}</ul></div>}
                        </div>
                      )}
                      {isExp && <div onClick={() => setExpandedLogId(null)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, paddingTop: 2 }}><span style={{ fontSize: 10, color: "#333" }}>▲</span></div>}
                    </div>
                  </div>
                </div>
              );
            })
          }
        </div>
      )}

      {/* ═══ VEHICLE INFO ═══ */}
      {tab === "vehicle" && (
        <div>
          <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, marginBottom: 12, overflow: "hidden" }}>
            <div onClick={() => setInfoOpen(!infoOpen)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 10, color: "#7c3ac1", letterSpacing: 3, textTransform: "uppercase" }}>Vehicle Info</div>
              <span style={{ fontSize: 10, color: "#444" }}>{infoOpen ? "▲" : "▼"}</span>
            </div>
            {infoOpen && (
              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 24px" }}>
                  {[{ label: "Make / Model", value: "1994 Honda Acty" }, { label: "Chassis", value: "HA4 — Realtime 4WD" }, { label: "Engine", value: "E07A 660cc 3-cyl" }, { label: "Weight", value: "1,640 lbs" }, { label: "Purchased", value: "Feb 27, 2026" }, { label: "Odo at Purchase", value: "88,524 km" }].map(({ label, value }) => (

                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 24px" }}>
                    {[{ label: "VIN", value: "HA42120119" }, { label: "License Plate", value: "WRT 247" }, { label: "State", value: "Hawaii" }, { label: "Registration Exp.", value: "Aug 2026" }, { label: "Safety Check Exp.", value: "Oct 2026" }, { label: "Insurance", value: "TBD" }].map(({ label, value }) => (

          <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, marginBottom: 12, overflow: "hidden" }}>
            <div onClick={() => setAftermarketOpen(!aftermarketOpen)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>

              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px" }}>
                <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
                  {[["All", "200,195,180"], ...PARTS_CATEGORIES.map(c => { const rgbMap = { Engine: "192,57,43", Drivetrain: "214,137,16", Electric: "201,168,76", "Brakes/Suspension": "46,168,74", "Wheels/Tires": "46,134,193", Cosmetic: "124,58,193" }; return [c, rgbMap[c]]; })].map(([c, rgb]) => {
                    const active = partsFilter === c;
                    return <button key={c} onClick={() => setPartsFilter(c)} style={{ background: active ? `rgba(${rgb},0.12)` : "transparent", color: active ? `rgb(${rgb})` : "#333", border: `1px solid ${active ? `rgba(${rgb},0.35)` : "#2e2e2a"}`, borderRadius: 3, padding: "3px 10px", fontSize: 10, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>{c}</button>;

                {aftermarketItems.filter(p => partsFilter === "All" || (typeof p === "object" ? p.category : "") === partsFilter).map((item, idx) => {
                  const id = typeof item === "object" ? (item.id || idx) : idx;
                  const name = typeof item === "object" ? item.name : item;
                  const cat = typeof item === "object" ? item.category : "Uncategorized";
                  const type = typeof item === "object" ? item.type : "Aftermarket";
                  const installed = typeof item === "object" ? item.installedDate : null;
                  const partNotes = typeof item === "object" ? item.notes : "";
                  const catColor = PARTS_CAT_COLORS[cat] || "#555";
                  const isPartExp = expandedPartId === id;
                  return (
                    <div key={id} style={{ background: "#1a1a18", border: "1px solid #2e2e2a", borderLeft: `3px solid ${catColor}`, borderRadius: 4, overflow: "hidden", marginBottom: 8 }}>
                      <div onClick={() => setExpandedPartId(isPartExp ? null : id)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, color: "#f0e6c8" }}>{name}</div>
                          <div style={{ fontSize: 10, color: "#555", marginTop: 1, display: "flex", gap: 6, alignItems: "center" }}>
                            <span style={{ color: catColor }}>{cat}</span>
                            {installed && <span>· {installed}</span>}
                          </div>
                        </div>
                        <span style={{ fontSize: 8, color: type === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${type === "OEM" ? "#c0392b44" : "#2e86c144"}`, borderRadius: 2, padding: "1px 5px", letterSpacing: 1, flexShrink: 0 }}>{type}</span>
                        <span onClick={e => { e.stopPropagation(); setDeletingId(id); setDeletingType("part"); }} style={{ fontSize: 14, color: "#555", cursor: "pointer", padding: "4px", lineHeight: 1, flexShrink: 0 }}>✕</span>
                      </div>
                      {deletingId === id && deletingType === "part" && (
                        <div style={{ background: "#2a1a1a", borderTop: "1px solid #c0392b44", padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <span style={{ fontSize: 11, color: "#c0392b" }}>Delete this part?</span>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={e => { e.stopPropagation(); setAftermarketItems(prev => prev.filter(p => p !== item)); setDeletingId(null); }} style={{ background: "#c0392b", color: "#fff", border: "none", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Delete</button>
                            <button onClick={e => { e.stopPropagation(); setDeletingId(null); }} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "5px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                          </div>
                        </div>
                      )}
                      {!isPartExp && <div onClick={() => setExpandedPartId(id)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, marginTop: -4 }}><span style={{ fontSize: 10, color: "#333" }}>▼</span></div>}
                      {isPartExp && (
                        <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
                          <div><div style={sh}>Name</div>
                            {editingPartField?.id === id && editingPartField?.field === "name" ? (
                              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                <input value={partFieldText} onChange={e => setPartFieldText(e.target.value)} style={{ flex: 1, background: "#222220", color: "#e8e0c8", border: "1px solid #7c3ac1", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                                <button onClick={() => { setAftermarketItems(prev => prev.map(p => p === item ? { ...p, name: partFieldText } : p)); setEditingPartField(null); }} style={{ background: "#7c3ac1", color: "#fff", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                                <button onClick={() => setEditingPartField(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                              </div>
                            ) : (
                              <div style={{ fontSize: 12, color: "#f0e6c8" }}>{name}<span onClick={() => { setEditingPartField({ id, field: "name" }); setPartFieldText(name); }} style={{ marginLeft: 8, fontSize: 10, color: "#7c3ac1", cursor: "pointer" }}>[edit]</span></div>
                            )}
                          </div>
                          <div style={{ display: "flex", gap: 8 }}>
                            <button onClick={() => { const i = PARTS_CATEGORIES.indexOf(cat); setAftermarketItems(prev => prev.map(p => p === item ? { ...p, category: PARTS_CATEGORIES[(i + 1) % PARTS_CATEGORIES.length] } : p)); }} style={{ flex: 1, background: "transparent", color: PARTS_CAT_COLORS[cat] || "#555", border: `1px solid ${PARTS_CAT_COLORS[cat] || "#555"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}>{cat} →</button>
                            <button onClick={() => { setAftermarketItems(prev => prev.map(p => p === item ? { ...p, type: type === "OEM" ? "Aftermarket" : "OEM" } : p)); }} style={{ width: 120, background: "transparent", color: type === "OEM" ? "#c0392b" : "#2e86c1", border: `1px solid ${type === "OEM" ? "#c0392b" : "#2e86c1"}55`, borderRadius: 3, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>{type} →</button>
                          </div>
                          <div><div style={sh}>Installed</div>
                            {editingPartField?.id === id && editingPartField?.field === "date" ? (
                              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                <input value={partFieldText} onChange={e => setPartFieldText(e.target.value)} style={{ flex: 1, background: "#222220", color: "#e8e0c8", border: "1px solid #7c3ac1", borderRadius: 3, padding: "4px 8px", fontSize: 12, fontFamily: "inherit" }} />
                                <button onClick={() => { setAftermarketItems(prev => prev.map(p => p === item ? { ...p, installedDate: partFieldText } : p)); setEditingPartField(null); }} style={{ background: "#7c3ac1", color: "#fff", border: "none", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                                <button onClick={() => setEditingPartField(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                              </div>
                            ) : (
                              <div style={{ fontSize: 12, color: installed ? "#c9a84c" : "#444" }}>{installed || "Not recorded"}<span onClick={() => { setEditingPartField({ id, field: "date" }); setPartFieldText(installed || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#7c3ac1", cursor: "pointer" }}>[edit]</span></div>
                            )}
                          </div>
                          <div><div style={sh}>Notes</div>
                            {editingPartField?.id === id && editingPartField?.field === "notes" ? (
                              <div>
                                <AutoTextarea value={partFieldText} onChange={e => setPartFieldText(e.target.value)} style={{ width: "100%", background: "#222220", color: "#e8e0c8", border: "1px solid #7c3ac1", borderRadius: 3, padding: 8, fontSize: 12, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
                                <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                                  <button onClick={() => { setAftermarketItems(prev => prev.map(p => p === item ? { ...p, notes: partFieldText } : p)); setEditingPartField(null); }} style={{ background: "#7c3ac1", color: "#fff", border: "none", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Save</button>
                                  <button onClick={() => setEditingPartField(null)} style={{ background: "#2a2a26", color: "#888", border: "1px solid #333", borderRadius: 3, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                                </div>
                              </div>
                            ) : (
                              <div style={{ fontSize: 12, color: "#b8b0a0", lineHeight: 1.7 }}>{partNotes || "No notes"}<span onClick={() => { setEditingPartField({ id, field: "notes" }); setPartFieldText(partNotes || ""); }} style={{ marginLeft: 8, fontSize: 10, color: "#7c3ac1", cursor: "pointer" }}>[edit]</span></div>
                            )}
                          </div>
                        </div>
                      )}
                      {isPartExp && <div onClick={() => setExpandedPartId(null)} style={{ textAlign: "center", cursor: "pointer", paddingBottom: 6, paddingTop: 2 }}><span style={{ fontSize: 10, color: "#333" }}>▲</span></div>}
                    </div>
                  );
                })}
                {aftermarketItems.filter(p => partsFilter === "All" || (typeof p === "object" ? p.category : "") === partsFilter).length === 0 && (
                  <div style={{ color: "#444", fontSize: 12, padding: 10, textAlign: "center" }}>No parts in this category.</div>
                )}
              </div>
            )}
          </div>

          <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, marginBottom: 12, overflow: "hidden" }}>
            <div onClick={() => setContactsOpen(!contactsOpen)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 10, color: "#7c3ac1", letterSpacing: 3, textTransform: "uppercase" }}>Shops & Contacts</div>
              <span style={{ fontSize: 10, color: "#444" }}>{contactsOpen ? "▲" : "▼"}</span>
            </div>
            {contactsOpen && (
              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px", display: "flex", flexDirection: "column", gap: 14 }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#f0e6c8" }}>Tagami Auto Service</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Annual safety check</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0", marginTop: 2 }}>1733 Kahai St, Honolulu, HI 96819</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0" }}>(808) 841-5009</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>Hours: 7–10 AM, then 12–4 PM. Call ahead.</div>
                  <div style={{ fontSize: 10, color: "#d68910", marginTop: 2 }}>Tip: follow the old man's instructions. He can be grumpy but it's simple.</div>
                </div>
                <div style={{ borderTop: "1px solid #2a2a26", paddingTop: 12 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#f0e6c8" }}>JDM Imports Hawaii — Aaron Rideout</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Mechanical work, upgrades (no body work)</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0", marginTop: 2 }}>Same address — subleases from Tagami Auto</div>
                  <div style={{ fontSize: 11, color: "#b8b0a0" }}>(808) 391-3425</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>Call for appointment. Prev. owner's recommendation.</div>
                </div>
              </div>
            )}
          </div>

          <div style={{ background: "#222220", border: "1px solid #2e2e2a", borderRadius: 4, marginBottom: 12, overflow: "hidden" }}>
            <div onClick={() => setPrevOwnerOpen(!prevOwnerOpen)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontSize: 10, color: "#7c3ac1", letterSpacing: 3, textTransform: "uppercase" }}>Previous Owner Notes</div>
              <span style={{ fontSize: 10, color: "#444" }}>{prevOwnerOpen ? "▲" : "▼"}</span>
            </div>
            {prevOwnerOpen && (
              <div style={{ borderTop: "1px solid #2a2a26", padding: "12px 14px" }}>
                <div style={{ fontSize: 11, color: "#9a9080", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{`Good to Know Stuffs:
• Tires - inflate to 35 psi
• Gas - unleaded; tank is on the driver's side just past the door
• Oil - 10w-30; tank is on the passenger side towards the end of the bed; the dipstick is tucked in by the back wheel on the passenger side under the wheel well; use the smaller nozzle (blue) hanging in the bed
• Battery - passenger side between the wheels; hand-tightened cover, no tools needed; battery is brand new
• Water - the battery cover also houses the overflow tank; the overflow tank is to the left of the battery; top off whenever temp gauge goes above halfway; use the bigger nozzle (clear) hanging in the bed
• Tires - less than a year old
• Radiator - less than a year old
• Starter Motor - brand new

Recommendations:
1. Drive under 80 KPH (48 MPH)
2. Avoid potholes, divots, manhole covers — 4-lug wheels don't absorb uneven surfaces well
3. If you need a tow, get a flatbed. If not possible, tell driver not to go over 30 MPH
4. Top off the overflow tank every week or two
5. One quart of oil per year is plenty
6. When insuring, make sure they know it's a "kei" truck — 3 cyl, 660cc. Keeps payment low
7. Drive slow and defensive — only safety feature is the seat belt
8. Tagami Auto Service for safety check — 1733 Kahai St, (808) 841-5009
9. JDM Imports Hawaii for mechanical — Aaron Rideout, (808) 391-3425

Helpful Links:
• honda-acty.com/ha3-ha4-acty-truck/ — parts/accessories
• oiwa.co — tips from a longtime owner
• roadlancer.com/honda-mini-truck/ — owner tips
• minitruckimports.com/honda-acty-maintenance-tips/`}</div>
              </div>
            )}
          </div>

          <div style={{ marginTop: 20, display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
            <div style={{ fontSize: 9, color: syncStatus === "saved" ? "#2ea84a" : syncStatus === "saving" ? "#c9a84c" : syncStatus === "offline" ? "#c0392b" : "#555", letterSpacing: 1 }}>
              {syncStatus === "saved" ? "☁ SYNCED" : syncStatus === "saving" ? "☁ SAVING..." : syncStatus === "offline" ? "⚠ OFFLINE — changes not saved" : ""}
            </div>
            <button onClick={() => { const state = { tasks, serviceLog, vehicleOdo, purchases, aftermarket: aftermarketItems }; const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "acty-backup-" + new Date().toISOString().slice(0, 10) + ".json"; a.click(); }} style={{ background: "transparent", color: "#2e2e2a", border: "1px solid #2e2e2a", borderRadius: 3, padding: "6px 16px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>Export Backup</button>
            <button onClick={() => { const input = document.createElement("input"); input.type = "file"; input.accept = ".json"; input.onchange = e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = ev => { try { const data = JSON.parse(ev.target.result); if (data.tasks) setTasksRaw(autoEscalate(data.tasks, data.vehicleOdo || vehicleOdo)); if (data.serviceLog) setServiceLogRaw(data.serviceLog); if (data.vehicleOdo) setVehicleOdoRaw(data.vehicleOdo); if (data.purchases) setPurchasesRaw(data.purchases); if (data.aftermarket) setAftermarketItems(data.aftermarket); setSyncStatus("saving"); } catch { alert("Could not read backup file."); } }; reader.readAsText(file); }; input.click(); }} style={{ background: "transparent", color: "#2e2e2a", border: "1px solid #2e2e2a", borderRadius: 3, padding: "6px 16px", fontSize: 9, cursor: "pointer", letterSpacing: 1, textTransform: "uppercase", fontFamily: "inherit" }}>Import Backup</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<ActyTracker />, document.getElementById("root"));
</script>
